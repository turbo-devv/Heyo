<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<style>
@import url('https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap');

:root{
  --bg:#f5f6fa; --panel:#fff; --panel-2:#f8f9fd; --text:#20242c; --muted:#6e7685;
  --border:#e5e8f0; --danger:#d92d20; --success:#0f9d58; --warning:#ca8a04;
  --overlay:rgba(15,23,42,.44); --my-msg:#edf2ff; --other-msg:#fff;
  --reply-bg:#f4f6fb; --shadow:0 14px 34px rgba(15,23,42,.10);
  --sidebar-width:310px; --online:#22c55e; --accent:#4f46e5; --accent-soft:#eef0ff;
}
body.dark{
  --bg:#0d1117; --panel:#151b23; --panel-2:#10161d; --text:#e6edf3; --muted:#98a5b7;
  --border:#263041; --danger:#ff6b6b; --success:#39c57a; --warning:#facc15;
  --overlay:rgba(0,0,0,.58); --my-msg:#1a2747; --other-msg:#161d28;
  --reply-bg:#111824; --shadow:0 16px 36px rgba(0,0,0,.34);
}

body.ac-indigo{--accent:#4f46e5;--accent-soft:#eef0ff} body.dark.ac-indigo{--accent:#7c8cff;--accent-soft:#1d2442}
body.ac-red{--accent:#dc2626;--accent-soft:#fef2f2} body.dark.ac-red{--accent:#f87171;--accent-soft:#3b1111}
body.ac-blue{--accent:#2563eb;--accent-soft:#eff6ff} body.dark.ac-blue{--accent:#60a5fa;--accent-soft:#172554}
body.ac-orange{--accent:#ea580c;--accent-soft:#fff7ed} body.dark.ac-orange{--accent:#fb923c;--accent-soft:#431407}
body.ac-yellow{--accent:#ca8a04;--accent-soft:#fefce8} body.dark.ac-yellow{--accent:#facc15;--accent-soft:#422006}
body.ac-pink{--accent:#db2777;--accent-soft:#fdf2f8} body.dark.ac-pink{--accent:#f472b6;--accent-soft:#500724}
body.ac-purple{--accent:#7c3aed;--accent-soft:#f5f3ff} body.dark.ac-purple{--accent:#a78bfa;--accent-soft:#2e1065}
body.ac-gray{--accent:#6b7280;--accent-soft:#f3f4f6} body.dark.ac-gray{--accent:#9ca3af;--accent-soft:#1f2937}
body.ac-green{--accent:#16a34a;--accent-soft:#f0fdf4} body.dark.ac-green{--accent:#4ade80;--accent-soft:#052e16}

*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:'Ubuntu',-apple-system,sans-serif;background:var(--bg)!important;color:var(--text);overflow:hidden;user-select:none}
input,textarea{user-select:text;font:inherit} button,select{font:inherit} textarea{resize:none} a{color:inherit;text-decoration:none}

.screen{display:none;height:100vh;width:100%}.screen.active{display:flex}
.auth-screen{align-items:center;justify-content:center;padding:24px;background:var(--bg)!important}
.auth-card{width:100%;max-width:420px;background:var(--panel);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:20px}
.auth-brand{font-size:24px;font-weight:700;margin-bottom:8px}
.auth-sub{font-size:14px;color:var(--muted);margin-bottom:14px;line-height:1.5}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tabs button{flex:1;height:42px;border-radius:10px;border:1px solid var(--border);background:var(--panel-2);color:var(--text);font-weight:700;cursor:pointer}
.tabs button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.auth-block{display:none}.auth-block.active{display:block}
.field{margin-bottom:10px}
.field label{display:block;font-size:13px;color:var(--muted);font-weight:700;margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;border:1px solid var(--border);background:var(--panel-2);color:var(--text);border-radius:10px;outline:none;padding:11px 12px}
.field-row{display:flex;gap:10px}.field-row>*{flex:1;min-width:0}
.submit-btn,.primary-btn,.secondary-btn,.danger-btn,.warning-btn{border:none;border-radius:10px;cursor:pointer;font-weight:700;padding:11px 14px}
.submit-btn,.primary-btn{background:var(--accent);color:#fff}
.secondary-btn{background:var(--panel-2);color:var(--text);border:1px solid var(--border)}
.danger-btn{background:var(--danger);color:#fff}
.warning-btn{background:var(--warning);color:#111}
[disabled]{opacity:.6;cursor:not-allowed}
.submit-btn{width:100%;margin-top:4px}
.status{min-height:20px;margin-top:12px;font-size:14px;color:var(--muted)}
.status.error{color:var(--danger)}
.status.ok{color:var(--muted)}

.app-shell{display:grid;grid-template-columns:var(--sidebar-width) 1fr;width:100%;height:100vh;background:var(--bg)!important}
.sidebar{background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;min-width:0}
.sidebar-head{display:flex;align-items:center;gap:12px;padding:14px;border-bottom:1px solid var(--border)}
.avatar{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent);font-weight:700;border:1px solid var(--border);flex-shrink:0;position:relative;overflow:visible;cursor:pointer}
.avatar.lg{width:54px;height:54px;border-radius:16px;font-size:18px}
.avatar.xl{width:80px;height:80px;border-radius:24px;font-size:28px}
.av-inner{width:100%;height:100%;border-radius:inherit;overflow:hidden;display:grid;place-items:center;background:transparent}
.av-inner img{width:100%;height:100%;object-fit:cover;display:block}
.online-dot{width:11px;height:11px;border-radius:50%;background:var(--online);border:2.5px solid var(--panel);position:absolute;bottom:-2px;right:-2px;z-index:2}
.user-box{min-width:0;flex:1}
.user-box .name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-box .meta{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.icon-btn{border:1px solid var(--border);background:var(--panel-2);color:var(--text);width:38px;height:38px;border-radius:10px;cursor:pointer;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;font-size:16px}
.icon-btn.accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.search-wrap{padding:12px 14px;border-bottom:1px solid var(--border);position:relative}
.search-wrap input{width:100%;border:1px solid var(--border);background:var(--panel-2);color:var(--text);border-radius:10px;outline:none;padding:11px 12px}
.search-results{position:absolute;top:calc(100% - 4px);left:14px;right:14px;background:var(--panel);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);max-height:300px;overflow-y:auto;display:none;z-index:1200}
.search-results.open{display:block}
.si{display:flex;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer}
.si:last-child{border-bottom:none}.si:hover{background:var(--panel-2)}
.si-meta{min-width:0;flex:1}
.si-title{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-sub{font-size:12px;color:var(--muted)}
.sidebar-body{flex:1;min-height:0;overflow-y:auto;padding:10px}
.sec-title{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:8px 8px 6px;display:flex;align-items:center;justify-content:space-between}
.sec-title .icon-btn{width:24px;height:24px;font-size:14px;border-radius:7px}
.ci{display:flex;gap:10px;padding:10px;border-radius:12px;cursor:pointer;margin-bottom:4px;border:1px solid transparent}
.ci:hover{background:var(--panel-2)}
.ci.active{background:var(--accent-soft);border-color:color-mix(in srgb,var(--accent) 16%,transparent)}
.ci-meta{min-width:0;flex:1}
.ci-line{display:flex;gap:8px;align-items:center}
.ci-t{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-tm{margin-left:auto;flex-shrink:0;font-size:11px;color:var(--muted)}
.ci-sub,.ci-last{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}

.chat-panel{display:flex;flex-direction:column;min-width:0;min-height:0;background:var(--bg)!important}
.chat-topbar{height:64px;border-bottom:1px solid var(--border);background:var(--panel);display:flex;align-items:center;gap:12px;padding:10px 14px;flex-shrink:0}
.ct-box{min-width:0;flex:1;cursor:pointer}
.ct-t{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ct-s{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.chat-main{flex:1;min-height:0;display:flex;flex-direction:column;background:var(--bg)!important}
.placeholder{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)!important}
.ph-card{width:100%;max-width:600px;background:var(--panel);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:24px;text-align:center}
.ph-card h2{margin:0 0 8px;font-size:28px}.ph-card p{margin:0;color:var(--muted);line-height:1.6}
.convo-view{display:none;flex:1;min-height:0;flex-direction:column}.convo-view.active{display:flex}
.messages{flex:1;min-height:0;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:6px;background:var(--bg)!important}
.empty-st{margin:auto;color:var(--muted);text-align:center;padding:24px}
.date-sep{display:flex;align-items:center;gap:12px;padding:6px 0;color:var(--muted);font-size:12px;font-weight:700}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border)}
.mr{display:flex;gap:10px;align-items:flex-start;max-width:85%}
.mr.mine{align-self:flex-end;flex-direction:row-reverse}
.mr .avatar{width:34px;height:34px;border-radius:10px;font-size:13px;flex-shrink:0}
.mc{min-width:0;max-width:100%;background:var(--other-msg);border:1px solid var(--border);border-radius:16px;padding:10px 12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.mr.mine .mc{background:var(--my-msg)}
.mh{display:flex;gap:8px;align-items:center;margin-bottom:4px}
.mh-a{font-size:13px;font-weight:700;cursor:pointer}.mh-a:hover{text-decoration:underline}
.mh-u{font-size:12px;color:var(--muted)}
.m-fwd{font-size:11px;color:var(--accent);font-weight:700;margin-bottom:4px}
.m-rpl{border-left:3px solid var(--accent);background:var(--reply-bg);border-radius:10px;padding:7px 10px;margin-bottom:6px}
.m-rpl-n{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:2px}
.m-rpl-t{font-size:12px;color:var(--muted);white-space:pre-wrap;word-break:break-word}
.m-txt{white-space:pre-wrap;word-break:break-word;line-height:1.55;user-select:text}
.m-atts{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.att-card{border:1px solid var(--border);background:var(--panel-2);border-radius:14px;overflow:hidden}
.att-img{display:block;width:100%;max-width:400px;max-height:340px;object-fit:contain;cursor:pointer}
.att-vw{position:relative;width:100%;max-width:400px}.att-vw iframe{width:100%;height:240px;border:none}
.att-aw{padding:12px}.att-aw iframe{width:100%;height:80px;border:none}
.att-file{display:flex;align-items:flex-start;gap:10px;padding:12px}
.att-ico{width:42px;height:42px;border-radius:12px;border:1px solid var(--border);background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;font-size:18px;flex-shrink:0}
.att-body{min-width:0;flex:1}.att-name{font-size:14px;font-weight:700;word-break:break-word}
.att-meta{margin-top:4px;font-size:12px;color:var(--muted)}
.att-acts{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.att-lnk{display:inline-flex;align-items:center;min-height:32px;padding:6px 10px;border-radius:10px;text-decoration:none;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:12px;font-weight:700}
.att-cap{padding:8px 12px;border-top:1px solid var(--border)}
.att-cap-n{font-size:13px;font-weight:700}.att-cap-m{font-size:12px;color:var(--muted);margin-top:2px}
.m-meta{display:flex;gap:8px;margin-top:6px;font-size:12px;color:var(--muted)}
.inv-card{border:1px solid var(--border);background:var(--panel-2);border-radius:14px;padding:12px;margin-top:6px}
.inv-head{display:flex;gap:10px;align-items:center}
.inv-meta{min-width:0;flex:1}
.inv-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inv-sub{font-size:12px;color:var(--muted);margin-top:2px}
.inv-acts{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.inv-btn{display:inline-flex;align-items:center;justify-content:center;min-height:34px;padding:8px 12px;border-radius:10px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-weight:700}
.inv-sec{display:inline-flex;align-items:center;justify-content:center;min-height:34px;padding:8px 12px;border-radius:10px;background:var(--panel);color:var(--text);border:1px solid var(--border);cursor:pointer;font-weight:700}

.comp-wrap{background:var(--panel);border-top:1px solid var(--border);padding:12px 14px 14px;flex-shrink:0}
.rpl-banner,.upl-banner{display:none;align-items:center;justify-content:space-between;gap:12px;border:1px solid var(--border);background:var(--panel-2);border-radius:12px;padding:10px 12px;margin-bottom:10px}
.rpl-banner.active,.upl-banner.active{display:flex}
.rpl-meta,.upl-meta{min-width:0;flex:1}
.rpl-label,.upl-label{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:4px}
.rpl-text,.upl-text{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.staged-file{display:none;align-items:center;gap:10px;border:1px solid var(--border);background:var(--panel-2);border-radius:12px;padding:10px 12px;margin-bottom:10px}
.staged-file.active{display:flex}
.staged-info{min-width:0;flex:1}.staged-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.staged-meta{font-size:12px;color:var(--muted)}
.staged-img{max-width:80px;max-height:60px;border-radius:8px;object-fit:cover}
.upl-prog-w{margin-top:6px}.upl-prog{width:100%;height:8px;appearance:none;border:none;border-radius:99px;background:rgba(0,0,0,.08)}
.upl-prog::-webkit-progress-bar{background:rgba(0,0,0,.08)} .upl-prog::-webkit-progress-value{background:var(--accent)} .upl-prog::-moz-progress-bar{background:var(--accent)}
.composer{display:flex;gap:10px;align-items:flex-end}
.composer textarea{flex:1;border:1px solid var(--border);background:var(--panel-2);color:var(--text);border-radius:12px;outline:none;min-height:48px;max-height:180px;padding:12px;overflow-y:auto}
.comp-left,.comp-right{display:flex;gap:6px;align-items:flex-end}
.comp-left .icon-btn,.comp-right .icon-btn{width:48px;height:48px;font-size:18px}
#sendBtn{background:var(--accent);color:#fff;border-color:var(--accent)}

.dd-bd,.modal-ov{position:fixed;inset:0;display:none}
.dd-bd.open{display:block;z-index:9998}
.msg-dd{position:fixed;min-width:180px;background:var(--panel);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);padding:6px;display:none;z-index:9999}
.msg-dd.open{display:block}
.msg-dd button{width:100%;border:none;background:transparent;text-align:left;color:var(--text);padding:10px 12px;border-radius:10px;cursor:pointer;font-weight:500}
.msg-dd button:hover{background:var(--panel-2)}.msg-dd button.danger{color:var(--danger)}
.modal-ov{background:var(--overlay);align-items:center;justify-content:center;padding:18px;z-index:12000}
.modal-ov.open{display:flex}
.modal{width:100%;max-width:500px;background:var(--panel);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;max-height:90vh;overflow-y:auto}
.modal.modal-wide{max-width:860px}
.modal-hd{padding:16px 18px 8px;font-size:18px;font-weight:700}
.modal-bd{padding:0 18px 12px;color:var(--muted);line-height:1.5;white-space:pre-wrap;word-break:break-word}
.modal-ct{padding:0 18px 12px}
.modal-ac{display:flex;justify-content:flex-end;gap:10px;padding:0 18px 18px;flex-wrap:wrap}
.p-hdr{display:flex;flex-direction:column;align-items:center;padding:16px;gap:10px}
.p-name{font-size:20px;font-weight:700}.p-un{font-size:14px;color:var(--muted)}
.p-bio{font-size:14px;color:var(--muted);text-align:center;max-width:300px;line-height:1.5}
.p-st{font-size:13px;font-weight:700;padding:4px 10px;border-radius:8px}
.p-st.on{color:var(--success);background:rgba(34,197,94,.1)} .p-st.off{color:var(--muted);background:var(--panel-2)}
.p-acts{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:6px}
.ac-picker{display:flex;gap:8px;flex-wrap:wrap;padding:4px 0}
.ac-dot{width:32px;height:32px;border-radius:10px;cursor:pointer;border:3px solid transparent}
.ac-dot.sel{border-color:var(--text)}
.ac-indigo{background:#4f46e5}.ac-red{background:#dc2626}.ac-blue{background:#2563eb}
.ac-orange{background:#ea580c}.ac-yellow{background:#ca8a04}.ac-pink{background:#db2777}
.ac-purple{background:#7c3aed}.ac-gray{background:#6b7280}.ac-green{background:#16a34a}
.img-ov{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:20000;cursor:pointer}
.img-ov img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:8px}
.mobile-toggle{display:none}.mob-bd{display:none}

.admin-kpi-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:14px}
.admin-kpi{border:1px solid var(--border);background:var(--panel-2);border-radius:14px;padding:12px}
.admin-kpi-v{font-size:22px;font-weight:700}
.admin-kpi-l{font-size:12px;color:var(--muted);margin-top:4px}
.admin-split{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.admin-box{border:1px solid var(--border);background:var(--panel-2);border-radius:14px;padding:12px;min-height:120px}
.admin-box h3{margin:0 0 10px;font-size:14px}
.admin-list{display:flex;flex-direction:column;gap:8px;max-height:320px;overflow:auto}
.admin-row{display:flex;align-items:center;gap:10px;padding:8px;border:1px solid var(--border);background:var(--panel);border-radius:12px}
.admin-row-meta{min-width:0;flex:1}
.admin-row-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.admin-row-sub{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.admin-row-actions{display:flex;gap:6px;flex-wrap:wrap}
.admin-inline{display:flex;gap:8px;align-items:center}
.admin-inline input,.admin-inline select{flex:1;border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:10px;outline:none;padding:10px 12px}
.admin-drop{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.admin-drop-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:12px;cursor:pointer;font-weight:700}
.admin-drop-body{display:none;margin-top:10px}
.admin-drop.open .admin-drop-body{display:block}
.admin-drop-caret{color:var(--muted);font-size:12px}
  

@media(max-width:900px){
  .app-shell{grid-template-columns:1fr}
  .sidebar{display:none}
  .sidebar.mob-open{display:flex;position:fixed;inset:0 auto 0 0;width:min(92vw,360px);z-index:13000;box-shadow:var(--shadow)}
  .mob-bd{position:fixed;inset:0;background:var(--overlay);display:none;z-index:12999}
  .mob-bd.open{display:block}
  .mobile-toggle{display:inline-flex}
  .mr{max-width:100%}
  .att-img,.att-vw{max-width:100%}
  .admin-kpi-grid,.admin-split{grid-template-columns:1fr}
}
</style>
</head>
<body class="light ac-indigo">

<div id="authScreen" class="screen auth-screen active">
  <div class="auth-card">
    <div class="auth-brand">Heyo</div>
    <div id="authSub" class="auth-sub"></div>
    <div class="tabs">
      <button id="loginTabBtn" class="active" onclick="switchAuth('login')">Login</button>
      <button id="regTabBtn" onclick="switchAuth('register')">Create account</button>
    </div>
    <div id="loginBlock" class="auth-block active">
      <div class="field"><label id="lbl_loginId">Email / phone / username</label><input id="loginId" type="text" autocomplete="username"></div>
      <div class="field"><label id="lbl_loginPw">Password</label><input id="loginPw" type="password" autocomplete="current-password"></div>
      <button id="loginBtn" class="submit-btn" onclick="doLogin()">Login</button>
    </div>

/* ======================== google.script.run Adapter ======================== */

(function initGoogleScriptRunAdapter(){
  function createRunner(successHandler,failureHandler){
    var chain={
      withSuccessHandler:function(callback){return createRunner(typeof callback==='function'?callback:null,failureHandler)},
      withFailureHandler:function(callback){return createRunner(successHandler,typeof callback==='function'?callback:null)}
    };
    return new Proxy(chain,{get:function(target,property){
      if(property in target)return target[property];
      if(typeof property!=='string')return undefined;
      return function(){var args=Array.from(arguments);callServerAction(property,args,successHandler,failureHandler)}
    }});
  }
  async function callServerAction(action,args,successHandler,failureHandler){
    try{
      var response=await fetch(SCRIPT_URL,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:action,data:args})});
      var rawText=await response.text(), result;
      try{result=rawText?JSON.parse(rawText):null}catch(parseError){throw new Error('Invalid JSON response from server.')}
      if(typeof successHandler==='function')successHandler(result);
    }catch(error){
      if(typeof failureHandler==='function')failureHandler(error);
      else console.error('API error:',error);
    }
  }
  window.google=window.google||{};
  window.google.script=window.google.script||{};
  window.google.script.run=createRunner(null,null);
})();

function fetchApplicationData(isInitialLoad){
  if(!sessionToken)return;
  google.script.run.withSuccessHandler(function(response){
    if(!response||!response.ok){handleApplicationError(response);return}
    currentUser=response.user;
    currentLanguage=currentUser.language||'en';
    globalConversationVersion=Number(response.globalConversationVersion||0);
    globalMessageVersion=Number(response.globalMessageVersion||0);
    conversations=Array.isArray(response.conversations)?response.conversations:[];
    if(response.online)onlineStatusMap=response.online;
    if(!localThemeOverride)applyThemeAndAccent(currentUser.theme||'light',currentUser.accentColor||'indigo');
    renderCurrentUserSidebar();
    applyAllLabels();
    renderSidebar();
    if(isInitialLoad) showPlaceholder();
    else if(activeConversationId){
      activeConversation=findConversationById(activeConversationId);
      if(!activeConversation) showPlaceholder();
      else renderTopbar();
    }
  }).withFailureHandler(function(error){console.error(error)}).getAppData(sessionToken);
}

function findConversationById(conversationId){
  return conversations.find(function(conversation){return conversation.conversationId===conversationId})||null;

/* ======================== Polling ======================== */

function computePollDelay(){
  if(document.hidden)return HIDDEN_POLL_MS;
  if(Date.now()<fastPollBoostUntil)return FAST_POLL_MS;
  if(activeConversationId)return NORMAL_POLL_MS;
  return SLOW_POLL_MS;
}

function scheduleNextPoll(){
  stopPolling();
  pollIntervalHandle=setTimeout(executePoll,computePollDelay());
}

function startPolling(){scheduleNextPoll();executePoll()}
function stopPolling(){if(pollIntervalHandle){clearTimeout(pollIntervalHandle);pollIntervalHandle=null}}

function boostFastPolling(ms){fastPollBoostUntil=Math.max(fastPollBoostUntil,Date.now()+(ms||8000))}

function executePoll(){
  if(isPolling){scheduleNextPoll();return}
  if(!sessionToken){scheduleNextPoll();return}
  isPolling=true;
  lastPollAt=Date.now();

  var currentConvoId=activeConversationId;
  var sinceVersion=currentConvoId?Number(conversationVersions.get(currentConvoId)||0):0;
  var sinceConversationVersion=Number(globalConversationVersion||0);

  google.script.run.withSuccessHandler(function(response){
    isPolling=false;
    if(!response||!response.ok){handleApplicationError(response);scheduleNextPoll();return}
    if(response.online)onlineStatusMap=response.online;
    if(typeof response.globalConversationVersion!=='undefined')globalConversationVersion=Number(response.globalConversationVersion||0);
    if(typeof response.globalMessageVersion!=='undefined')globalMessageVersion=Number(response.globalMessageVersion||0);

    if(response.conversations){
      conversations=response.conversations;
      activeConversation=findConversationById(activeConversationId);
      renderSidebar();
      renderTopbar();
      updateComposerVisibility();
    }

    if(response.messagesData&&String(response.messagesData.conversationId)===activeConversationId){
      var messagesData=response.messagesData;
      if(typeof messagesData.version==='number') conversationVersions.set(activeConversationId,messagesData.version);
      if(messagesData.reset||!conversationMessages.has(activeConversationId)) conversationMessages.set(activeConversationId,[]);
      if(messagesData.messages&&messagesData.messages.length){
        mergeIncomingMessages(activeConversationId,messagesData.messages,!!messagesData.reset);
        smartRenderMessages();
      }else if(messagesData.reset){
        conversationMessages.set(activeConversationId,[]);
        smartRenderMessages();
      }
    }
    scheduleNextPoll();

/* ======================== Message Loading ======================== */

function loadConversationMessages(forceScroll){
  if(!sessionToken||!activeConversationId)return;
  if(isLoadingMessages){needsMessageReload=true;return}
  isLoadingMessages=true;
  var requestedConvoId=activeConversationId;
  var sinceVersion=Number(conversationVersions.get(requestedConvoId)||0);

  google.script.run.withSuccessHandler(function(response){
    isLoadingMessages=false;
    if(!response||!response.ok){handleApplicationError(response);return}
    var messagesData=response.messagesData;
    if(!messagesData||String(messagesData.conversationId)!==requestedConvoId)return;
    if(typeof messagesData.version==='number') conversationVersions.set(requestedConvoId,messagesData.version);
    if(messagesData.reset||!conversationMessages.has(requestedConvoId)) conversationMessages.set(requestedConvoId,[]);
    if(messagesData.messages&&messagesData.messages.length) mergeIncomingMessages(requestedConvoId,messagesData.messages,!!messagesData.reset);
    else if(messagesData.reset) conversationMessages.set(requestedConvoId,[]);
    if(activeConversationId===requestedConvoId) renderAllMessages(forceScroll);
    if(needsMessageReload){needsMessageReload=false;loadConversationMessages(false)}
  }).withFailureHandler(function(error){console.error(error);isLoadingMessages=false}).getConversationMessages(sessionToken,requestedConvoId,sinceVersion);
}

function mergeIncomingMessages(conversationId,incomingMessages,isReset){
  var currentMessages=isReset?[]:(conversationMessages.get(conversationId)||[]);
  var messagesById=new Map();
  currentMessages.forEach(function(message){messagesById.set(message.messageId,message)});
  incomingMessages.forEach(function(message){
    if(message&&message.isDeletedEvent){messagesById.delete(message.messageId);return}
    messagesById.set(message.messageId,message);
  });
  var mergedMessages=[];
  messagesById.forEach(function(message){if(!message.deletedAt) mergedMessages.push(message)});
  mergedMessages.sort(function(a,b){
    var timeA=a.createdAt?new Date(a.createdAt).getTime():0;
    var timeB=b.createdAt?new Date(b.createdAt).getTime():0;
    if(timeA!==timeB)return timeA-timeB;
    return String(a.messageId).localeCompare(String(b.messageId));
  });
  conversationMessages.set(conversationId,mergedMessages);
}

function smartRenderMessages(){
  var currentVersion=conversationVersions.get(activeConversationId)||0;
  var lastVersion=lastRenderedVersion.get(activeConversationId)||0;

}

function renderAllMessages(forceScroll){
  var messagesContainer=document.getElementById('messagesContainer');
  var messageList=conversationMessages.get(activeConversationId)||[];
  var isNearBottom=Math.abs(messagesContainer.scrollHeight-messagesContainer.scrollTop-messagesContainer.clientHeight)<120;

  var currentVersion=conversationVersions.get(activeConversationId)||0;
  lastRenderedVersion.set(activeConversationId,currentVersion);

  if(!messageList.length){messagesContainer.innerHTML='<div class="empty-st">'+t('noMessages')+'</div>';return}

  var htmlParts=[], previousDateString='';
  for(var i=0;i<messageList.length;i++){
    var message=messageList[i];
    var dateString=getDateString(message.createdAt);
    if(dateString&&dateString!==previousDateString){
      htmlParts.push('<div class="date-sep">'+escapeHtml(formatDateSeparator(message.createdAt))+'</div>');
      previousDateString=dateString;
    }
    htmlParts.push(renderSingleMessage(message));
  }

  messagesContainer.innerHTML=htmlParts.join('');
  if(forceScroll||isNearBottom) messagesContainer.scrollTop=messagesContainer.scrollHeight;
}

function getDateString(isoString){
  if(!isoString)return'';
  var date=new Date(isoString);
  if(isNaN(date.getTime()))return'';
  return date.getFullYear()+'-'+(date.getMonth()+1)+'-'+date.getDate();
}

function formatDateSeparator(isoString){
  var date=new Date(isoString);
  if(isNaN(date.getTime()))return'';
  var now=new Date();
  if(date.toDateString()===now.toDateString()) return t('today');
  var yesterday=new Date(now); yesterday.setDate(yesterday.getDate()-1);
  if(date.toDateString()===yesterday.toDateString()) return t('yesterday');
  return date.toLocaleDateString(currentLanguage==='ru'?'ru-RU':'en-US',{year:'numeric',month:'long',day:'numeric'});
}

function handleSend(){

  var requestedConvoId=activeConversationId;

  google.script.run.withSuccessHandler(function(response){
    document.getElementById('sendBtn').disabled=false;
    if(!response||!response.ok){handleApplicationError(response); if(response&&response.error) alert(response.error); return}
    composerInput.value='';
    autoGrowTextarea(composerInput);
    clearReply();
    boostFastPolling(12000);
    if(response.conversations){
      conversations=response.conversations;

      activeConversation=findConversationById(activeConversationId);

    }
    if(response.message&&String(response.conversationId)===requestedConvoId){
      conversationVersions.set(requestedConvoId,response.version);
      mergeIncomingMessages(requestedConvoId,[response.message],false);
      renderAllMessages(true);

  }).withFailureHandler(function(){

function uploadAndSendFile(file,messageText){
  var conversationId=activeConversationId;
  uploadState={active:true,file:file,conversationId:conversationId,progress:0,xhr:null,uploadToken:'',uploadUrl:'',fileId:''};
  showUploadBanner('Uploading '+file.name,0,true);
  document.getElementById('sendBtn').disabled=true;

  google.script.run.withSuccessHandler(function(sessionResponse){
    if(!uploadState.active)return;
    if(!sessionResponse||!sessionResponse.ok){alert((sessionResponse&&sessionResponse.error)||'Upload failed.');resetUploadState();return}
    uploadState.uploadToken=sessionResponse.uploadToken;
    uploadState.uploadUrl=sessionResponse.uploadUrl;

    performResumableUpload(file,sessionResponse.uploadUrl,function onProgress(percent,xhr){
      uploadState.xhr=xhr;
      showUploadBanner('Uploading '+file.name+' — '+percent+'%',percent,true);
    }).then(function(fileId){
      if(!uploadState.active)return;
      uploadState.fileId=fileId||'';
      showUploadBanner('Finalizing...',100,false);

      var finalizeWithFileId=function(resolvedFileId){
        google.script.run.withSuccessHandler(function(finalizeResponse){
          if(!finalizeResponse||!finalizeResponse.ok){handleApplicationError(finalizeResponse);alert((finalizeResponse&&finalizeResponse.error)||'Finalize failed.');resetUploadState();return}
          document.getElementById('composerInput').value='';
          autoGrowTextarea(document.getElementById('composerInput'));
          clearReply();
          clearStagedFile();
          boostFastPolling(12000);
          if(finalizeResponse.conversations){
            conversations=finalizeResponse.conversations;
            if(typeof finalizeResponse.globalConversationVersion!=='undefined')globalConversationVersion=Number(finalizeResponse.globalConversationVersion||globalConversationVersion);
            activeConversation=findConversationById(activeConversationId);
            renderSidebar(); renderTopbar();
          }
          if(finalizeResponse.message&&String(finalizeResponse.conversationId)===conversationId){
            conversationVersions.set(conversationId,finalizeResponse.version);
            mergeIncomingMessages(conversationId,[finalizeResponse.message],false);
            renderAllMessages(true);
          }
          resetUploadState();
        }).withFailureHandler(function(){alert('Finalize failed.');resetUploadState()}).finalizeUploadedMessage(sessionToken,{
          uploadToken:uploadState.uploadToken,fileId:resolvedFileId,fileName:file.name,mimeType:file.type||'application/octet-stream',fileSize:file.size,text:messageText,replyToMessageId:replyTarget?replyTarget.messageId:''
        });
      };

      if(fileId) finalizeWithFileId(fileId);
      else google.script.run.withSuccessHandler(function(resolveResponse){
        if(resolveResponse&&resolveResponse.ok) finalizeWithFileId(resolveResponse.fileId);
        else resetUploadState();
      }).withFailureHandler(function(){resetUploadState()}).resolveUploadedFileId(sessionToken,uploadState.uploadToken);
    }).catch(function(){resetUploadState()});
  }).withFailureHandler(function(){alert('Upload session failed.');resetUploadState()}).createDriveUploadSession(sessionToken,{
    conversationId:conversationId,fileName:file.name,mimeType:file.type||'application/octet-stream',fileSize:file.size,text:messageText,replyToMessageId:replyTarget?replyTarget.messageId:''
  });
}

async function performResumableUpload(file,uploadUrl,onProgress){
  var startByte=0,resolvedFileId='';
  while(startByte<file.size){
    var endByte=Math.min(startByte+CHUNK_SIZE,file.size), chunk=file.slice(startByte,endByte), contentRange='bytes '+startByte+'-'+(endByte-1)+'/'+file.size;
    var chunkResult=await new Promise(function(resolve,reject){
      var xhr=new XMLHttpRequest();
      xhr.open('PUT',uploadUrl,true);
      xhr.setRequestHeader('Content-Type',file.type||'application/octet-stream');
      xhr.setRequestHeader('Content-Range',contentRange);
      xhr.upload.onprogress=function(event){
        if(event.lengthComputable){
          var totalLoaded=Math.min(file.size,startByte+event.loaded);
          onProgress(Math.min(99,Math.floor((totalLoaded/file.size)*100)),xhr);
        }
      };
      xhr.onreadystatechange=function(){if(xhr.readyState===4)resolve({status:xhr.status,xhr:xhr})};
      xhr.onerror=function(){reject(new Error('Network error during upload.'))};
      xhr.onabort=function(){reject(new Error('Upload cancelled.'))};
      xhr.send(chunk);
    });

    if(chunkResult.status===308){
      var rangeHeader=chunkResult.xhr.getResponseHeader('Range');
      if(rangeHeader){
        var rangeMatch=rangeHeader.match(/bytes=0-(\d+)$/i);
        startByte=rangeMatch?(parseInt(rangeMatch[1],10)+1):endByte;
      }else startByte=endByte;
      continue;
    }
    if(chunkResult.status>=200&&chunkResult.status<300){
      try{resolvedFileId=JSON.parse(chunkResult.xhr.responseText||'{}').id||''}catch(e){}
      onProgress(100,chunkResult.xhr);
      return resolvedFileId;
    }
    if(chunkResult.status===0&&endByte>=file.size){onProgress(100,chunkResult.xhr);return''}
    throw new Error('Upload failed with HTTP '+chunkResult.status);
  }
  return resolvedFileId;
}

function changeAvatarUI(targetType,targetId){
  var fileInput=document.createElement('input');
  fileInput.type='file';
  fileInput.accept='image/*';
  fileInput.onchange=function(){
    var file=fileInput.files&&fileInput.files[0];
    if(!file||file.size>10*1024*1024)return;
    var uploadConversationId=targetType==='group'&&targetId?targetId:(activeConversationId||'cnv_heyo_channel');
    google.script.run.withSuccessHandler(function(sessionResponse){
      if(!sessionResponse||!sessionResponse.ok)return;
      var uploadToken=sessionResponse.uploadToken;
      var xhr=new XMLHttpRequest();
      xhr.open('PUT',sessionResponse.uploadUrl,true);
      xhr.setRequestHeader('Content-Type',file.type);
      xhr.setRequestHeader('Content-Range','bytes 0-'+(file.size-1)+'/'+file.size);
      xhr.onreadystatechange=function(){
        if(xhr.readyState!==4)return;
        var resolvedFileId='';
        try{resolvedFileId=JSON.parse(xhr.responseText||'{}').id||''}catch(e){}
        if(!resolvedFileId){
          google.script.run.withSuccessHandler(function(resolveResponse){
            if(resolveResponse&&resolveResponse.ok) saveAvatarFileId(resolveResponse.fileId,targetType,targetId);
          }).withFailureHandler(function(){}).resolveUploadedFileId(sessionToken,uploadToken);
          return;
        }
        saveAvatarFileId(resolvedFileId,targetType,targetId);
      };
      xhr.send(file);
    }).withFailureHandler(function(){}).createDriveUploadSession(sessionToken,{
      conversationId:uploadConversationId,fileName:file.name,mimeType:file.type,fileSize:file.size,text:'',replyToMessageId:''
    });
  };
  fileInput.click();
}

function saveAvatarFileId(fileId,targetType,targetId){
  google.script.run.withSuccessHandler(function(response){
    if(!response||!response.ok){handleApplicationError(response);return}
    if(response.user){currentUser=response.user;renderCurrentUserSidebar()}
    if(response.conversations){
      conversations=response.conversations;
      if(typeof response.globalConversationVersion!=='undefined')globalConversationVersion=Number(response.globalConversationVersion||globalConversationVersion);
      activeConversation=findConversationById(activeConversationId);
      renderSidebar(); renderTopbar();
    }
    renderAllMessages(false);
    boostFastPolling(8000);
  }).withFailureHandler(function(){}).updateAvatar(sessionToken,{avatarFileId:fileId,targetType:targetType||'user',targetId:targetId||''});
}

/* ======================== Modal System ======================== */

function openModal(config){
  return new Promise(function(resolve){
    modalResolveFunction=resolve;
    currentModalConfig=config||{};
    document.getElementById('modalTitle').textContent=config.title||'';
    document.getElementById('modalBody').textContent=config.message||'';
    document.getElementById('modalContent').innerHTML=config.html||'';
    document.getElementById('modalBox').className='modal'+(config.wide?' modal-wide':'');
    var actionsContainer=document.getElementById('modalActions');
    actionsContainer.innerHTML='';
    (config.buttons||[]).forEach(function(buttonConfig){
      var button=document.createElement('button');
      button.className=buttonConfig.className||'secondary-btn';
      button.textContent=buttonConfig.text||'OK';
      button.onclick=function(){
        if(typeof config.onAction==='function') config.onAction(buttonConfig.value);
        else closeModal(buttonConfig.value);
      };
      actionsContainer.appendChild(button);
    });
    document.getElementById('modalOverlay').classList.add('open');
  });
}

function closeModal(result){
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('modalContent').innerHTML='';
  document.getElementById('modalActions').innerHTML='';
  document.getElementById('modalBox').className='modal';
  var resolver=modalResolveFunction;
  modalResolveFunction=null;
  currentModalConfig=null;
  if(resolver) resolver(result);
}

function showAlert(title,message){return openModal({title:title,message:message,buttons:[{text:'OK',className:'primary-btn',value:true}]})}
function showConfirm(title,message,okText,isDanger){return openModal({title:title,message:message,buttons:[{text:t('cancel'),className:'secondary-btn',value:false},{text:okText||'OK',className:isDanger?'danger-btn':'primary-btn',value:true}]})}
function showPrompt(title,message,defaultValue){
  return openModal({
    title:title,message:message,html:'<div class="field"><textarea id="promptInput" rows="4">'+escapeHtml(defaultValue||'')+'</textarea></div>',
    buttons:[{text:t('cancel'),className:'secondary-btn',value:'cancel'},{text:t('save'),className:'primary-btn',value:'save'}],
    onAction:function(value){
      if(value!=='save'){closeModal(null);return}
      var input=document.getElementById('promptInput');
      closeModal(input?input.value:null);
    }
  });
}

/* ======================== Utility Functions ======================== */

function autoGrowTextarea(element){if(!element)return;element.style.height='auto';element.style.height=Math.min(element.scrollHeight,180)+'px'}
function findMessageCardElement(target){return target?target.closest('.mc[data-mid]'):null}
function escapeHtml(value){return String(value||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function escapeAttr(value){return escapeHtml(value).replace(/\n/g,'&#10;')}
function escapeJsString(value){return String(value||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/</g,'\\x3C')}
function truncateString(value,maxLength){var text=String(value||'');return text.length<=maxLength?text:text.slice(0,maxLength-1)+'…'}
function formatMessageTime(isoString){var date=new Date(isoString); if(isNaN(date.getTime()))return''; return date.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}
function formatSidebarTime(isoString){var date=new Date(isoString); if(isNaN(date.getTime()))return''; if(date.toDateString()===new Date().toDateString()) return date.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); return date.toLocaleDateString([], {month:'short',day:'numeric'})}
function formatFileSize(bytes){var value=Number(bytes); if(!Number.isFinite(value)||value<=0)return'0 B'; var units=['B','KB','MB','GB'], size=value, unitIndex=0; while(size>=1024&&unitIndex<units.length-1){size/=1024;unitIndex++} return (size>=10||unitIndex===0?size.toFixed(0):size.toFixed(1))+' '+units[unitIndex]}
function detectFileCategory(mimeType){var type=String(mimeType||'').toLowerCase(); if(type.startsWith('image/'))return'image'; if(type.startsWith('video/'))return'video'; if(type.startsWith('audio/'))return'audio'; return'file'}
function buildAttachmentMetaText(attachment){var parts=[], category=detectFileCategory(attachment.mimeType); if(category==='image')parts.push('Photo'); else if(category==='video')parts.push('Video'); else if(category==='audio')parts.push('Audio'); else parts.push('File'); if(attachment.size>0)parts.push(formatFileSize(attachment.size)); return parts.join(' • ')}
function getFileIcon(attachment){var category=detectFileCategory(attachment&&attachment.mimeType); if(category==='image')return'🖼'; if(category==='video')return'🎬'; if(category==='audio')return'🎵'; var extension=(attachment&&attachment.name||'').split('.').pop().toLowerCase(); if(extension==='pdf')return'📕'; if(['doc','docx','txt','md'].indexOf(extension)!==-1)return'📄'; if(['zip','rar','7z'].indexOf(extension)!==-1)return'🗜'; return'📎'}
