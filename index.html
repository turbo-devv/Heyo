          <input id="settingsUsername" type="text" disabled value="@${escapeAttr(currentUser.username || '')}">
        </div>
        <div class="field">
          <label for="settingsBio">Bio</label>
          <textarea id="settingsBio" rows="4" maxlength="240">${escapeHtml(currentUser.bio || '')}</textarea>
        </div>
        <div class="field">
          <label for="settingsTheme">Theme</label>
          <select id="settingsTheme">
            <option value="light"${currentUser.theme === 'light' ? ' selected' : ''}>Light</option>
            <option value="dark"${currentUser.theme === 'dark' ? ' selected' : ''}>Dark</option>
          </select>
        </div>
      `;

      openCustomModal({
        title: 'Profile settings',
        message: 'Update your profile information and theme.',
        html: html,
        buttons: [
          { text: 'Cancel', className: 'secondary-btn', value: 'cancel' },
          { text: 'Save', className: 'primary-btn', value: 'save' }
        ],
        onAction: function(value) {
          if (value !== 'save') {
            closeModal(null);
            return;
          }

          const payload = {
            displayName: document.getElementById('settingsDisplayName').value.trim(),
            bio: document.getElementById('settingsBio').value.trim(),
            theme: document.getElementById('settingsTheme').value
          };

          google.script.run
            .withSuccessHandler(function(res) {
              if (!res || !res.ok) {
                showAlert('Profile settings', (res && res.error) || 'Failed to update profile.');
                return;
              }

              closeModal(true);

              currentUser = res.user || currentUser;
              if (Array.isArray(res.conversations)) {
                conversations = res.conversations;
              }

              applyTheme(currentUser.theme || 'light');
              renderCurrentUser();
              activeConversation = getConversationById(activeConversationId);
              renderSidebar();
              renderActiveTopbar();
              renderMessages(false);
            })
            .withFailureHandler(function(err) {
              console.error(err);
              showAlert('Profile settings', 'Failed to update profile.');
            })
            .updateProfile(sessionToken, payload);
        }
      });
    }

    function applyTheme(theme) {
      document.body.classList.remove('light', 'dark');
      document.body.classList.add(theme === 'dark' ? 'dark' : 'light');
    }

    function performUserSearch() {
      const query = document.getElementById('userSearchInput').value.trim();
      if (!query) {
        clearSearchResults();
        return;
      }

      google.script.run
        .withSuccessHandler(function(res) {
          if (!res || !res.ok) {
            clearSearchResults();
            return;
          }
          renderSearchResults(Array.isArray(res.users) ? res.users : []);
        })
        .withFailureHandler(function(err) {
          console.error(err);
          clearSearchResults();
        })
        .searchUsers(sessionToken, query);
    }

    function renderSearchResults(users) {
      const wrap = document.getElementById('searchResults');

      if (!users.length) {
        wrap.innerHTML = `
          <div class="search-item">
            <div class="search-item-meta">
              <div class="search-item-title">No users found</div>
            </div>
          </div>
        `;
        wrap.classList.add('open');
        return;
      }

      wrap.innerHTML = users.map(function(user) {
        const sub = '@' + (user.username || '') + (user.bio ? ' • ' + truncate(user.bio, 100) : '');
        return `
          <div class="search-item" onclick="startDirectMessage('${escapeJsString(user.userId)}')">
            <div class="avatar">${escapeHtml(user.initials || 'U')}</div>
            <div class="search-item-meta">
              <div class="search-item-title">${escapeHtml(user.displayName || 'User')}</div>
              <div class="search-item-sub">${escapeHtml(sub)}</div>
            </div>
          </div>
        `;
      }).join('');

      wrap.classList.add('open');
    }

    function clearSearchResults() {
      const wrap = document.getElementById('searchResults');
      wrap.classList.remove('open');
      wrap.innerHTML = '';
    }

    function startDirectMessage(userId) {
      clearSearchResults();
      document.getElementById('userSearchInput').value = '';

      google.script.run
        .withSuccessHandler(function(res) {
          if (!res || !res.ok) {
            showAlert('Direct message', (res && res.error) || 'Failed to open direct message.');
            return;
          }

          if (Array.isArray(res.conversations)) {
            conversations = res.conversations;
            renderSidebar();
          }

          if (res.conversationId) {
            selectConversation(res.conversationId);
          }
        })
        .withFailureHandler(function(err) {
          console.error(err);
          showAlert('Direct message', 'Failed to open direct message.');
        })
        .openDirectConversation(sessionToken, userId);
    }

    function renderTips() {
      const tip = tips[tipIndex];
      document.getElementById('tipIndex').textContent = 'Tip ' + (tipIndex + 1) + ' / ' + tips.length;
      document.getElementById('tipTitle').textContent = tip.title;
      document.getElementById('tipText').textContent = tip.text;
    }

    function prevTip() {
      tipIndex = (tipIndex - 1 + tips.length) % tips.length;
      renderTips();
    }

    function nextTip() {
      tipIndex = (tipIndex + 1) % tips.length;
      renderTips();
    }

    function openMobileSidebar() {
      document.getElementById('sidebar').classList.add('mobile-open');
      document.getElementById('mobileSidebarBackdrop').classList.add('open');
    }

    function closeMobileSidebar() {
      document.getElementById('sidebar').classList.remove('mobile-open');
      document.getElementById('mobileSidebarBackdrop').classList.remove('open');
    }

    function logout() {
      const token = sessionToken;
      localStorage.removeItem('heyo_token');
      sessionToken = '';
      currentUser = null;
      resetAppState();
      showAuthScreen();

      if (token) {
        google.script.run.logout(token);
      }
    }

    function handleAppError(res) {
      const error = (res && res.error) || 'Unexpected error.';
      if (/session|auth|expired|invalid/i.test(error)) {
        showAlert('Session', error).then(function() {
          logout();
        });
      }
    }

    function openCustomModal(config) {
      return new Promise(function(resolve) {
        activeModalResolver = resolve;

        document.getElementById('modalTitle').textContent = config.title || 'Modal';
        document.getElementById('modalBody').textContent = config.message || '';
        document.getElementById('modalContent').innerHTML = config.html || '';

        const actions = document.getElementById('modalActions');
        actions.innerHTML = '';

        (config.buttons || []).forEach(function(buttonConfig) {
          const btn = document.createElement('button');
          btn.className = buttonConfig.className || 'secondary-btn';
          btn.textContent = buttonConfig.text || 'OK';
          btn.onclick = function() {
            if (typeof config.onAction === 'function') {
              config.onAction(buttonConfig.value);
            } else {
              closeModal(buttonConfig.value);
            }
          };
          actions.appendChild(btn);
        });

        document.getElementById('modalOverlay').classList.add('open');
        document.getElementById('modalOverlay').setAttribute('aria-hidden', 'false');

        const textareas = document.querySelectorAll('#modalContent textarea');
        for (let i = 0; i < textareas.length; i++) {
          autoGrowTextarea(textareas[i]);
          textareas[i].addEventListener('input', function() {
            autoGrowTextarea(this);
          });
        }
      });
    }

    function closeModal(result) {
      document.getElementById('modalOverlay').classList.remove('open');
      document.getElementById('modalOverlay').setAttribute('aria-hidden', 'true');
      document.getElementById('modalContent').innerHTML = '';
      document.getElementById('modalActions').innerHTML = '';

      const resolver = activeModalResolver;
      activeModalResolver = null;
      if (resolver) resolver(result);
    }

    function showAlert(title, message) {
      return openCustomModal({
        title: title,
        message: message,
        buttons: [
          { text: 'OK', className: 'primary-btn', value: true }
        ]
      });
    }

    function showConfirm(title, message, okText, danger) {
      return openCustomModal({
        title: title,
        message: message,
        buttons: [
          { text: 'Cancel', className: 'secondary-btn', value: false },
          { text: okText || 'OK', className: danger ? 'danger-btn' : 'primary-btn', value: true }
        ]
      });
    }

    function showPrompt(title, message, value) {
      return openCustomModal({
        title: title,
        message: message,
        html: `
          <div class="field">
            <textarea id="promptInput" rows="4">${escapeHtml(value || '')}</textarea>
          </div>
        `,
        buttons: [
          { text: 'Cancel', className: 'secondary-btn', value: 'cancel' },
          { text: 'Save', className: 'primary-btn', value: 'save' }
        ],
        onAction: function(action) {
          if (action !== 'save') {
            closeModal(null);
            return;
          }
          const input = document.getElementById('promptInput');
          closeModal(input ? input.value : null);
        }
      });
    }

    function showToast(message) {
      showAlert('Notice', message);
    }

    function autoGrowTextarea(el) {
      if (!el) return;
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 180) + 'px';
    }

    function findMessageCardNode(target) {
      if (!target) return null;
      return target.closest('.message-card[data-message-id]');
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/\n/g, '&#10;');
    }

    function escapeJsString(value) {
      return String(value || '')
        .replace(/\\/g, '\\\\')
        .replace(/'/g, "\\'")
        .replace(/\r/g, '\\r')
        .replace(/\n/g, '\\n')
        .replace(/</g, '\\x3C')
        .replace(/>/g, '\\x3E');
    }

    function truncate(value, maxLen) {
      const text = String(value || '');
      if (text.length <= maxLen) return text;
      return text.slice(0, maxLen - 1) + '…';
    }

    function getInitial(value) {
      const text = String(value || '').trim();
      return text ? text.charAt(0).toUpperCase() : 'U';
    }

    function formatMessageTime(iso) {
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '';
      return d.toLocaleString([], {
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function formatSidebarTime(iso) {
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '';
      const now = new Date();

      const sameDay =
        d.getFullYear() === now.getFullYear() &&
        d.getMonth() === now.getMonth() &&
        d.getDate() === now.getDate();

      if (sameDay) {
        return d.toLocaleTimeString([], {
          hour: '2-digit',
          minute: '2-digit'
        });
      }

      return d.toLocaleDateString([], {
        month: 'short',
        day: 'numeric'
      });
    }

    function formatFileSize(bytes) {
      const value = Number(bytes);
      if (!Number.isFinite(value) || value <= 0) return '0 B';
      const units = ['B', 'KB', 'MB', 'GB', 'TB'];
      let size = value;
      let unit = 0;
      while (size >= 1024 && unit < units.length - 1) {
        size /= 1024;
        unit += 1;
      }
      const digits = size >= 10 || unit === 0 ? 0 : 1;
      return size.toFixed(digits) + ' ' + units[unit];
    }

    function detectAttachmentCategory(mimeType) {
      const type = String(mimeType || '').toLowerCase();
      if (type.startsWith('image/')) return 'image';
      if (type.startsWith('video/')) return 'video';
      if (type.startsWith('audio/')) return 'audio';
      return 'file';
    }

    function extractFileExtension(name) {
      const text = String(name || '');
      const idx = text.lastIndexOf('.');
      if (idx <= 0 || idx === text.length - 1) return '';
      return text.slice(idx + 1).toLowerCase();
    }

    function deriveClientMessageType(text, attachments, fallback) {
      const normalizedText = String(text || '').trim();
      if (attachments && attachments.length && normalizedText) return 'mixed';
      if (attachments && attachments.length) return 'file';
      return fallback || 'text';
    }

    function attachmentTypeLabelClient(att) {
      const category = detectAttachmentCategory(att && att.mimeType);
      if (category === 'image') return 'Photo';
      if (category === 'video') return 'Video';
      if (category === 'audio') return 'Audio';
      return 'File';
    }

    function describeAttachmentListShortClient(attachments) {
      if (!attachments || !attachments.length) return '';
      if (attachments.length === 1) {
        return '[' + attachmentTypeLabelClient(attachments[0]) + '] ' + truncate(attachments[0].name || 'file', 60);
      }
      return attachments.length + ' files';
    }

    function getAttachmentIcon(att) {
      const category = detectAttachmentCategory(att && att.mimeType);
      const ext = extractFileExtension(att && att.name);

      if (category === 'image') return '🖼';
      if (category === 'video') return '🎬';
      if (category === 'audio') return '🎵';

      if (['zip', 'rar', '7z', 'tar', 'gz'].includes(ext)) return '🗜';
      if (['pdf'].includes(ext)) return '📕';
      if (['doc', 'docx', 'rtf', 'txt', 'md'].includes(ext)) return '📄';
      if (['xls', 'xlsx', 'csv'].includes(ext)) return '📊';
      if (['ppt', 'pptx'].includes(ext)) return '📽';
      if (['js', 'ts', 'html', 'css', 'json', 'py', 'java', 'go', 'php', 'sql', 'xml', 'yml', 'yaml'].includes(ext)) return '💻';

      return '📎';
    }

    function buildAttachmentMetaText(att) {
      const parts = [];
      parts.push(attachmentTypeLabelClient(att));
      if (att.mimeType) parts.push(att.mimeType);
      if (att.size > 0) parts.push(formatFileSize(att.size));
      return parts.join(' • ');
    }

    document.getElementById('composerInput').addEventListener('input', function() {
      autoGrowTextarea(this);
    });

    document.getElementById('composerInput').addEventListener('keydown', function(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessageFromUI();
      }
    });

    document.getElementById('fileInput').addEventListener('change', function(event) {
      const files = event.target.files;
      if (files && files[0]) {
        handleFileSelection(files[0]);
      }
      event.target.value = '';
    });

    document.getElementById('userSearchInput').addEventListener('input', function() {
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(performUserSearch, 220);
    });

    document.getElementById('modalOverlay').addEventListener('click', function(event) {
      if (event.target === this && activeModalResolver) {
        closeModal(null);
      }
    });

    const messagesEl = document.getElementById('messages');

    messagesEl.addEventListener('contextmenu', function(event) {
      const card = findMessageCardNode(event.target);
      if (!card) return;

      event.preventDefault();

      const messageId = card.getAttribute('data-message-id');
      openMessageDropdownAt(event.clientX, event.clientY, messageId);
    });

    messagesEl.addEventListener('touchstart', function(event) {
      const card = findMessageCardNode(event.target);
      if (!card) return;

      longPressTriggered = false;
      const touch = event.touches && event.touches[0];
      if (!touch) return;

      clearTimeout(longPressTimer);
      longPressTimer = setTimeout(function() {
        longPressTriggered = true;
        const messageId = card.getAttribute('data-message-id');
        openMessageDropdownAt(touch.clientX, touch.clientY, messageId);
      }, 550);
    }, { passive: true });

    messagesEl.addEventListener('touchend', function() {
      clearTimeout(longPressTimer);
    }, { passive: true });

    messagesEl.addEventListener('touchcancel', function() {
      clearTimeout(longPressTimer);
    }, { passive: true });

    messagesEl.addEventListener('touchmove', function() {
      clearTimeout(longPressTimer);
    }, { passive: true });

    messagesEl.addEventListener('click', function(event) {
      if (longPressTriggered) {
        event.preventDefault();
        longPressTriggered = false;
      }
    });

    document.addEventListener('click', function(event) {
      const dropdown = document.getElementById('messageDropdown');
      const searchWrap = document.getElementById('searchResults');

      if (dropdownState.open && !dropdown.contains(event.target)) {
        closeMessageDropdown();
      }

      if (
        searchWrap.classList.contains('open') &&
        !document.getElementById('userSearchInput').contains(event.target) &&
        !searchWrap.contains(event.target)
      ) {
        clearSearchResults();
      }
    });

    document.addEventListener('scroll', function() {
      closeMessageDropdown();
    }, true);

    window.addEventListener('resize', function() {
      closeMessageDropdown();
      if (window.innerWidth > 900) {
        closeMobileSidebar();
      }
    });

    verifySession();
    renderTips();
  </script>
</body>
</html>
