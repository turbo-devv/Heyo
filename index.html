<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.gstatic.com https://*.google.com https://securetoken.googleapis.com https://identitytoolkit.googleapis.com https://firestore.googleapis.com https://firebaseinstallations.googleapis.com https://oauth2.googleapis.com; frame-src 'self' https://drive.google.com https://docs.google.com https://www.google.com; worker-src 'self' blob:">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=(), usb=()">
<link rel="icon" type="image/png" sizes="32x32" href="./favicon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4f46e5">
<style>
@import url('https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap');


:root{
  --bg:#f5f6fa; --panel:#fff; --panel-2:#f8f9fd; --text:#20242c; --muted:#6e7685;
  --border:#e5e8f0; --danger:#d92d20; --success:#0f9d58; --warning:#ca8a04;
  --overlay:rgba(15,23,42,.44); --my-msg:#edf2ff; --other-msg:#fff;
  --reply-bg:#f4f6fb; --shadow:0 14px 34px rgba(15,23,42,.10);
  --sidebar-width:310px; --online:#22c55e; --accent:#4f46e5; --accent-soft:#eef0ff;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
body.dark{
  --bg:#0d1117; --panel:#151b23; --panel-2:#10161d; --text:#e6edf3; --muted:#98a5b7;
  --border:#263041; --danger:#ff6b6b; --success:#39c57a; --warning:#facc15;
  --overlay:rgba(0,0,0,.58); --my-msg:#1a2747; --other-msg:#161d28;
  --reply-bg:#111824; --shadow:0 16px 36px rgba(0,0,0,.34);
}

body.ac-indigo{--accent:#4f46e5;--accent-soft:#eef0ff} body.dark.ac-indigo{--accent:#7c8cff;--accent-soft:#1d2442}
body.ac-red{--accent:#dc2626;--accent-soft:#fef2f2} body.dark.ac-red{--accent:#f87171;--accent-soft:#3b1111}
body.ac-blue{--accent:#2563eb;--accent-soft:#eff6ff} body.dark.ac-blue{--accent:#60a5fa;--accent-soft:#172554}
body.ac-orange{--accent:#ea580c;--accent-soft:#fff7ed} body.dark.ac-orange{--accent:#fb923c;--accent-soft:#431407}
body.ac-yellow{--accent:#ca8a04;--accent-soft:#fefce8} body.dark.ac-yellow{--accent:#facc15;--accent-soft:#422006}
body.ac-pink{--accent:#db2777;--accent-soft:#fdf2f8} body.dark.ac-pink{--accent:#f472b6;--accent-soft:#500724}
body.ac-purple{--accent:#7c3aed;--accent-soft:#f5f3ff} body.dark.ac-purple{--accent:#a78bfa;--accent-soft:#2e1065}
body.ac-gray{--accent:#6b7280;--accent-soft:#f3f4f6} body.dark.ac-gray{--accent:#9ca3af;--accent-soft:#1f2937}
body.ac-green{--accent:#16a34a;--accent-soft:#f0fdf4} body.dark.ac-green{--accent:#4ade80;--accent-soft:#052e16}

*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
html,body{height:100%;height:-webkit-fill-available}
body{margin:0;font-family:'Ubuntu',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg)!important;color:var(--text);overflow:hidden;user-select:none;-webkit-font-smoothing:antialiased}
input,textarea{user-select:text;font:inherit} button,select{font:inherit} textarea{resize:none} a{color:inherit;text-decoration:none}
/* Dark theme icon fixes */
body.dark .icon-btn{color:var(--text);border-color:var(--border)}
body.dark .att-ico{color:var(--accent)}
body.dark .admin-row{border-color:var(--border);background:var(--panel)}
body.dark .ci.active{background:var(--accent-soft)}
body.dark .modal{background:var(--panel);border-color:var(--border)}
body.dark input,body.dark textarea,body.dark select{color:var(--text);background:var(--panel-2);border-color:var(--border)}
body.dark .secondary-btn{color:var(--text);background:var(--panel-2);border-color:var(--border)}
body.dark .p-st.off{color:var(--muted);background:var(--panel-2)}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}
*{scrollbar-width:thin;scrollbar-color:var(--border) transparent}
@keyframes heyo-spin{to{transform:rotate(360deg)}}
@keyframes heyo-dropdown-in{from{opacity:0;transform:scale(.96) translateY(-4px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes heyo-fade-in{from{opacity:0}to{opacity:1}}
.heyo-spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:heyo-spin .6s linear infinite;margin:12px auto}
.submit-btn:hover:not([disabled]),.primary-btn:hover:not([disabled]){filter:brightness(1.1)}
.danger-btn:hover:not([disabled]){filter:brightness(1.1)}
.warning-btn:hover:not([disabled]){filter:brightness(1.08)}
.secondary-btn:hover:not([disabled]){background:var(--accent-soft)}
body.dark .secondary-btn:hover:not([disabled]){background:var(--panel-2);border-color:var(--accent)}
body.app-booting{background:var(--bg)!important}
body.app-booting>*{visibility:hidden}
body.app-booting::before{content:'Heyo';position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--text);font:700 28px/1 'Ubuntu',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;letter-spacing:.04em;z-index:30000}

.screen{display:none;height:100vh;height:100dvh;width:100%;overflow:hidden}.screen.active{display:flex}
.auth-screen{align-items:center;justify-content:center;padding:20px;background:var(--bg)!important;overflow-y:auto}
.auth-card{width:100%;max-width:420px;background:var(--panel);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:20px}
.auth-brand{font-size:24px;font-weight:700;margin-bottom:8px}
.auth-sub{font-size:14px;color:var(--muted);margin-bottom:14px;line-height:1.5}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tabs button{flex:1;height:42px;border-radius:10px;border:1px solid var(--border);background:var(--panel-2);color:var(--text);font-weight:700;cursor:pointer;font-size:14px;transition:background .15s,color .15s}
.tabs button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.auth-block{display:none}.auth-block.active{display:block}
.field{margin-bottom:10px}
.field label{display:block;font-size:13px;color:var(--muted);font-weight:700;margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;border:1px solid var(--border);background:var(--panel-2);color:var(--text);border-radius:10px;outline:none;padding:11px 12px;font-size:15px;transition:border-color .15s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 12%,transparent)}
.field-row{display:flex;gap:10px}.field-row>*{flex:1;min-width:0}
.pw-field{position:relative}
.pw-field input{padding-right:48px}
.pw-toggle{position:absolute;right:8px;bottom:7px;width:34px;height:34px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:8px;font-size:16px}
.pw-toggle:hover{background:var(--accent-soft);color:var(--accent)}
.submit-btn,.primary-btn,.secondary-btn,.danger-btn,.warning-btn{border:none;border-radius:10px;cursor:pointer;font-weight:700;padding:11px 14px;font-size:14px;transition:opacity .15s,transform .1s,filter .15s}
.submit-btn:active,.primary-btn:active,.secondary-btn:active,.danger-btn:active,.warning-btn:active{transform:scale(.97)}
.submit-btn,.primary-btn{background:var(--accent);color:#fff}
.secondary-btn{background:var(--panel-2);color:var(--text);border:1px solid var(--border)}
.danger-btn{background:var(--danger);color:#fff}
.warning-btn{background:var(--warning);color:#111}
[disabled]{opacity:.6;cursor:not-allowed}
.submit-btn{width:100%;margin-top:4px}
.status{min-height:20px;margin-top:12px;font-size:14px;color:var(--muted)}
.status.error{color:var(--danger)}
.status.ok{color:var(--muted)}

.app-shell{display:grid;grid-template-columns:var(--sidebar-width) 1fr;width:100%;height:100vh;height:100dvh;overflow:hidden;background:var(--bg)!important}
.sidebar{background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;min-width:0;height:100%;overflow:hidden}
.sidebar-head{display:flex;align-items:center;gap:12px;padding:14px;padding-top:calc(14px + var(--safe-top));border-bottom:1px solid var(--border)}
.avatar{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:var(--accent-soft);color:var(--accent);font-weight:700;border:1px solid var(--border);flex-shrink:0;position:relative;overflow:visible;cursor:pointer;font-size:14px;line-height:1;transition:transform .12s}
.avatar.lg{width:54px;height:54px;border-radius:16px;font-size:18px}
.avatar.xl{width:80px;height:80px;border-radius:24px;font-size:28px}
.avatar.no-image{color:#fff;border-color:transparent;box-shadow:inset 0 1px 0 rgba(255,255,255,.18)}
.av-inner{width:100%;height:100%;border-radius:inherit;overflow:hidden;display:flex;align-items:center;justify-content:center;background:transparent;line-height:1;text-transform:uppercase;letter-spacing:0.02em}
.av-inner img{width:100%;height:100%;object-fit:cover;display:block}
.online-dot{width:11px;height:11px;border-radius:50%;background:var(--online);border:2.5px solid var(--panel);position:absolute;bottom:-2px;right:-2px;z-index:2}
.user-box{min-width:0;flex:1}
.user-box .name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-box .meta{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.icon-btn{border:1px solid var(--border);background:var(--panel-2);color:var(--text);width:38px;height:38px;border-radius:10px;cursor:pointer;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;font-size:16px;transition:background .12s}
.icon-btn:hover{background:var(--accent-soft)}
.icon-btn.accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.search-wrap{padding:12px 14px;border-bottom:1px solid var(--border);position:relative}
.search-wrap input{width:100%;border:1px solid var(--border);background:var(--panel-2);color:var(--text);border-radius:10px;outline:none;padding:11px 12px;font-size:14px;line-height:1.25;transition:border-color .15s,box-shadow .15s}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 12%,transparent)}
.search-results{position:absolute;top:calc(100% - 4px);left:14px;right:14px;background:var(--panel);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);max-height:300px;overflow-y:auto;display:none;z-index:1200}
.search-results.open{display:block;animation:heyo-dropdown-in .15s ease}
.si{display:flex;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;align-items:center}
.si:last-child{border-bottom:none}.si:hover{background:var(--panel-2)}
.si-meta{min-width:0;flex:1}
.si-title{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px;min-width:0}
.si-sub{font-size:12px;color:var(--muted)}
.sidebar-body{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:10px}
.sec-title{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:8px 8px 6px;display:flex;align-items:center;justify-content:space-between}
.sec-title .icon-btn{width:24px;height:24px;font-size:14px;border-radius:7px}
.ci{display:flex;gap:10px;align-items:center;padding:10px;border-radius:12px;cursor:pointer;margin-bottom:2px;border:1px solid transparent;transition:background .15s,border-color .15s}
.ci:hover{background:var(--panel-2)}
.ci.active{background:var(--accent-soft);border-color:color-mix(in srgb,var(--accent) 16%,transparent)}
.ci-meta{min-width:0;flex:1}
.ci-line{display:flex;gap:8px;align-items:center;min-width:0}
.ci-t{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-tm{margin-left:auto;flex-shrink:0;font-size:11px;color:var(--muted)}
.ci-sub,.ci-last{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.verified-badge{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;padding:0;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:700;flex:0 0 18px;line-height:1;vertical-align:middle;align-self:center;margin-left:2px}
.title-row{display:inline-flex;align-items:center;gap:6px;min-width:0;max-width:100%}

.chat-panel{display:flex;flex-direction:column;min-width:0;min-height:0;height:100%;overflow:hidden;background:var(--bg)!important}
.chat-topbar{min-height:56px;border-bottom:1px solid var(--border);background:var(--panel);display:flex;align-items:center;gap:12px;padding:10px 14px;padding-top:calc(10px + var(--safe-top));flex-shrink:0}
.ct-box{min-width:0;flex:1;cursor:pointer}
.ct-t{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ct-s{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.chat-main{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)!important}
.placeholder{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)!important}
.ph-card{width:100%;max-width:600px;background:var(--panel);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:24px;text-align:center}
.ph-card h2{margin:0 0 8px;font-size:28px}.ph-card p{margin:0;color:var(--muted);line-height:1.6}
.convo-view{display:none;flex:1;min-height:0;flex-direction:column;overflow:hidden}.convo-view.active{display:flex}
.pin-banner{display:none;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0}
.pin-banner.active{display:flex}
.pin-icon{width:28px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:var(--accent-soft);color:var(--accent);font-size:14px;flex:0 0 28px}
.pin-meta{min-width:0;flex:1}
.pin-title{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:2px}
.pin-text{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.messages{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:14px;display:flex;flex-direction:column;gap:6px;background:var(--bg)!important;overscroll-behavior:contain}
.empty-st{margin:auto;color:var(--muted);text-align:center;padding:24px}
.date-sep{display:flex;align-items:center;gap:12px;padding:6px 0;color:var(--muted);font-size:12px;font-weight:700}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border)}
.mr{display:flex;gap:10px;align-items:flex-start;max-width:85%}
.mr.mine{align-self:flex-end;flex-direction:row-reverse}
.mr .avatar{width:34px;height:34px;border-radius:10px;font-size:13px;flex-shrink:0}
.mc{min-width:0;max-width:100%;background:var(--other-msg);border:1px solid var(--border);border-radius:16px;padding:10px 12px;box-shadow:0 1px 2px rgba(0,0,0,.04);transition:box-shadow .15s}
.mr.mine .mc{background:var(--my-msg)}
.mh{display:flex;gap:8px;align-items:center;margin-bottom:4px}
.mh-a{font-size:13px;font-weight:700;cursor:pointer}.mh-a:hover{text-decoration:underline}
.mh-u{font-size:12px;color:var(--muted)}
.m-fwd{font-size:11px;color:var(--accent);font-weight:700;margin-bottom:4px}
.m-rpl{border-left:3px solid var(--accent);background:var(--reply-bg);border-radius:10px;padding:7px 10px;margin-bottom:6px;overflow:hidden;max-width:100%}
.m-rpl-n{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:2px}
.m-rpl-t{font-size:12px;color:var(--muted);white-space:pre-wrap;word-break:break-word}
.m-txt{white-space:pre-wrap;word-break:break-word;line-height:1.55;user-select:text}
.m-atts{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.att-card{border:1px solid var(--border);background:var(--panel-2);border-radius:14px;overflow:hidden}
.att-img{display:block;width:100%;max-width:400px;max-height:340px;object-fit:contain;cursor:pointer}
.att-vw{position:relative;width:100%;max-width:720px;background:#000}.att-vw iframe,.att-vw video,.att-vw object,.att-vw embed{width:100%;height:320px;border:none;display:block}
.att-aw{padding:12px}.att-aw iframe,.att-aw audio{width:100%;height:80px;border:none;display:block}
.att-doc{width:100%;max-width:720px;height:360px;border:none;background:var(--panel)}
.att-text-preview{padding:12px 14px;max-width:720px;max-height:260px;overflow:auto;background:var(--panel);border-bottom:1px solid var(--border);font:13px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre-wrap;word-break:break-word;color:var(--text)}
.att-loading{color:var(--muted);font-style:italic}
.att-fallback{display:flex;align-items:center;justify-content:center;min-height:120px;padding:16px;color:#fff;background:linear-gradient(180deg,#1f2937,#0f172a)}
.att-file{display:flex;align-items:flex-start;gap:10px;padding:12px}
.att-ico{width:42px;height:42px;border-radius:12px;border:1px solid var(--border);background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;font-size:18px;flex-shrink:0}
.att-body{min-width:0;flex:1}.att-name{font-size:14px;font-weight:700;word-break:break-word}
.att-meta{margin-top:4px;font-size:12px;color:var(--muted)}
.att-acts{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.att-lnk{display:inline-flex;align-items:center;min-height:32px;padding:6px 10px;border-radius:10px;text-decoration:none;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:12px;font-weight:700}
.att-cap{padding:8px 12px;border-top:1px solid var(--border)}
.att-cap-n{font-size:13px;font-weight:700}.att-cap-m{font-size:12px;color:var(--muted);margin-top:2px}
.m-meta{display:flex;gap:8px;margin-top:6px;font-size:12px;color:var(--muted);flex-wrap:wrap;align-items:center}
.m-reacts{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.m-react-chip,.m-react-add{display:inline-flex;align-items:center;gap:6px;min-height:30px;padding:5px 10px;border-radius:999px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:12px;font-weight:700;cursor:pointer}
.m-react-chip.mine{background:var(--accent-soft);border-color:color-mix(in srgb,var(--accent) 28%, var(--border));color:var(--accent)}
.m-react-add{padding:5px 9px;color:var(--muted)}
.m-react-picker{display:none;gap:6px;flex-wrap:wrap;margin-top:8px;padding:8px;border:1px solid var(--border);background:var(--panel-2);border-radius:12px}
.m-react-picker.open{display:flex}
.m-react-picker button{border:none;background:var(--panel);border:1px solid var(--border);border-radius:999px;padding:6px 10px;cursor:pointer;font-size:16px;line-height:1}
.inv-card{border:1px solid var(--border);background:var(--panel-2);border-radius:14px;padding:12px;margin-top:6px}
.inv-head{display:flex;gap:10px;align-items:center}
.inv-meta{min-width:0;flex:1}
.inv-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inv-sub{font-size:12px;color:var(--muted);margin-top:2px}
.inv-acts{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.inv-btn{display:inline-flex;align-items:center;justify-content:center;min-height:34px;padding:8px 12px;border-radius:10px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-weight:700}
.inv-sec{display:inline-flex;align-items:center;justify-content:center;min-height:34px;padding:8px 12px;border-radius:10px;background:var(--panel);color:var(--text);border:1px solid var(--border);cursor:pointer;font-weight:700}

.comp-wrap{background:var(--panel);border-top:1px solid var(--border);padding:12px 14px;padding-bottom:calc(14px + var(--safe-bottom));flex-shrink:0;max-height:40vh;overflow-y:auto}

})();

var friendlyUA = (function(){
  try{
    if(navigator.userAgentData){
      var d=navigator.userAgentData;
      var brands=(d.brands||[]).filter(function(b){return b.brand&&b.brand.indexOf('Not')!==0&&b.brand.indexOf('Chromium')===-1});
      var browserName=brands.length?brands[0].brand+(brands[0].version?' '+brands[0].version:''):'Chrome';
      var platform=d.platform||'';
      var mobile=d.mobile?' Mobile':'';
      return browserName+' on '+platform+mobile;
    }
  }catch(e){}
  return navigator.userAgent||'';
})();

function generateId(prefix){
  return prefix + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,10);
}
function makeInitials(value){
  var v=String(value||'').trim();
  if(!v) return 'U';
  var parts=v.split(/\s+/).filter(Boolean);
  if(parts.length===1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0]+parts[1][0]).toUpperCase();
}
function toIso(value){
  if(!value) return '';
  if(typeof value === 'string') return value;
  if(value instanceof Date) return value.toISOString();
  if(typeof value.toDate === 'function') return value.toDate().toISOString();
  return '';
}
function safeLower(value){ return String(value||'').trim().toLowerCase(); }
function normalizeUsername(value){ return String(value||'').trim().replace(/^@+/,'').toLowerCase(); }
const RESERVED_USERNAMES = ['heyo','admin','support','moderator','official','system','telegram','discord','owner','root','null','undefined','usonance'];

function isReservedUsername(username){ return RESERVED_USERNAMES.indexOf(normalizeUsername(username))!==-1; }

function urlBase64ToUint8Array(base64String){
  var padding='='.repeat((4 - base64String.length % 4) % 4);
  var base64=(base64String + padding).replace(/-/g,'+').replace(/_/g,'/');
  var rawData=atob(base64);
  var outputArray=new Uint8Array(rawData.length);
  for(var i=0;i<rawData.length;++i) outputArray[i]=rawData.charCodeAt(i);
  return outputArray;
}

async function syncConversationSummaryToMembers(conversationId, conversationData, roleOverrides){
  try{
    var memberSnap=await getDocs(collection(db, CONVERSATION_COLLECTION, conversationId, MEMBER_SUBCOLLECTION));
    var updates=[];
    memberSnap.forEach(function(memberDoc){
      var memberRole=(roleOverrides&&roleOverrides[memberDoc.id]) || ((memberDoc.data()||{}).role || 'member');
      updates.push(addUserToConversationIndexes(memberDoc.id, conversationId, buildConversationSummaryPayload(conversationId, conversationData, memberRole)));
    });
    await Promise.all(updates);
  }catch(e){ console.error(e); }
}

async function refreshActiveConversationDetails(conversationId){
  if(!conversationId) return null;
  try{
    var convoSnap=await getDoc(doc(db, CONVERSATION_COLLECTION, conversationId));
    if(!convoSnap.exists()) return null;
    var data=convoSnap.data()||{};
    var myRole=auth.currentUser ? await getConversationRoleForUser(conversationId, auth.currentUser.uid) : 'member';
    var next=Object.assign(findConversationById(conversationId)||{}, {
      conversationId: conversationId,
      type: data.type || 'group',
      title: data.title || 'Chat',
      subtitle: data.type==='channel' ? t('channel') : (data.subtitle || data.description || ''),
      description: data.description || '',
      initials: data.initials || makeInitials(data.title || 'Chat'),
      avatarFileId: data.avatarURL || '',
      avatarURL: data.avatarURL || '',
      memberCount: Number(data.memberCount || 0),
      lastMessageText: data.lastMessageText || '',
      lastMessageAt: toIso(data.lastMessageAt),
      updatedAt: toIso(data.updatedAt),
      createdBy: data.createdBy || '',
      myRole: myRole,
      isOfficial: !!data.isOfficial,
      slowModeSeconds: Number(data.slowModeSeconds || 0),
      pinnedMessage: data.pinnedMessage || null
    });
    conversations=conversations.map(function(item){ return item.conversationId===conversationId ? next : item; });
    if(!findConversationById(conversationId)) conversations.unshift(next);
    if(activeConversationId===conversationId) activeConversation=next;
    return next;
  }catch(error){
    console.error(error);
    return null;
  }
}

function isProbablyUrl(value){ return /^https?:\/\//i.test(String(value||'')); }
function sanitizeDriveFileId(value){ return String(value||'').trim().replace(/[^a-zA-Z0-9_-]/g,''); }
function extractDriveFileId(value){
  var raw=String(value||'').trim();
  if(!raw) return '';
  if(!isProbablyUrl(raw)) return sanitizeDriveFileId(raw);
  var match=raw.match(/\/d\/([a-zA-Z0-9_-]{10,})/) || raw.match(/[?&]id=([a-zA-Z0-9_-]{10,})/);
  return match ? sanitizeDriveFileId(match[1]) : '';
}
function driveUcUrl(fileId){ var clean=extractDriveFileId(fileId); return clean?'https://drive.usercontent.google.com/download?id='+encodeURIComponent(clean)+'&export=download&authuser=0&confirm=t':''; }
function driveInlineUrl(fileId){ var clean=extractDriveFileId(fileId); return clean?'https://drive.usercontent.google.com/download?id='+encodeURIComponent(clean)+'&export=view&authuser=0&confirm=t':''; }
function driveThumbUrl(fileId,size){ var clean=extractDriveFileId(fileId); return clean?'https://lh3.googleusercontent.com/d/'+encodeURIComponent(clean)+'=w'+encodeURIComponent(size||1600):''; }
function drivePreviewFrameUrl(fileId){ var clean=extractDriveFileId(fileId); return clean?'https://drive.google.com/file/d/'+encodeURIComponent(clean)+'/preview':''; }
function docsViewerUrl(sourceUrl){ return sourceUrl?'https://docs.google.com/gview?embedded=1&url='+encodeURIComponent(sourceUrl):''; }
function resolveDriveLikeUrl(value, mode){
  var raw=String(value||'').trim();
  if(!raw) return '';
  var fileId=extractDriveFileId(raw);
  if(isProbablyUrl(raw) && !fileId) return raw;
  if(mode==='thumb') return driveThumbUrl(fileId||raw, 1600);
  if(mode==='preview') return drivePreviewFrameUrl(raw);
  if(mode==='inline') return driveInlineUrl(fileId||raw);
  return driveUcUrl(raw);
}

function hashString(value){
  var text=String(value||'');
  var hash=0;
  for(var i=0;i<text.length;i++) hash=((hash<<5)-hash)+text.charCodeAt(i);
  return Math.abs(hash);
}

function getAvatarGradient(value){
  var palettes=[
    ['#3b82f6','#2563eb'],['#ef4444','#b91c1c'],['#06b6d4','#0284c7'],
    ['#f97316','#ea580c'],['#eab308','#ca8a04'],['#ec4899','#db2777'],
    ['#8b5cf6','#7c3aed'],['#6b7280','#374151'],['#22c55e','#15803d']
  ];
  var pair=palettes[hashString(value)%palettes.length];
  return 'linear-gradient(180deg,'+pair[0]+', '+pair[1]+')';
}

function buildAvatarSeed(value, fallback){

}

function detectModerationIssue(text){
  var value=String(text||'').trim();
  if(!value) return '';
  for(var i=0;i<FORBIDDEN_CONTENT_PATTERNS.length;i++){
    if(FORBIDDEN_CONTENT_PATTERNS[i].test(value)) return 'forbidden-content';
  }
  return '';
}

function driveImageUrl(fileId){ return resolveDriveLikeUrl(fileId,'thumb') || resolveDriveLikeUrl(fileId,'inline') || resolveDriveLikeUrl(fileId,'download'); }
function drivePreviewUrl(fileId){ return resolveDriveLikeUrl(fileId,'preview'); }
function driveViewUrl(fileId){ return resolveDriveLikeUrl(fileId,'download'); }

    messageType: data.messageType || 'text',
    attachments: Array.isArray(data.attachments) ? data.attachments : [],
    reactions: normalizeReactionsMap(data.reactions || {}),
    meta: data.meta || {},
    replyToMessageId: data.replyToMessageId || '',
    replyDisplayName: data.replyDisplayName || '',
    replyPreview: data.replyPreview || '',
    forwardedFromMessageId: data.forwardedFromMessageId || '',
    forwardedFromTitle: data.forwardedFromTitle || ''
  };
}

function normalizeReactionsMap(raw){
  var out={};
  if(!raw || typeof raw!=='object') return out;
  Object.keys(raw).forEach(function(emoji){
    if(!emoji) return;
    var ids=Array.isArray(raw[emoji]) ? raw[emoji].filter(Boolean) : [];
    if(ids.length) out[emoji]=Array.from(new Set(ids));
  });
  return out;
}

var _ownerAccessToken = '';
var _ownerTokenExpires = 0;

async function getOwnerDriveToken(){
  if(_ownerAccessToken && Date.now() < _ownerTokenExpires) return _ownerAccessToken;
  if(!DRIVE_CLIENT_ID || !DRIVE_CLIENT_SECRET || !DRIVE_REFRESH_TOKEN){
    throw new Error('Drive OAuth config is incomplete. Check CLIENT_ID, CLIENT_SECRET and REFRESH_TOKEN in config.js');
  }
  var res = await fetch('https://oauth2.googleapis.com/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: 'client_id='+encodeURIComponent(DRIVE_CLIENT_ID)+'&client_secret='+encodeURIComponent(DRIVE_CLIENT_SECRET)+'&refresh_token='+encodeURIComponent(DRIVE_REFRESH_TOKEN)+'&grant_type=refresh_token'
  });
  var data;
  try{
    data = await res.json();
  }catch(parseError){
    data = {};
  }
  if(!res.ok){
    throw new Error('Failed to get Drive token: ' + (data.error_description || data.error || ('HTTP ' + res.status)));
  }
  if(!data.access_token) throw new Error('Failed to get Drive token: '+(data.error_description||data.error||'unknown'));
  _ownerAccessToken = data.access_token;
  _ownerTokenExpires = Date.now() + ((Number(data.expires_in)||3500) - 60) * 1000;
  return _ownerAccessToken;
}

async function createDriveResumableSession(file, accessToken){
  var res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable&fields=id,name,webViewLink,webContentLink,iconLink,thumbnailLink,mimeType,size', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + accessToken,
      'Content-Type': 'application/json; charset=UTF-8',
      'X-Upload-Content-Type': file.type || 'application/octet-stream',
      'X-Upload-Content-Length': String(file.size)
    },
    body: JSON.stringify({ name: file.name })
  });
  if(!res.ok){
    var text = await res.text();
    throw new Error('Drive session failed: ' + res.status + ' ' + text);
  }
  var uploadUrl = res.headers.get('Location');
  if(!uploadUrl) throw new Error('Drive did not return upload URL');
  return uploadUrl;
}

      method:'POST',
      headers:{'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},
      body:JSON.stringify({role:'reader',type:'anyone'})
    });
  }catch(e){ console.error('makeDriveFilePublic error:',e); }
}

    fileId: driveMeta.id||'',
    name: driveMeta.name||file.name||'file',

    webViewLink: driveMeta.webViewLink||'',

    thumbnailLink: driveMeta.thumbnailLink||'',
    iconLink: driveMeta.iconLink||'',

  };

function uploadFileToDriveResumable(file, uploadUrl, onProgress){
  return new Promise(function(resolve, reject){
    var xhr = new XMLHttpRequest();
    xhr.open('PUT', uploadUrl, true);
    xhr.setRequestHeader('Content-Type', file.type || 'application/octet-stream');
    xhr.upload.onprogress = function(evt){
      if(evt.lengthComputable && typeof onProgress === 'function'){
        onProgress(Math.floor((evt.loaded / evt.total) * 100));
      }
    };
    xhr.onload = function(){
      if(xhr.status >= 200 && xhr.status < 300){
        try{ resolve(JSON.parse(xhr.responseText || '{}')); }catch(e){ resolve({}); }
        return;
      }
      reject(new Error('Upload failed: ' + xhr.status));
    };
    xhr.onerror = function(){ reject(new Error('Upload network error.')); };
    xhr.onabort = function(){ reject(new Error('Upload canceled.')); };
    xhr.send(file);
  });
}

/* ======================== Notifications ======================== */

function requestNotificationPermission(){
  if(!('Notification' in window)) return;
  if(Notification.permission==='granted'){
    notificationsEnabled=true;
    ensureNotificationRegistration().catch(function(error){ console.error(error); });
    return;
  }
  if(Notification.permission==='denied') return;
  Notification.requestPermission().then(function(permission){
    notificationsEnabled=(permission==='granted');
    if(notificationsEnabled) ensureNotificationRegistration().catch(function(error){ console.error(error); });
  });
}

function ensureNotificationRegistration(){
  if(!('serviceWorker' in navigator)) return Promise.resolve(null);
  if(notificationRegistrationPromise) return notificationRegistrationPromise;
  notificationRegistrationPromise = navigator.serviceWorker.register('./sw.js').then(function(registration){
    return navigator.serviceWorker.ready.then(function(){ return registration; });
  }).catch(function(error){
    console.error('Service worker registration failed', error);
    return null;
  });
  return notificationRegistrationPromise;
}

function showBrowserNotification(title,body,conversationId){
  if(!notificationsEnabled||!('Notification' in window)||Notification.permission!=='granted') return;
  if(document.hasFocus()&&activeConversationId===conversationId) return;
  ensureNotificationRegistration().then(function(registration){
    try{
      if(registration && typeof registration.showNotification === 'function'){
        registration.showNotification(title,{
          body:body,
          tag:'heyo-'+conversationId,
          renotify:true,
          silent:false,
          data:{ conversationId:conversationId || '' }
        });
        return;
      }
      var notification = new Notification(title,{body:body,icon:'/favicon.ico',tag:'heyo-'+conversationId,renotify:true,silent:false});
      notification.onclick=function(){
        window.focus();
        if(conversationId) selectConversation(conversationId);
        notification.close();
      };
      setTimeout(function(){ try{notification.close();}catch(e){} },8000);
    }catch(e){}
  });
}

function notifyIfNew_(msg){
  if(!msg||msg.isDeletedEvent||msg.deletedAt) return;
  if(msg.isMine) return;
  if(notifiedMessageIds.has(msg.messageId)) return;
  notifiedMessageIds.add(msg.messageId);
  if(notifiedMessageIds.size>500){
    var arr=Array.from(notifiedMessageIds);
    notifiedMessageIds=new Set(arr.slice(arr.length-250));
  }
  if(document.hasFocus()&&activeConversationId===msg.conversationId) return;
  var convo=findConversationById(msg.conversationId);
  var convoTitle=convo?convo.title:'Heyo';
  var body=(msg.displayName||'User')+': '+(msg.text||'[file]');
  showBrowserNotification(convoTitle,body,msg.conversationId);
}

async function findUserByLoginIdentifier(identifier){
  var raw = String(identifier||'').trim();
  if(!raw) return null;
  if(raw.indexOf('@')!==-1 && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(raw)) return {email: raw, uid: null};

  var digits=raw.replace(/[^\d]/g,'');
  if((raw.indexOf('+')===0 && digits.length>=10) || digits.length>=10){
    var possiblePhones=[];
    if(raw.indexOf('+')===0) possiblePhones.push('+'+digits);
    if(digits.length===10) possiblePhones.push('+1'+digits,'+7'+digits);
    if(digits.length===11 && digits[0]==='1') possiblePhones.push('+1'+digits.slice(1));
    if(digits.length===11 && (digits[0]==='7' || digits[0]==='8')) possiblePhones.push('+7'+digits.slice(1));
    possiblePhones=Array.from(new Set(possiblePhones.filter(Boolean)));
    for(var i=0;i<possiblePhones.length;i++){
      var phoneQuery = query(collection(db, PROFILE_COLLECTION), where('phone','==',possiblePhones[i]), limit(1));
      var phoneSnap = await getDocs(phoneQuery);
      if(!phoneSnap.empty){
        var phoneDoc = phoneSnap.docs[0];
        var phoneData = phoneDoc.data() || {};
        return { email: phoneData.email || buildSyntheticPhoneEmail(phoneData.phone), uid: phoneDoc.id };
      }
    }
  }

  var username = normalizeUsername(raw);
  if(username){
    var q = query(collection(db, PROFILE_COLLECTION), where('usernameLower','==',username), limit(1));
    var snap = await getDocs(q);
    if(!snap.empty){
      var docSnap = snap.docs[0];
      var data = docSnap.data() || {};
      return { email: data.email || '', uid: docSnap.id };
    }
  }
  return null;
}

async function joinConversationById(conversationId){
  if(!auth.currentUser || !conversationId) return null;
  var conversationSnap = await getDoc(doc(db, CONVERSATION_COLLECTION, conversationId));
  if(!conversationSnap.exists()) throw new Error('Conversation not found.');
  var convo = conversationSnap.data() || {};
  if(convo.isDeleted) throw new Error('Conversation not found.');

  var memberRef = doc(db, CONVERSATION_COLLECTION, conversationId, MEMBER_SUBCOLLECTION, auth.currentUser.uid);
  var memberSnap = await getDoc(memberRef);
  var role = memberSnap.exists() ? ((memberSnap.data() || {}).role || 'member') : 'member';

  if(!memberSnap.exists()){
    await setDoc(memberRef, {
      uid: auth.currentUser.uid,
      role: role,
      joinedAt: serverTimestamp()
    }, {merge:true});

    var nextCount = Number(convo.memberCount || 0) + 1;
    await updateDoc(doc(db, CONVERSATION_COLLECTION, conversationId), {
      memberCount: nextCount,
      updatedAt: serverTimestamp()
    });
    convo.memberCount = nextCount;
  }

  var summary=buildConversationSummaryPayload(conversationId, convo, role);
  await addUserToConversationIndexes(auth.currentUser.uid, conversationId, summary);
  if(!findConversationById(conversationId)) conversations.unshift(await hydrateConversationFromUserSummary(summary));
  else conversations=conversations.map(function(item){ return item.conversationId===conversationId ? Object.assign({}, item, summary) : item; });
  renderSidebar();
  return conversationId;
}

async function doRegister(){
  try{
    var usePhone=document.getElementById('regPhoneWrap').style.display!=='none';
    var rawPhone=String(document.getElementById('regPh').value||'').trim();
    var phoneCountry=document.getElementById('regPhCo').value||'RU';
    var normalizedPhone='';
    if(usePhone){
      var phoneDigits=rawPhone.replace(/[^\d]/g,'');
      if(phoneCountry==='RU'){
        if(phoneDigits.length===10) normalizedPhone='+7'+phoneDigits;
        else if(phoneDigits.length===11 && (phoneDigits[0]==='7' || phoneDigits[0]==='8')) normalizedPhone='+7'+phoneDigits.slice(1);
      }else if(phoneCountry==='US'){
        if(phoneDigits.length===10) normalizedPhone='+1'+phoneDigits;
        else if(phoneDigits.length===11 && phoneDigits[0]==='1') normalizedPhone='+1'+phoneDigits.slice(1);
      }
      if(!normalizedPhone){
        setAuthStatus('Invalid phone number.','error');
        return;
      }
    }

    var payload={
      displayName:document.getElementById('regDN').value.trim(),
      username:normalizeUsername(document.getElementById('regUN').value.trim()),
      password:document.getElementById('regPw').value,
      email:usePhone?buildSyntheticPhoneEmail(normalizedPhone):(document.getElementById('regEmailWrap').style.display!=='none'?document.getElementById('regEmail').value.trim():''),
      phone:normalizedPhone,
      bio:document.getElementById('regBio').value.trim(),
      theme:'light',
      accentColor:'indigo',
      language:currentLanguage
    };

    if(!payload.displayName||!payload.username||!payload.password||!payload.email){
      setAuthStatus('Required fields missing.','error');
      return;
    }

    if(isReservedUsername(payload.username)){
      setAuthStatus(t('reservedUsername'),'error');
      return;
    }

    if(!(await ensureUsernameAvailable(payload.username))){
      setAuthStatus('Username already taken.','error');
      return;
    }

    setAuthStatus(t('creatingAccount'),'ok');

    var cred = await createUserWithEmailAndPassword(auth, payload.email, payload.password);
    var uid = cred.user.uid;
    var profile = {
      userId: uid,
      uid: uid,
      email: payload.email,
      phone: payload.phone || '',
      username: payload.username,
      usernameLower: payload.username,
      displayName: payload.displayName,
      initials: makeInitials(payload.displayName),
      bio: payload.bio,

  return {
    conversationId: summary.conversationId,
    type: summary.type || 'direct',

    avatarFileId: summary.avatarURL || '',
    avatarURL: summary.avatarURL || '',
    memberCount: Number(summary.memberCount || 0),
    lastMessageText: summary.lastMessageText || '',
    lastMessageAt: toIso(summary.lastMessageAt),
    updatedAt: toIso(summary.updatedAt),

  };

async function listenSidebar(){
  if(!auth.currentUser) return;
  if(typeof sidebarUnsubscribe === 'function'){ try{ sidebarUnsubscribe(); }catch(e){} }

  sidebarUnsubscribe = onSnapshot(
    query(collection(db, PROFILE_COLLECTION, auth.currentUser.uid, USER_CONVO_SUBCOLLECTION), orderBy('updatedAt','desc')),
    async function(snap){
      var list = await Promise.all(snap.docs.map(async function(convoDoc){
        var data = convoDoc.data() || {};
        return hydrateConversationFromUserSummary(data);
      }));
      conversations = list.filter(function(c){ return !c.isDeleted; });
      if(currentUser){
        var channelExists = conversations.some(function(c){ return c.conversationId===APP_CHANNEL_ID; });
        if(!channelExists){
          conversations.unshift({
            conversationId: APP_CHANNEL_ID,
            type: 'channel',
            title: 'Heyo',
            titleLower: 'heyo',
            subtitle: '',
            description: 'Global channel',
            initials: 'H',
            avatarFileId: '',
            avatarURL: '',
            memberCount: 0,
            lastMessageText: '',
            lastMessageAt: '',
            updatedAt: '',
            isDeleted: false,
            myRole: currentUser&&currentUser.username==='usonance' ? 'owner' : 'member',
            isOfficial: true
          });
        }
      }
      activeConversation = findConversationById(activeConversationId);
      syncWindowState();
      renderSidebar();
      renderTopbar();
      updateComposerVisibility();
      refreshOnlineMapFromConversations();
      if(!activeConversationId) showPlaceholder();
    }
  );
}

async function refreshOnlineMapFromConversations(){
  var ids = [];
  conversations.forEach(function(c){
    if(c.type==='direct' && c.otherUserId) ids.push(c.otherUserId);
  });
  ids = Array.from(new Set(ids)).filter(Boolean);
  var results = {};
  var snaps = await Promise.all(ids.map(function(id){ return getDoc(doc(db, PROFILE_COLLECTION, id)).catch(function(){ return null; }); }));
  snaps.forEach(function(s, i){ if(s && s.exists()) results[ids[i]] = !!(s.data()||{}).online; });
  onlineStatusMap = results;
}

/* ======================== Realtime Messages ======================== */

async function loadConversationMessages(forceScroll){
  if(!activeConversationId) return;

  if(typeof messageUnsubscribe === 'function' && activeMessageListenerConversationId !== activeConversationId){
    try{ messageUnsubscribe(); }catch(e){}
    messageUnsubscribe = null;
    activeMessageListenerConversationId = '';
  }

  if(activeMessageListenerConversationId === activeConversationId && typeof messageUnsubscribe === 'function'){
    if(forceScroll) renderAllMessages(true);
    return;
  }

  conversationMessages.set(activeConversationId,[]);
  renderAllMessages(false);
  activeMessageListenerConversationId = activeConversationId;

  var initialLoaded = false;
  messageUnsubscribe = onSnapshot(
    query(collection(db, CONVERSATION_COLLECTION, activeConversationId, MESSAGE_SUBCOLLECTION), orderBy('createdAt','asc')),
    function(snap){
      if(activeConversationId !== activeMessageListenerConversationId) return;

      var nextMessages = [];
      snap.forEach(function(docSnap){
        var m = messageDocToClient(docSnap.id, docSnap.data()||{}, activeConversationId);
        if(!m.deletedAt && !m.isDeletedEvent) nextMessages.push(m);
      });

      nextMessages.sort(function(a,b){
        var ta=a.createdAt?new Date(a.createdAt).getTime():0;
        var tb=b.createdAt?new Date(b.createdAt).getTime():0;
        if(ta!==tb) return ta-tb;
        return String(a.messageId).localeCompare(String(b.messageId));
      });

      conversationMessages.set(activeConversationId,nextMessages);

      if(initialLoaded){
        snap.docChanges().forEach(function(change){
          if(change.type==='added'){
            var added = messageDocToClient(change.doc.id, change.doc.data()||{}, activeConversationId);
            notifyIfNew_(added);
          }
        });
      }

      renderAllMessages(forceScroll || !initialLoaded);
      initialLoaded = true;
    },
    function(error){
      console.error('Messages snapshot failed:', error);
    }
  );
}

function renderAllMessages(forceScroll){
  var messagesContainer=document.getElementById('messagesContainer');
  var messageList=conversationMessages.get(activeConversationId)||[];
  var isNearBottom=Math.abs(messagesContainer.scrollHeight-messagesContainer.scrollTop-messagesContainer.clientHeight)<120;

  if(!messageList.length){
    messagesContainer.innerHTML='<div class="empty-st">'+t('noMessages')+'</div>';
    return;
  }

  var htmlParts=[], previousDateString='';
  for(var i=0;i<messageList.length;i++){
    var message=messageList[i];
    var dateString=getDateString(message.createdAt);
    if(dateString&&dateString!==previousDateString){
      htmlParts.push('<div class="date-sep">'+escapeHtml(formatDateSeparator(message.createdAt))+'</div>');
      previousDateString=dateString;
    }
    htmlParts.push(renderSingleMessage(message));
  }

  messagesContainer.innerHTML=htmlParts.join('');
  hydrateInlineAttachmentPreviews();
  if(forceScroll||isNearBottom) messagesContainer.scrollTop=messagesContainer.scrollHeight;
}

function getDateString(isoString){
  if(!isoString) return '';
  var date=new Date(isoString);
  if(isNaN(date.getTime())) return '';
  return date.getFullYear()+'-'+(date.getMonth()+1)+'-'+date.getDate();
}

function formatDateSeparator(isoString){
  var date=new Date(isoString);
  if(isNaN(date.getTime())) return '';
  var now=new Date();
  if(date.toDateString()===now.toDateString()) return t('today');
  var yesterday=new Date(now); yesterday.setDate(yesterday.getDate()-1);
  if(date.toDateString()===yesterday.toDateString()) return t('yesterday');
  return date.toLocaleDateString(getCurrentLocale(),{year:'numeric',month:'long',day:'numeric'});
}

function renderSingleMessage(message){
  var mineClass=message.isMine?'mine':'';
  var isOnline=onlineStatusMap[message.userId]||false;
  var avatarClickHandler="openProfile('"+escapeJsString(message.userId)+"')";
  var msgAvatar=message.avatarFileId||'';
  if(!msgAvatar&&message.isMine&&currentUser&&currentUser.avatarFileId) msgAvatar=currentUser.avatarFileId;

  var forwardedHtml='';
  if(message.forwardedFromMessageId){
    var sourceLabel=message.forwardedFromTitle?escapeHtml(message.forwardedFromTitle):'';
    forwardedHtml='<div class="m-fwd">↗ '+t('forwarded')+' '+sourceLabel+'</div>';
  }

  var replyHtml='';
  if(message.replyToMessageId){
    replyHtml='<div class="m-rpl"><div class="m-rpl-n">'+escapeHtml(message.replyDisplayName||'')+'</div><div class="m-rpl-t">'+escapeHtml(message.replyPreview||'')+'</div></div>';
  }

  var specialHtml=renderSpecialMessageContent(message);
  var attachmentsHtml=renderMessageAttachments(message.attachments||[]);
  var textHtml=message.text?'<div class="m-txt">'+renderFormattedMessageText(message.text)+'</div>':'';
  var reactionsHtml=renderMessageReactions(message);
  var metaParts=[];
  if(message.createdAt) metaParts.push(formatMessageTime(message.createdAt));
  if(message.editedAt) metaParts.push(t('edited'));
  var metaHtml=metaParts.map(function(part){ return '<span>'+escapeHtml(part)+'</span>'; }).join('');

  return '<div class="mr '+mineClass+'">'+
    buildAvatarHTML(message.initials,msgAvatar,'',isOnline,avatarClickHandler,message.userId||message.username||message.initials)+
    '<div class="mc" data-mid="'+escapeAttr(message.messageId)+'" data-own="'+(message.isMine?'1':'0')+'">'+
      '<div class="mh"><div class="mh-a" onclick="openProfile(\''+escapeJsString(message.userId)+'\')">'+escapeHtml(message.displayName||'User')+'</div><div class="mh-u">@'+escapeHtml(message.username||'')+'</div></div>'+
      forwardedHtml+replyHtml+specialHtml+attachmentsHtml+textHtml+
      '<div class="m-meta">'+metaHtml+'</div>'+reactionsHtml+
    '</div></div>';
}

const COMMON_REACTIONS = ['👍','❤️','🔥','😂','😮','😢'];

function renderMessageReactions(message){
  var reactionEntries=Object.keys(message.reactions||{}).map(function(emoji){
    var ids=Array.isArray(message.reactions[emoji]) ? message.reactions[emoji] : [];
    return {emoji:emoji,count:ids.length,mine:ids.indexOf(currentUser&&currentUser.userId)!==-1};
  }).filter(function(entry){ return entry.count>0; });
  var chips=reactionEntries.map(function(entry){
    return '<button class="m-react-chip'+(entry.mine?' mine':'')+'" onclick="toggleReaction(\''+escapeJsString(message.messageId)+'\',\''+escapeJsString(entry.emoji)+'\')">'+escapeHtml(entry.emoji)+' <span>'+escapeHtml(String(entry.count))+'</span></button>';
  }).join('');
  var picker='<div id="reactPicker_'+escapeAttr(message.messageId)+'" class="m-react-picker">'+COMMON_REACTIONS.map(function(emoji){
    return '<button onclick="toggleReaction(\''+escapeJsString(message.messageId)+'\',\''+escapeJsString(emoji)+'\')">'+escapeHtml(emoji)+'</button>';
  }).join('')+'</div>';
  return '<div class="m-reacts">'+chips+'<button class="m-react-add" onclick="toggleReactionPicker(\''+escapeJsString(message.messageId)+'\')">+</button></div>'+picker;
}

function renderSpecialMessageContent(message){
  if(message.messageType==='group_invite'){
    var meta=message.meta||{};
    var title=meta.groupTitle||'Group';
    var avatarFileId=meta.groupAvatarURL||'';
    var initials=meta.groupInitials||'G';
    var memberCount=Number(meta.memberCount||0);
    var conversationId=String(meta.groupConversationId||'');
    var isAlreadyIn=!!findConversationById(conversationId);
    return '<div class="inv-card"><div class="inv-head">'+buildAvatarHTML(initials,avatarFileId,'',false,"openConversationProfileById('"+escapeJsString(conversationId)+"')",conversationId||title||initials)+'<div class="inv-meta"><div class="inv-title">'+escapeHtml(title)+'</div><div class="inv-sub">'+escapeHtml(String(memberCount)+' '+t('members'))+'</div></div></div><div class="inv-acts">'+
      (isAlreadyIn?'<button class="inv-sec" onclick="selectConversation(\''+escapeJsString(conversationId)+'\')">'+t('openGroup')+'</button>':'<button class="inv-btn" onclick="joinGroupFromMessage(\''+escapeJsString(meta.inviteCode||'')+'\')">'+t('joinGroup')+'</button>')+
      '<button class="inv-sec" onclick="openConversationProfileById(\''+escapeJsString(conversationId)+'\')">'+t('groupProfile')+'</button>'+
      '</div></div>';
  }
  return '';
}

/* ======================== Attachment Rendering ======================== */

function renderMessageAttachments(attachments){
  if(!attachments||!attachments.length) return '';
  return '<div class="m-atts">'+attachments.map(renderSingleAttachment).join('')+'</div>';
}

function renderSingleAttachment(attachment){
  var sourceId = attachment.fileId || attachment.webContentLink || attachment.webViewLink || attachment.thumbnailLink || '';
  var fileName = escapeHtml(attachment.name || 'file');
  var metaText = escapeHtml(buildAttachmentMetaText(attachment));
  var category = detectFileCategory(attachment.mimeType);

  var directUrl = driveDownloadUrl(sourceId || attachment.downloadURL || '');
  var inlineUrl = driveInlineMediaUrl(sourceId || attachment.downloadURL || '');
  var previewUrl = drivePreviewUrl(sourceId || attachment.downloadURL || '');
  var openUrl = directUrl || previewUrl || '#';
  var docViewer = docsViewerUrl(directUrl || inlineUrl || openUrl);

  var viewLink = escapeAttr(openUrl);
  var downloadLink = escapeAttr(directUrl);

  if(category==='image'){
    var imageSrc = escapeAttr(driveImageUrl(sourceId));
    return '<div class="att-card"><img class="att-img" src="'+imageSrc+'" alt="'+fileName+'" loading="lazy" onclick="previewFullImage(\''+escapeJsString(imageSrc)+'\')" onerror="this.outerHTML=\'<div class=&quot;att-fallback&quot;>'+escapeJsString(attachment.name || 'Image unavailable')+'<\/div>\'">'+

function hydrateInlineAttachmentPreviews(){
  document.querySelectorAll('[data-text-preview-url]').forEach(function(node){
    if(node.dataset.loaded==='1') return;
    node.dataset.loaded='1';
    var url=node.getAttribute('data-text-preview-url');
    if(!url){ node.textContent=t('previewUnavailable'); node.classList.remove('att-loading'); return; }
    fetch(url,{headers:{Range:'bytes=0-32767'}}).then(function(response){ return response.text(); }).then(function(text){
      var preview=String(text||'').replace(/\u0000/g,'').trim();
      node.textContent=preview ? truncateString(preview, 1200) : t('previewUnavailable');
      node.classList.remove('att-loading');
    }).catch(function(){
      node.textContent=t('previewUnavailable');
      node.classList.remove('att-loading');
    });
  });
}

async function toggleReaction(messageId, emoji){
  closeDropdown();
  if(!activeConversationId || !currentUser || !emoji) return;
  try{
    var messageRef=doc(db, CONVERSATION_COLLECTION, activeConversationId, MESSAGE_SUBCOLLECTION, messageId);
    await runTransaction(db, async function(tx){
      var snap=await tx.get(messageRef);
      if(!snap.exists()) throw new Error('Message not found.');
      var data=snap.data()||{};
      var reactions=normalizeReactionsMap(data.reactions||{});
      var ids=Array.isArray(reactions[emoji]) ? reactions[emoji].slice() : [];
      var index=ids.indexOf(currentUser.userId);
      if(index===-1) ids.push(currentUser.userId);
      else ids.splice(index,1);
      if(ids.length) reactions[emoji]=ids;
      else delete reactions[emoji];
      tx.update(messageRef,{reactions:reactions,updatedAt:serverTimestamp()});
    });
    closeAllReactionPickers();
  }catch(error){
    console.error(error);
    showAlert(t('sendMessage'),error && error.message ? error.message : t('failedGeneric'));
  }
}

function closeAllReactionPickers(){
  document.querySelectorAll('.m-react-picker.open').forEach(function(node){ node.classList.remove('open'); });

function toggleReactionPicker(messageId){
  var picker=document.getElementById('reactPicker_'+messageId);

async function updateConversationLastMessage(conversationId, text, createdAtValue){
  try{
    await updateDoc(doc(db, CONVERSATION_COLLECTION, conversationId), {
      lastMessageText: text || '',
      lastMessageAt: createdAtValue || serverTimestamp(),
      updatedAt: serverTimestamp()
    });
  }catch(e){}

  try{
    var convoSnap = await getDoc(doc(db, CONVERSATION_COLLECTION, conversationId));
    if(!convoSnap.exists()) return;
    var convo = convoSnap.data() || {};
    var memberSnap = await getDocs(collection(db, CONVERSATION_COLLECTION, conversationId, MEMBER_SUBCOLLECTION));
    var updates = [];
    memberSnap.forEach(function(m){
      var uid = m.id;
      updates.push(addUserToConversationIndexes(uid, conversationId, {
        conversationId: conversationId,
        type: convo.type || 'direct',
        title: convo.title || 'Chat',
        subtitle: convo.subtitle || '',
        initials: convo.initials || makeInitials(convo.title || 'Chat'),
        avatarURL: convo.avatarURL || '',
        description: convo.description || '',
        memberCount: Number(convo.memberCount || 0),
        lastMessageText: text || '',
        lastMessageAt: createdAtValue || serverTimestamp(),
        updatedAt: serverTimestamp(),
        otherUserId: convo.otherUserId || ''
      }));
    });
    await Promise.all(updates);
  }catch(e){}
}

/* ======================== Send Message ======================== */

async function handleSend(){
  if(!isSignedIn()||!activeConversationId||uploadState.active) return;
  var composerInput=document.getElementById('composerInput');
  var rawText=composerInput.value;
  var messageText=rawText.trim();
  if(isMutedNow()){
    showAlert(t('sendMessage'),t('mutedForPolicyViolation'));
    return;
  }
  var slowModeSeconds=Number(activeConversation&&activeConversation.slowModeSeconds||0);
  if(slowModeSeconds>0){
    var messages=conversationMessages.get(activeConversationId)||[];
    var lastOwnMessage=null;
    for(var index=messages.length-1;index>=0;index--){
      if(messages[index] && messages[index].userId===currentUser.userId){ lastOwnMessage=messages[index]; break; }
    }
    if(lastOwnMessage && lastOwnMessage.createdAt){
      var deltaMs=Date.now()-new Date(lastOwnMessage.createdAt).getTime();
      var remaining=Math.ceil(slowModeSeconds-(deltaMs/1000));
      if(remaining>0){
        showAlert(t('slowMode'),t('sendIn')+remaining+'s');
        return;
      }
    }
  }
  var moderationIssue=detectModerationIssue(messageText);
  if(moderationIssue){
    var muteUntil=new Date(Date.now()+24*60*60*1000).toISOString();
    try{
      await updateDoc(doc(db, PROFILE_COLLECTION, auth.currentUser.uid),{
        mutedUntilAt: muteUntil,
        updatedAt: serverTimestamp()
      });
    }catch(ignoreError){}
    showAlert(t('sendMessage'),t('messageBlocked'));
    return;
  }
  if(!messageText&&!stagedFile) return;

  if(stagedFile){
    await uploadAndSendFile(stagedFile, messageText);
    return;
  }

  var sendBtn=document.getElementById('sendBtn');
  var previousReplyTarget=replyTarget;
  composerInput.value='';
  autoGrowTextarea(composerInput);
  refreshFormattingToolbar();
  clearReply();
  sendBtn.disabled=true;

  try{
    var msgPayload = {
      conversationId: activeConversationId,
      userId: currentUser.userId,
      displayName: currentUser.displayName,
      username: currentUser.username,
      initials: currentUser.initials,
      avatarURL: currentUser.avatarFileId || '',
      text: messageText,
      messageType: 'text',
      attachments: [],
      replyToMessageId: previousReplyTarget ? previousReplyTarget.messageId : '',
      replyDisplayName: previousReplyTarget ? (previousReplyTarget.displayName || '') : '',
      replyPreview: previousReplyTarget ? truncateString(previousReplyTarget.text || '',140) : '',
      forwardedFromMessageId: '',
      forwardedFromTitle: '',
      createdAt: serverTimestamp(),
      editedAt: null,
      deletedAt: null
    };

    await addDoc(collection(db, CONVERSATION_COLLECTION, activeConversationId, MESSAGE_SUBCOLLECTION), msgPayload);
    await updateConversationLastMessage(activeConversationId, messageText, serverTimestamp());
  }catch(error){
    console.error(error);
    composerInput.value=rawText;
    autoGrowTextarea(composerInput);
    replyTarget=previousReplyTarget;
    syncWindowState();
    renderReplyBanner();
    showAlert(t('sendMessage'),t('sendFailed'));
  }finally{
    sendBtn.disabled=false;
  }
}

async function uploadAndSendFile(file, messageText){
  if(!auth.currentUser){
    showAlert(t('upload'),t('uploadFailedAuth'));
    return;
  }

  if(!activeConversationId){
    showAlert(t('upload'),t('uploadFailedConversation'));
    return;
  }

  const conversationId = activeConversationId;

  uploadState = {
    active: true,
    file: file,
    task: null,
    downloadURL: '',
    path: '',
    conversationId: conversationId,
    progress: 0
  };

  showUploadBanner(t('uploading') + ' ' + file.name, 0, true);
  document.getElementById('sendBtn').disabled = true;

  try{
    var accessToken = await getOwnerDriveToken();
    var uploadUrl = await createDriveResumableSession(file, accessToken);

    var driveMeta = await uploadFileToDriveResumable(file, uploadUrl, function(pct){
      uploadState.progress = pct;
      showUploadBanner(t('uploading') + ' ' + file.name + ' — ' + pct + '%', pct, true);
    });

    await makeDriveFilePublic(driveMeta.id, accessToken);
    var attachment = buildDriveAttachment(file, driveMeta);

    var previousReplyTarget = replyTarget;
    var msgPayload = {
      conversationId: conversationId,
      userId: currentUser.userId,
      displayName: currentUser.displayName,
      username: currentUser.username,
      initials: currentUser.initials,
      avatarURL: currentUser.avatarFileId || '',
      text: messageText || '',
      messageType: 'file',
      attachments: [attachment],
      replyToMessageId: previousReplyTarget ? previousReplyTarget.messageId : '',
      replyDisplayName: previousReplyTarget ? (previousReplyTarget.displayName || '') : '',
      replyPreview: previousReplyTarget ? truncateString(previousReplyTarget.text || '',140) : '',
      forwardedFromMessageId: '',
      forwardedFromTitle: '',
      createdAt: serverTimestamp(),
      editedAt: null,
      deletedAt: null
    };

    await addDoc(collection(db, CONVERSATION_COLLECTION, conversationId, MESSAGE_SUBCOLLECTION), msgPayload);
    await updateConversationLastMessage(conversationId, messageText || file.name, serverTimestamp());

    document.getElementById('composerInput').value = '';
    autoGrowTextarea(document.getElementById('composerInput'));
    refreshFormattingToolbar();
    clearReply();
    clearStagedFile();
    resetUploadState();
  }catch(error){
    console.error('Upload failed:', error);
    showAlert(t('upload'),error && error.message ? error.message : t('driveUploadFailed'));
    resetUploadState();
  }
}

function cancelCurrentUpload(){
  if(uploadState.active && uploadState.task){
    try{ uploadState.task.cancel(); }catch(e){}
  }
  resetUploadState();
}

function resetUploadState(alsoHideBanner){
  if(alsoHideBanner!==false) hideUploadBanner();

function openDropdownAt(x,y,messageId){
  var message=getMessageFromActiveConversation(messageId);
  if(!message) return;
  closeDropdown();
  isDropdownOpen=true;
  dropdownMessageId=messageId;
  var menu=document.getElementById('messageDropdown'), backdrop=document.getElementById('dropdownBackdrop'), items=[];
  items.push('<button onclick="replyToMessage(\''+escapeJsString(messageId)+'\')">'+t('reply')+'</button>');
  items.push('<button onclick="closeDropdown();setTimeout(function(){toggleReactionPicker(\''+escapeJsString(messageId)+'\')})'+ '">'+ t('react')+'</button>');
  items.push('<button onclick="pinMessageUI(\''+escapeJsString(messageId)+'\')">'+((activeConversation&&activeConversation.pinnedMessage&&activeConversation.pinnedMessage.messageId===messageId)?t('unpinMessage'):t('pinMessage'))+'</button>');
  items.push('<button onclick="copyMessageText(\''+escapeJsString(messageId)+'\')">'+t('copy')+'</button>');
  if(message.messageType!=='group_invite') items.push('<button onclick="forwardMessageUI(\''+escapeJsString(messageId)+'\')">'+t('forward')+'</button>');
  if(message.isMine||isAdminUser()) items.push('<button onclick="editMessageUI(\''+escapeJsString(messageId)+'\')">'+t('edit')+'</button>');
  if(message.isMine||isAdminUser()) items.push('<button class="danger" onclick="deleteMessageUI(\''+escapeJsString(messageId)+'\')">'+t('deleteMsg')+'</button>');

  menu.innerHTML=items.join('');
  menu.classList.add('open');
  backdrop.classList.add('open');
  menu.style.left='0px'; menu.style.top='0px';
  var menuRect=menu.getBoundingClientRect();
  var left=Math.min(x,window.innerWidth-menuRect.width-8), top=Math.min(y,window.innerHeight-menuRect.height-8);
  if(left<8) left=8;
  if(top<8) top=8;
  menu.style.left=left+'px';
  menu.style.top=top+'px';
}

async function editMessageUI(messageId){

      });

async function deleteMessageUI(messageId){
  closeDropdown();
  showConfirm(t('deleteMsg'),t('deleteMsg')+'?',t('delete'),true).then(async function(confirmed){
    if(!confirmed) return;
    try{
      var msg = getMessageFromActiveConversation(messageId);
      if(msg && msg.attachments && msg.attachments.length){
        for(var i=0;i<msg.attachments.length;i++){
          var fid = msg.attachments[i].fileId;
          if(fid){
            try{
              var tok=await getOwnerDriveToken();
              await fetch('https://www.googleapis.com/drive/v3/files/'+encodeURIComponent(fid),{method:'DELETE',headers:{'Authorization':'Bearer '+tok}});
            }catch(e){}
          }
        }
      }
      await updateDoc(doc(db, CONVERSATION_COLLECTION, activeConversationId, MESSAGE_SUBCOLLECTION, messageId),{
        deletedAt: serverTimestamp(),
        text: '',
        attachments: []
      });
    }catch(e){
      console.error(e);
      showAlert(t('deleteMsg'),t('deleteFailed'));
    }
  });
}

      replyDisplayName: '',
      replyPreview: '',
      forwardedFromMessageId: sourceMessage.messageId,
      forwardedFromTitle: activeConversation ? activeConversation.title : '',
      createdAt: serverTimestamp(),
      editedAt: null,
      deletedAt: null,
      meta: sourceMessage.meta || {}
    });

function sendGroupInviteUI(){
  if(!activeConversation||activeConversation.type==='channel') return;
  var groups=conversations.filter(function(c){ return c.type==='group'&&c.conversationId!==activeConversationId; });
  if(!groups.length){ showAlert(t('inviteToChat'),t('noOtherGroupsAvailable')); return; }

async function executeSendGroupInvite(groupConversationId){

      groupConversationId: groupConversationId,

      replyDisplayName: '',
      replyPreview: '',
      forwardedFromMessageId: '',
      forwardedFromTitle: '',

      deletedAt: null,

        groupAvatarURL: group.avatarFileId || '',

async function joinGroupFromMessage(inviteCode){
  if(!inviteCode||!auth.currentUser) return;
  try{
    var inviteSnap=await getDoc(doc(db, GROUP_INVITES_COLLECTION, inviteCode));
    if(!inviteSnap.exists()){ showAlert(t('inviteLink'),t('inviteInvalid')); return; }

    console.error(e);
    showAlert(t('joinGroup'),t('failedGeneric'));
  }
}

async function loadConversationProfile(conversationId){
  try{
    var conversationSnap = await getDoc(doc(db, CONVERSATION_COLLECTION, conversationId));
    if(!conversationSnap.exists()) return;
    var profile = conversationSnap.data() || {};
    var myRole = await getConversationRoleForUser(conversationId, auth.currentUser.uid);
    var memberSnap = await getDocs(collection(db, CONVERSATION_COLLECTION, conversationId, MEMBER_SUBCOLLECTION));
    var members=(await Promise.all(memberSnap.docs.map(async function(memberDoc){
      try{
        var profileSnap = await getDoc(doc(db, PROFILE_COLLECTION, memberDoc.id));
        if(!profileSnap.exists()) return null;
        var memberProfile = profileSnap.data() || {};
        return {
          userId: memberDoc.id,
          displayName: memberProfile.displayName || 'User',
          username: memberProfile.username || '',
          initials: memberProfile.initials || makeInitials(memberProfile.displayName || 'User'),
          avatarFileId: memberProfile.avatarURL || '',
          isAppAdmin: !!memberProfile.isAdmin,
          isBanned: !!memberProfile.banned,
          isDeleted: !!memberProfile.deleted,
          isVerified: !!(memberProfile.isVerified || memberProfile.isAdmin || memberProfile.username==='usonance')
        };
      }catch(e){
        return null;
      }
    }))).filter(Boolean);

    var merged = {
      conversationId: conversationId,
      title: profile.title || 'Group',
      description: profile.description || '',
      initials: profile.initials || makeInitials(profile.title || 'Group'),
      avatarFileId: profile.avatarURL || '',
      memberCount: members.length,
      type: profile.type || 'group',
      isCreator: !!(currentUser && profile.createdBy===currentUser.userId),
      isAdminViewer: !!(currentUser && currentUser.isAdmin),
      members: members,
      myRole: myRole,
      isOfficial: !!profile.isOfficial || conversationId===APP_CHANNEL_ID,
      createdAt: toIso(profile.createdAt)
    };

    var html='<div class="p-hdr">'+buildAvatarHTML(merged.initials,merged.avatarFileId,'xl',false,'',merged.conversationId||merged.title||merged.initials)+'<div class="p-name">'+titleWithBadge(merged.title,merged.isOfficial,t('official'))+'</div>';
    if(merged.description) html+='<div class="p-bio">'+escapeHtml(merged.description)+'</div>';
    html+='<div class="p-un">'+merged.memberCount+' '+escapeHtml(merged.type==='channel'?t('subscribers'):t('members'))+'</div>';
    if(merged.createdAt) html+='<div class="p-info">'+escapeHtml(t('createdOn'))+' '+escapeHtml(new Date(merged.createdAt).toLocaleDateString(getCurrentLocale()))+'</div>';
    if((merged.type==='group'||merged.type==='channel')&&(merged.myRole==='owner'||merged.myRole==='admin'||merged.isAdminViewer)) html+='<div style="margin-top:6px"><button class="secondary-btn" onclick="closeModal(null);changeAvatarUI(\'group\',\''+escapeJsString(merged.conversationId)+'\')">'+t('changeAvatar')+'</button></div>';
    html+='</div>';
    if(merged.type==='group' || merged.myRole==='owner' || merged.myRole==='admin' || merged.isAdminViewer){
      html+='<div style="padding:0 4px"><div class="sec-title">'+(merged.type==='channel'?t('subscribersLabel'):t('members'))+'</div>';
      merged.members.forEach(function(member){
        var ownershipButton=(merged.myRole==='owner' && member.userId!==currentUser.userId)?'<button class="secondary-btn" onclick="event.stopPropagation();transferOwnershipUI(\''+escapeJsString(merged.conversationId)+'\',\''+escapeJsString(member.userId)+'\')">'+t('transferOwnership')+'</button>':'';
        html+='<div class="si" onclick="closeModal(null);openProfile(\''+escapeJsString(member.userId)+'\')">'+buildAvatarHTML(member.initials,member.avatarFileId,'',false,'',member.userId||member.username||member.initials)+'<div class="si-meta"><div class="si-title">'+titleWithBadge(member.displayName,isVerifiedUser(member),t('verified'))+(member.isAppAdmin?'<span class="badge-admin">'+escapeHtml(t('admin').toLowerCase())+'</span>':'')+'</div><div class="si-sub">@'+escapeHtml(member.username||'')+(member.isBanned?' • '+escapeHtml(t('banned')):'')+'</div></div>'+(ownershipButton?'<div class="admin-row-actions">'+ownershipButton+'</div>':'')+'</div>';
      });
      html+='</div>';
    }

    var buttons=[{text:t('close'),className:'secondary-btn',value:'close'}];
    if(merged.type==='group' || merged.type==='channel'){
      buttons.unshift({text:t('inviteLink'),className:'secondary-btn',value:'invite'});
      if(merged.myRole==='owner'||merged.myRole==='admin'||merged.isAdminViewer) buttons.unshift({text:t('editGroup'),className:'primary-btn',value:'edit'});
      if(merged.myRole==='owner'||merged.isAdminViewer) buttons.push({text:t('deleteGroup'),className:'danger-btn',value:'deleteGroup'});
      buttons.push({text:(merged.type==='channel'?t('leaveGroup'):t('leaveGroup')),className:'secondary-btn',value:'leave'});
    }

    openModal({
      title:merged.type==='channel'?t('channel'):t('groupProfile'),
      html:html,
      buttons:buttons,
      onAction:function(value){
        if(value==='invite'){ closeModal(null); showInviteLink(conversationId); }
        else if(value==='edit'){ closeModal(null); editGroupUI(conversationId); }
        else if(value==='leave'){ closeModal(null); doLeaveGroup(conversationId); }
        else if(value==='deleteGroup'){ closeModal(null); doDeleteGroup(conversationId); }
        else closeModal(null);
      }
    });
  }catch(e){
    console.error(e);
  }
}

/* ======================== Avatar Upload ======================== */

function changeAvatarUI(targetType,targetId){
  var fileInput=document.createElement('input');
  fileInput.type='file';
  fileInput.accept='image/*';
  fileInput.onchange=async function(){
    var file=fileInput.files&&fileInput.files[0];
    if(!file) return;
    if(file.size>10*1024*1024){ showAlert(t('changeAvatar'),t('fileTooLarge')); return; }
    try{
      var accessToken=await getOwnerDriveToken();
      var uploadUrl=await createDriveResumableSession(file,accessToken);
      var driveMeta=await uploadFileToDriveResumable(file,uploadUrl,function(){});
      await makeDriveFilePublic(driveMeta.id,accessToken);
      await saveAvatarFileId(driveMeta.id,targetType,targetId);
    }catch(e){
      console.error(e);
      showAlert(t('changeAvatar'),t('avatarUploadFailed'));
    }
  };
  fileInput.click();
}

async function saveAvatarFileId(driveFileId,targetType,targetId){
  try{
    if(targetType==='group' && targetId){
      await updateDoc(doc(db, CONVERSATION_COLLECTION, targetId),{
        avatarURL: driveFileId,
        updatedAt: serverTimestamp()
      });
      var convo = findConversationById(targetId);
      if(convo){
        convo.avatarFileId = driveFileId;
        convo.avatarURL = driveFileId;
        if(activeConversationId===targetId){
          activeConversation.avatarFileId = driveFileId;
          activeConversation.avatarURL = driveFileId;
        }
        renderSidebar();
        renderTopbar();
      }
    }else{
      await updateDoc(doc(db, PROFILE_COLLECTION, auth.currentUser.uid),{
        avatarURL: driveFileId,
        updatedAt: serverTimestamp()
      });
      if(currentUser){
        currentUser.avatarFileId = driveFileId;
        currentUser.avatarURL = driveFileId;
        renderCurrentUserSidebar();
      }
    }
  }catch(e){
    console.error(e);
  }
}

function doLeaveGroup(conversationId){
  var conversation=findConversationById(conversationId);
  var actionTitle=conversation&&conversation.type==='channel'?t('unsubscribe'):t('leaveGroup');
  showConfirm(actionTitle,actionTitle+'?',t('confirm'),false).then(async function(confirmed){
    if(!confirmed) return;
    try{
      if(conversation && conversation.myRole==='owner'){
        showAlert(actionTitle,t('ownerTransferRequired'));
        return;
      }
      await deleteDoc(doc(db, CONVERSATION_COLLECTION, conversationId, MEMBER_SUBCOLLECTION, auth.currentUser.uid));
      await deleteDoc(doc(db, PROFILE_COLLECTION, auth.currentUser.uid, USER_CONVO_SUBCOLLECTION, conversationId));
      try{
        var convoRef=doc(db, CONVERSATION_COLLECTION, conversationId);
        var convoSnap=await getDoc(convoRef);
        if(convoSnap.exists()){
          var data=convoSnap.data()||{};
          await updateDoc(convoRef,{memberCount:Math.max(0,Number(data.memberCount||1)-1),updatedAt:serverTimestamp()});
        }
      }catch(innerError){}
      showPlaceholder();
    }catch(e){
      console.error(e);
    }
  });
}

        isDeleted: true,
        updatedAt: serverTimestamp()
      });
      var members=await getDocs(collection(db, CONVERSATION_COLLECTION, conversationId, MEMBER_SUBCOLLECTION));

      members.forEach(function(m){

    }

}

function openAdminPanel(){
  if(!isAdminUser()) return;
  Promise.all([
    getDocs(collection(db, PROFILE_COLLECTION)),
    getDocs(collection(db, CONVERSATION_COLLECTION)),
    getDocs(collectionGroup(db, MESSAGE_SUBCOLLECTION))
  ]).then(function(results){
    var usersSnap=results[0], convoSnap=results[1], msgSnap=results[2];
    var users=[], groups=[], channels=[], totalUsers=0, bannedUsers=0, onlineUsers=0, totalChannels=0;

    usersSnap.forEach(function(u){
      totalUsers++;
      var d=u.data()||{};
      if(d.banned) bannedUsers++;
      if(d.online) onlineUsers++;
      users.push({
        userId: u.id,
        displayName: d.displayName || 'User',
        username: d.username || '',
        initials: d.initials || makeInitials(d.displayName || 'User'),
        avatarFileId: d.avatarURL || '',
        isOnline: !!d.online,
        isBanned: !!d.banned,
        isDeleted: !!d.deleted,
        isAppAdmin: !!d.isAdmin,
        isVerified: !!(d.isVerified || d.isAdmin || d.username==='usonance')
      });
    });

    convoSnap.forEach(function(c){
      var d=c.data()||{};
      if(d.type==='group' || d.type==='channel'){
        if(d.type==='channel') totalChannels++;
        (d.type==='channel'?channels:groups).push({
          conversationId: c.id,
          title: d.title || (d.type==='channel'?t('channel'):'Group'),
          initials: d.initials || makeInitials(d.title || 'Group'),
          avatarFileId: d.avatarURL || '',
          memberCount: Number(d.memberCount || 0),
          type: d.type || 'group',
          isOfficial: !!d.isOfficial
        });
      }
    });

    renderAdminPanel({
      totalUsers: totalUsers,
      totalMessages: msgSnap.size,
      totalConversations: convoSnap.size,
      onlineUsers: onlineUsers,
      bannedUsers: bannedUsers,
      totalChannels: totalChannels
    }, groups, channels, users);
  }).catch(function(e){
    console.error(e);
  });
}

function parseUAFriendly_(ua){
  ua=String(ua||''); if(!ua) return 'Unknown device';
  var browser='Browser',os='';
  if(/Edg[e\/]/i.test(ua))browser='Edge';
  else if(/OPR|Opera/i.test(ua))browser='Opera';
  else if(/YaBrowser/i.test(ua))browser='Yandex';
  else if(/SamsungBrowser/i.test(ua))browser='Samsung';
  else if(/Firefox/i.test(ua))browser='Firefox';
  else if(/CriOS/i.test(ua))browser='Chrome iOS';
  else if(/Chrome|Chromium/i.test(ua))browser='Chrome';
  else if(/Safari/i.test(ua)&&!/Chrome/i.test(ua))browser='Safari';
  if(/iPhone/i.test(ua))os='iPhone';
  else if(/iPad/i.test(ua))os='iPad';
  else if(/Android/i.test(ua))os='Android';
  else if(/Mac OS X|Macintosh/i.test(ua))os='macOS';
  else if(/Windows/i.test(ua))os='Windows';
  else if(/Linux/i.test(ua))os='Linux';
  else if(/CrOS/i.test(ua))os='ChromeOS';
  return browser+(os?' on '+os:'');
}
