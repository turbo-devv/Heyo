<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap');

    :root {
      --bg: #f5f6fa;
      --panel: #ffffff;
      --panel-2: #f8f9fd;
      --text: #20242c;
      --muted: #6e7685;
      --border: #e5e8f0;
      --accent: #4f46e5;
      --accent-soft: #eef0ff;
      --danger: #d92d20;
      --success: #0f9d58;
      --overlay: rgba(15, 23, 42, 0.44);
      --my-msg: #edf2ff;
      --other-msg: #ffffff;
      --reply-bg: #f4f6fb;
      --shadow: 0 14px 34px rgba(15, 23, 42, 0.10);
      --sidebar-width: 310px;
      --online: #22c55e;
    }

    body.dark {
      --bg: #0d1117;
      --panel: #151b23;
      --panel-2: #10161d;
      --text: #e6edf3;
      --muted: #98a5b7;
      --border: #263041;
      --accent: #7c8cff;
      --accent-soft: #1d2442;
      --danger: #ff6b6b;
      --success: #39c57a;
      --overlay: rgba(0, 0, 0, 0.58);
      --my-msg: #1a2747;
      --other-msg: #161d28;
      --reply-bg: #111824;
      --shadow: 0 16px 36px rgba(0, 0, 0, 0.34);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: 'Ubuntu', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      user-select: none;
    }
    input, textarea { user-select: text; font: inherit; }
    button, select { font: inherit; }
    textarea { resize: none; }
    a { color: inherit; }

    /* Screens */
    .screen { display: none; height: 100vh; width: 100%; }
    .screen.active { display: flex; }

    /* Auth */
    .auth-screen { align-items: center; justify-content: center; padding: 24px; }
    .auth-card {
      width: 100%; max-width: 420px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 18px; box-shadow: var(--shadow); padding: 20px;
    }
    .auth-brand { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .auth-sub { font-size: 14px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
    .tabs { display: flex; gap: 8px; margin-bottom: 14px; }
    .tabs button {
      flex: 1; height: 42px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--panel-2); color: var(--text); font-weight: 700; cursor: pointer;
    }
    .tabs button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .auth-block { display: none; }
    .auth-block.active { display: block; }

    /* Fields */
    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 13px; color: var(--muted); font-weight: 700; margin-bottom: 5px; }
    .field input, .field textarea, .field select {
      width: 100%; border: 1px solid var(--border); background: var(--panel-2);
      color: var(--text); border-radius: 10px; outline: none; padding: 11px 12px;
    }
    .field-row { display: flex; gap: 10px; }
    .field-row > * { flex: 1; min-width: 0; }

    /* Buttons */
    .submit-btn, .primary-btn, .secondary-btn, .danger-btn {
      border: none; border-radius: 10px; cursor: pointer; font-weight: 700; padding: 11px 14px;
    }
    .submit-btn, .primary-btn { background: var(--accent); color: #fff; }
    .secondary-btn { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
    .danger-btn { background: var(--danger); color: #fff; }
    [disabled] { opacity: 0.6; cursor: not-allowed; }
    .submit-btn { width: 100%; margin-top: 4px; }
    .status { min-height: 20px; margin-top: 12px; font-size: 14px; color: var(--danger); }

    /* App Shell */
    .app-shell { display: grid; grid-template-columns: var(--sidebar-width) 1fr; width: 100%; height: 100vh; }

    /* Sidebar */
    .sidebar {
      background: var(--panel); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; min-width: 0;
    }
    .sidebar-head {
      display: flex; align-items: center; gap: 12px; padding: 14px;
      border-bottom: 1px solid var(--border);
    }

    /* Avatar */
    .avatar {
      width: 40px; height: 40px; border-radius: 12px;
      display: grid; place-items: center;
      background: var(--accent-soft); color: var(--accent);
      font-weight: 700; border: 1px solid var(--border);
      flex-shrink: 0; position: relative; overflow: visible;
    }
    .avatar.lg { width: 54px; height: 54px; border-radius: 16px; font-size: 18px; }
    .avatar.xl { width: 80px; height: 80px; border-radius: 24px; font-size: 28px; }
    .avatar-inner {
      width: 100%; height: 100%; border-radius: inherit;
      overflow: hidden; display: grid; place-items: center;
    }
    .avatar-inner img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .online-dot {
      width: 11px; height: 11px; border-radius: 50%; background: var(--online);
      border: 2.5px solid var(--panel); position: absolute; bottom: -2px; right: -2px; z-index: 1;
    }

    .user-box { min-width: 0; flex: 1; }
    .user-box .name { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-box .meta { font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .icon-btn {
      border: 1px solid var(--border); background: var(--panel-2); color: var(--text);
      width: 38px; height: 38px; border-radius: 10px; cursor: pointer; flex-shrink: 0;
      display: inline-flex; align-items: center; justify-content: center; font-size: 16px;
    }

    /* Search */
    .search-wrap { padding: 12px 14px; border-bottom: 1px solid var(--border); position: relative; }
    .search-wrap input {
      width: 100%; border: 1px solid var(--border); background: var(--panel-2);
      color: var(--text); border-radius: 10px; outline: none; padding: 11px 12px;
    }
    .search-results {
      position: absolute; top: calc(100% - 4px); left: 14px; right: 14px;
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
      box-shadow: var(--shadow); max-height: 300px; overflow-y: auto; display: none; z-index: 1200;
    }
    .search-results.open { display: block; }
    .search-item {
      display: flex; gap: 10px; padding: 10px 12px;
      border-bottom: 1px solid var(--border); cursor: pointer;
    }
    .search-item:last-child { border-bottom: none; }
    .search-item:hover { background: var(--panel-2); }
    .search-item-meta { min-width: 0; flex: 1; }
    .search-item-title { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .search-item-sub { font-size: 12px; color: var(--muted); }

    .sidebar-body { flex: 1; min-height: 0; overflow-y: auto; padding: 10px; }
    .section-title {
      font-size: 12px; color: var(--muted); font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; padding: 8px 8px 6px; display: flex; align-items: center; justify-content: space-between;
    }
    .section-title .icon-btn { width: 24px; height: 24px; font-size: 14px; border-radius: 7px; }

    /* Conversation items */
    .ci {
      display: flex; gap: 10px; padding: 10px; border-radius: 12px;
      cursor: pointer; margin-bottom: 4px; border: 1px solid transparent;
    }
    .ci:hover { background: var(--panel-2); }
    .ci.active { background: var(--accent-soft); border-color: rgba(79, 70, 229, 0.16); }
    .ci-meta { min-width: 0; flex: 1; }
    .ci-line { display: flex; gap: 8px; align-items: center; }
    .ci-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ci-time { margin-left: auto; flex-shrink: 0; font-size: 11px; color: var(--muted); }
    .ci-sub, .ci-last { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

    /* Chat panel */
    .chat-panel { display: flex; flex-direction: column; min-width: 0; min-height: 0; }
    .chat-topbar {
      height: 64px; border-bottom: 1px solid var(--border); background: var(--panel);
      display: flex; align-items: center; gap: 12px; padding: 10px 14px; flex-shrink: 0;
    }
    .chat-title-box { min-width: 0; flex: 1; cursor: pointer; }
    .chat-title { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-subtitle { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .chat-main { flex: 1; min-height: 0; display: flex; flex-direction: column; }

    /* Placeholder */
    .placeholder { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .placeholder-card {
      width: 100%; max-width: 600px; background: var(--panel); border: 1px solid var(--border);
      border-radius: 18px; box-shadow: var(--shadow); padding: 24px; text-align: center;
    }
    .placeholder-card h2 { margin: 0 0 8px; font-size: 28px; }
    .placeholder-card p { margin: 0; color: var(--muted); line-height: 1.6; }

    /* Conversation view */
    .conversation-view { display: none; flex: 1; min-height: 0; flex-direction: column; }
    .conversation-view.active { display: flex; }

    /* Messages */
    .messages { flex: 1; min-height: 0; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 6px; }
    .empty-state { margin: auto; color: var(--muted); text-align: center; padding: 24px; }

    /* Date separator */
    .date-sep { display: flex; align-items: center; gap: 12px; padding: 6px 0; color: var(--muted); font-size: 12px; font-weight: 700; }
    .date-sep::before, .date-sep::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Message row */
    .mr { display: flex; gap: 10px; align-items: flex-start; max-width: 85%; }
    .mr.mine { align-self: flex-end; flex-direction: row-reverse; }
    .mr .avatar { width: 34px; height: 34px; border-radius: 10px; font-size: 13px; cursor: pointer; flex-shrink: 0; }

    /* Message card */
    .mc {
      min-width: 0; max-width: 100%;
      background: var(--other-msg); border: 1px solid var(--border);
      border-radius: 16px; padding: 10px 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .mr.mine .mc { background: var(--my-msg); }

    .mh { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
    .mh-author { font-size: 13px; font-weight: 700; cursor: pointer; }
    .mh-author:hover { text-decoration: underline; }
    .mh-user { font-size: 12px; color: var(--muted); }

    .m-fwd { font-size: 11px; color: var(--accent); font-weight: 700; margin-bottom: 4px; }

    .m-reply {
      border-left: 3px solid var(--accent); background: var(--reply-bg);
      border-radius: 10px; padding: 7px 10px; margin-bottom: 6px;
    }
    .m-reply-name { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 2px; }
    .m-reply-text { font-size: 12px; color: var(--muted); white-space: pre-wrap; word-break: break-word; }

    .m-text { white-space: pre-wrap; word-break: break-word; line-height: 1.55; user-select: text; }
    .m-text.del { font-style: italic; color: var(--muted); }

    /* Attachments */
    .m-atts { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
    .att-card { border: 1px solid var(--border); background: var(--panel-2); border-radius: 14px; overflow: hidden; }

    .att-img {
      display: block; width: 100%; max-width: 400px; max-height: 340px;
      object-fit: contain; cursor: pointer;
    }

    .att-vid-wrap { position: relative; width: 100%; max-width: 400px; }
    .att-vid-wrap iframe { width: 100%; height: 240px; border: none; border-bottom: 1px solid var(--border); }

    .att-audio-wrap { padding: 12px; }
    .att-audio-wrap iframe { width: 100%; height: 80px; border: none; }

    .att-file { display: flex; align-items: flex-start; gap: 10px; padding: 12px; }
    .att-icon {
      width: 42px; height: 42px; border-radius: 12px; border: 1px solid var(--border);
      background: var(--accent-soft); color: var(--accent);
      display: grid; place-items: center; font-size: 18px; flex-shrink: 0;
    }
    .att-body { min-width: 0; flex: 1; }
    .att-name { font-size: 14px; font-weight: 700; word-break: break-word; }
    .att-meta { margin-top: 4px; font-size: 12px; color: var(--muted); }
    .att-actions { display: flex; gap: 8px; margin-top: 6px; }
    .att-link {
      display: inline-flex; align-items: center; min-height: 32px; padding: 6px 10px;
      border-radius: 10px; text-decoration: none; border: 1px solid var(--border);
      background: var(--panel); color: var(--text); font-size: 12px; font-weight: 700;
    }

    .att-caption { padding: 8px 12px; border-top: 1px solid var(--border); }
    .att-caption-name { font-size: 13px; font-weight: 700; }
    .att-caption-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .m-meta { display: flex; gap: 8px; margin-top: 6px; font-size: 12px; color: var(--muted); }

    /* Composer */
    .composer-wrap {
      background: var(--panel); border-top: 1px solid var(--border);
      padding: 12px 14px 14px; flex-shrink: 0;
    }
    .reply-banner, .upload-banner {
      display: none; align-items: center; justify-content: space-between; gap: 12px;
      border: 1px solid var(--border); background: var(--panel-2);
      border-radius: 12px; padding: 10px 12px; margin-bottom: 10px;
    }
    .reply-banner.active, .upload-banner.active { display: flex; }
    .reply-banner-meta, .upload-banner-meta { min-width: 0; flex: 1; }
    .reply-banner-label, .upload-banner-label { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
    .reply-banner-text, .upload-banner-text { font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .upload-banner-label.error { color: var(--danger); }
    .upload-banner-label.success { color: var(--success); }
    .upload-progress-wrap { margin-top: 6px; }
    .upload-progress {
      width: 100%; height: 8px; appearance: none; border: none;
      border-radius: 999px; background: rgba(0,0,0,0.08);
    }
    .upload-progress::-webkit-progress-bar { background: rgba(0,0,0,0.08); }
    .upload-progress::-webkit-progress-value { background: var(--accent); }
    .upload-progress::-moz-progress-bar { background: var(--accent); }

    .composer { display: flex; gap: 10px; align-items: flex-end; }
    .composer textarea {
      flex: 1; border: 1px solid var(--border); background: var(--panel-2);
      color: var(--text); border-radius: 12px; outline: none;
      min-height: 48px; max-height: 180px; padding: 12px; overflow-y: auto;
    }
    .composer-actions { display: flex; gap: 6px; align-items: flex-end; }
    .composer-actions .icon-btn { width: 48px; height: 48px; font-size: 18px; }
    #sendBtn { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Dropdowns & Modals */
    .dropdown-backdrop, .modal-overlay { position: fixed; inset: 0; display: none; }
    .dropdown-backdrop.open { display: block; z-index: 9998; }
    .msg-dd {
      position: fixed; min-width: 180px; background: var(--panel);
      border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow);
      padding: 6px; display: none; z-index: 9999;
    }
    .msg-dd.open { display: block; }
    .msg-dd button {
      width: 100%; border: none; background: transparent; text-align: left;
      color: var(--text); padding: 10px 12px; border-radius: 10px; cursor: pointer; font-weight: 500;
    }
    .msg-dd button:hover { background: var(--panel-2); }
    .msg-dd button.danger { color: var(--danger); }

    .modal-overlay {
      background: var(--overlay); align-items: center; justify-content: center;
      padding: 18px; z-index: 12000;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      width: 100%; max-width: 500px; background: var(--panel);
      border: 1px solid var(--border); border-radius: 18px; box-shadow: var(--shadow);
      overflow: hidden; max-height: 90vh; overflow-y: auto;
    }
    .modal-head { padding: 16px 18px 8px; font-size: 18px; font-weight: 700; }
    .modal-body { padding: 0 18px 12px; color: var(--muted); line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .modal-content { padding: 0 18px 12px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; padding: 0 18px 18px; flex-wrap: wrap; }

    /* Profile */
    .profile-header { display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 10px; }
    .profile-name { font-size: 20px; font-weight: 700; }
    .profile-username { font-size: 14px; color: var(--muted); }
    .profile-bio { font-size: 14px; color: var(--muted); text-align: center; max-width: 300px; line-height: 1.5; }
    .profile-status { font-size: 13px; font-weight: 700; padding: 4px 10px; border-radius: 8px; }
    .profile-status.on { color: var(--success); background: rgba(34,197,94,0.1); }
    .profile-status.off { color: var(--muted); background: var(--panel-2); }
    .profile-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 6px; }

    /* Image preview overlay */
    .img-ov {
      position: fixed; inset: 0; background: rgba(0,0,0,0.88);
      display: flex; align-items: center; justify-content: center;
      z-index: 20000; cursor: pointer;
    }
    .img-ov img { max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: 8px; }

    /* Mobile */
    .mobile-toggle { display: none; }
    .mobile-sidebar-backdrop { display: none; }

    @media (max-width: 900px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .sidebar.mob-open {
        display: flex; position: fixed; inset: 0 auto 0 0;
        width: min(92vw, 360px); z-index: 13000; box-shadow: var(--shadow);
      }
      .mobile-sidebar-backdrop {
        position: fixed; inset: 0; background: var(--overlay); display: none; z-index: 12999;
      }
      .mobile-sidebar-backdrop.open { display: block; }
      .mobile-toggle { display: inline-flex; }
      .mr { max-width: 100%; }
      .composer { align-items: stretch; }
      .composer-actions { flex-direction: column; }
      .att-img, .att-vid-wrap { max-width: 100%; }
    }
  </style>
</head>
<body class="light">

  <!-- ============ Auth Screen ============ -->
  <div id="authScreen" class="screen auth-screen active">
    <div class="auth-card">
      <div class="auth-brand">Heyo</div>
      <div id="authSub" class="auth-sub">Welcome back. Log in to continue.</div>

      <div class="tabs">
        <button id="loginTabBtn" class="active" onclick="switchAuth('login')">Login</button>
        <button id="registerTabBtn" onclick="switchAuth('register')">Create account</button>
      </div>

      <div id="loginBlock" class="auth-block active">
        <div class="field">
          <label>Email / phone / username</label>
          <input id="loginId" type="text" autocomplete="username">
        </div>
        <div class="field">
          <label>Password</label>
          <input id="loginPw" type="password" autocomplete="current-password">
        </div>
        <button class="submit-btn" onclick="doLogin()">Login</button>
      </div>

      <div id="registerBlock" class="auth-block">
        <div class="tabs" style="margin-bottom:12px">
          <button id="regEmailBtn" class="active" onclick="switchRegMethod('email')">Email</button>
          <button id="regPhoneBtn" onclick="switchRegMethod('phone')">Phone</button>
        </div>
        <div class="field">
          <label>Display name</label>
          <input id="regDN" type="text" maxlength="40">
        </div>
        <div class="field">
          <label>Username</label>
          <input id="regUN" type="text" maxlength="20" placeholder="lowercase letters only">
        </div>
        <div id="regEmailW" class="field">
          <label>Email</label>
          <input id="regEmail" type="email">
        </div>
        <div id="regPhoneW" style="display:none">
          <div class="field-row">
            <div class="field">
              <label>Country</label>
              <select id="regPhCo">
                <option value="RU">Russia (+7)</option>
                <option value="US">US (+1)</option>
              </select>
            </div>
            <div class="field">
              <label>Phone</label>
              <input id="regPh" type="text">
            </div>
          </div>
        </div>
        <div class="field">
          <label>Password</label>
          <input id="regPw" type="password" autocomplete="new-password" placeholder="Min 6 characters">
        </div>
        <div class="field">
          <label>Bio</label>
          <textarea id="regBio" maxlength="240" rows="2"></textarea>
        </div>
        <button class="submit-btn" onclick="doRegister()">Create account</button>
      </div>

      <div id="authStatus" class="status"></div>
    </div>
  </div>

  <!-- ============ App Screen ============ -->
  <div id="appScreen" class="screen">
    <div id="mobBD" class="mobile-sidebar-backdrop" onclick="closeMobSB()"></div>

    <div class="app-shell">
      <!-- Sidebar -->
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-head">
          <div id="meAvatar" class="avatar" style="cursor:pointer" onclick="openProfile(CU && CU.userId)">
            <div class="avatar-inner">U</div>
          </div>
          <div class="user-box" onclick="openProfile(CU && CU.userId)" style="cursor:pointer">
            <div id="meDN" class="name">User</div>
            <div id="meUN" class="meta">@user</div>
          </div>
          <button class="icon-btn" onclick="openSettings()" title="Settings">⚙</button>
        </div>

        <div class="search-wrap">
          <input id="searchIn" type="text" placeholder="Search users">
          <div id="searchRes" class="search-results"></div>
        </div>

        <div class="sidebar-body">
          <div class="section-title"><span>Channels</span></div>
          <div id="chList"></div>

          <div class="section-title">
            <span>Groups</span>
            <button class="icon-btn" onclick="createGroupUI()" title="New group">+</button>
          </div>
          <div id="grList"></div>

          <div class="section-title"><span>Direct messages</span></div>
          <div id="dmList"></div>
        </div>
      </aside>

      <!-- Main Chat Panel -->
      <main class="chat-panel">
        <div class="chat-topbar">

    const CHUNK_SIZE = 8 * 1024 * 1024;

    /* ============================================================

    const I18N = {

      }
    };

    let lang = localStorage.getItem('heyo_lang') || 'en';
    function t(key) {
      return (I18N[lang] && I18N[lang][key]) || I18N.en[key] || key;
    }

    /* ============================================================
       google.script.run HTTP adapter
       ============================================================ */
    (function initAdapter() {
      function createRunner(successHandler, failureHandler) {
        const chain = {
          withSuccessHandler(cb) {
            return createRunner(typeof cb === 'function' ? cb : null, failureHandler);
          },
          withFailureHandler(cb) {
            return createRunner(successHandler, typeof cb === 'function' ? cb : null);
          }
        };

        return new Proxy(chain, {
          get(target, prop) {
            if (prop in target) return target[prop];
            if (typeof prop !== 'string') return undefined;
            return function(...args) {
              callServer(prop, args, successHandler, failureHandler);
            };
          }
        });
      }

      async function callServer(action, args, successHandler, failureHandler) {
        try {
          const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            redirect: 'follow',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: action, data: args })
          });
          const raw = await response.text();
          let result;
          try { result = raw ? JSON.parse(raw) : null; } catch (e) { throw new Error('Bad JSON'); }
          if (typeof successHandler === 'function') successHandler(result);
        } catch (error) {
          if (typeof failureHandler === 'function') failureHandler(error);
          else console.error('API error:', error);
        }
      }

      window.google = window.google || {};
      window.google.script = window.google.script || {};
      window.google.script.run = createRunner(null, null);
    })();

    /* ============================================================
       State
       ============================================================ */
    let sessionToken = localStorage.getItem('heyo_token') || '';
    let CU = null; // current user
    let convos = []; // conversation list
    let aCid = ''; // active conversation ID
    let aCon = null; // active conversation object

    const convoVersions = new Map();
    const convoMessages = new Map();

    let pollHandle = null;
    let isLoadingConvo = false;
    let needReloadConvo = false;
    let searchDebounce = null;
    let replyTarget = null;
    let modalResolver = null;
    let profileModalOpen = false;

    // Dropdown state
    let ddOpen = false;
    let ddMessageId = '';
    let longPressTimer = null;
    let longPressFired = false;

    // Online status map { userId: boolean }
    let onlineMap = {};

    // Upload state
    let uploadState = {
      active: false, file: null, xhr: null,
      uploadToken: '', uploadUrl: '', fileId: '',
      conversationId: '', progress: 0
    };

    // Prevents polling from overwriting user's theme choice mid-save
    let localThemeOverride = null;

    /* ============================================================
       Drive URL helpers
       ============================================================ */
    function driveImgUrl(fileId) {
      return 'https://lh3.googleusercontent.com/d/' + encodeURIComponent(fileId);
    }
    function drivePreviewUrl(fileId) {
      return 'https://drive.google.com/file/d/' + encodeURIComponent(fileId) + '/preview';
    }
    function driveViewUrl(fileId) {
      return 'https://drive.google.com/file/d/' + encodeURIComponent(fileId) + '/view';
    }
    function driveDownloadUrl(fileId) {
      return 'https://drive.google.com/uc?id=' + encodeURIComponent(fileId) + '&export=download';
    }

    /* ============================================================
       Avatar HTML helper
       ============================================================ */
    function avatarHTML(initials, avatarFileId, extraClass, isOnline, onclickAttr) {
      extraClass = extraClass || '';
      var inner = escapeHtml(initials || 'U');

      if (avatarFileId) {
        var imgSrc = driveImgUrl(avatarFileId) + '=s200';
        inner = '<img src="' + escapeAttr(imgSrc) + '" alt="" loading="lazy" ' +
          'onerror="this.parentNode.innerHTML=\'' + escapeHtml(initials || 'U') + '\'">';
      }

      var dot = isOnline ? '<div class="online-dot"></div>' : '';
      var ocAttr = onclickAttr ? ' onclick="' + onclickAttr + '"' : '';

      return '<div class="avatar ' + extraClass + '"' + ocAttr + '>' +
        '<div class="avatar-inner">' + inner + '</div>' + dot + '</div>';
    }

    /* ============================================================
       Auth UI
       ============================================================ */
    function switchAuth(mode) {
      document.getElementById('loginTabBtn').classList.toggle('active', mode === 'login');
      document.getElementById('registerTabBtn').classList.toggle('active', mode !== 'login');
      document.getElementById('loginBlock').classList.toggle('active', mode === 'login');
      document.getElementById('registerBlock').classList.toggle('active', mode !== 'login');
      document.getElementById('authSub').textContent = (mode === 'login') ? t('authSubLogin') : t('authSubReg');
      document.getElementById('authStatus').textContent = '';
    }

    function switchRegMethod(method) {
      document.getElementById('regEmailBtn').classList.toggle('active', method === 'email');
      document.getElementById('regPhoneBtn').classList.toggle('active', method !== 'email');
      document.getElementById('regEmailW').style.display = (method === 'email') ? '' : 'none';
      document.getElementById('regPhoneW').style.display = (method !== 'email') ? '' : 'none';
    }

    function doLogin() {
      var identifier = document.getElementById('loginId').value.trim();
      var password = document.getElementById('loginPw').value;

      if (!identifier || !password) {
        document.getElementById('authStatus').textContent = 'Identifier and password are required.';
        return;
      }

      document.getElementById('authStatus').textContent = 'Logging in...';

      google.script.run
        .withSuccessHandler(function(res) {
          if (!res || !res.ok) {
            document.getElementById('authStatus').textContent = (res && res.error) || 'Login failed.';
            return;
          }
          sessionToken = res.token;
          localStorage.setItem('heyo_token', sessionToken);
          CU = res.user;
          lang = CU.language || 'en';
          localStorage.setItem('heyo_lang', lang);
          document.getElementById('loginPw').value = '';
          document.getElementById('authStatus').textContent = '';
          startApp();
        })
        .withFailureHandler(function() {
          document.getElementById('authStatus').textContent = 'Login failed.';
        })
        .login(identifier, password);
    }

    function doRegister() {
      var payload = {
        displayName: document.getElementById('regDN').value.trim(),
        username: document.getElementById('regUN').value.trim(),
        password: document.getElementById('regPw').value,
        email: document.getElementById('regEmailW').style.display !== 'none' ? document.getElementById('regEmail').value.trim() : '',
        phoneCountry: document.getElementById('regPhoneW').style.display !== 'none' ? document.getElementById('regPhCo').value : '',
        phone: document.getElementById('regPhoneW').style.display !== 'none' ? document.getElementById('regPh').value.trim() : '',
        bio: document.getElementById('regBio').value.trim(),
        theme: 'light',
        language: lang
      };

      if (!payload.displayName || !payload.username || !payload.password) {
        document.getElementById('authStatus').textContent = 'Display name, username and password are required.';
        return;
      }

      document.getElementById('authStatus').textContent = 'Creating account...';

      google.script.run
        .withSuccessHandler(function(res) {
          if (!res || !res.ok) {
            document.getElementById('authStatus').textContent = (res && res.error) || 'Registration failed.';
            return;
          }
          sessionToken = res.token;
          localStorage.setItem('heyo_token', sessionToken);
          CU = res.user;
          lang = CU.language || 'en';
          localStorage.setItem('heyo_lang', lang);
          document.getElementById('authStatus').textContent = '';
          startApp();
        })
        .withFailureHandler(function() {
          document.getElementById('authStatus').textContent = 'Registration failed.';
        })
        .registerAccount(payload);
    }

    function verifySession() {
      if (!sessionToken) { showAuthScreen(); return; }

      google.script.run
        .withSuccessHandler(function(res) {
          if (!res || !res.ok) {
            localStorage.removeItem('heyo_token');
            sessionToken = '';
            showAuthScreen();
            return;
          }
          CU = res.user;
          lang = CU.language || 'en';
          localStorage.setItem('heyo_lang', lang);
          startApp();
        })
        .withFailureHandler(function() {
          localStorage.removeItem('heyo_token');
          sessionToken = '';
          showAuthScreen();
        })
        .getSession(sessionToken);
    }

    function showAuthScreen() {
      stopPolling();
      document.getElementById('authScreen').classList.add('active');
      document.getElementById('appScreen').classList.remove('active');
      switchAuth('login');
    }

    function showAppScreen() {
      document.getElementById('authScreen').classList.remove('active');
      document.getElementById('appScreen').classList.add('active');
    }

    /* ============================================================
       App Lifecycle
       ============================================================ */
    function startApp() {
      // Reset state
      convos = [];
      aCid = '';
      aCon = null;
      convoVersions.clear();
      convoMessages.clear();
      replyTarget = null;
      localThemeOverride = null;

      showAppScreen();
      applyTheme(CU.theme || 'light');
      renderCurrentUser();
      autoGrowTextarea(document.getElementById('composerIn'));
      fetchAppData(true);
      startPolling();
      checkPendingInvite();
    }

    function renderCurrentUser() {
      if (!CU) return;
      document.getElementById('meDN').textContent = CU.displayName || 'User';
      document.getElementById('meUN').textContent = '@' + (CU.username || '');

      var avatarInner = document.getElementById('meAvatar').querySelector('.avatar-inner');
      if (CU.avatarFileId) {
        avatarInner.innerHTML = '<img src="' + driveImgUrl(CU.avatarFileId) + '=s100" ' +
          'onerror="this.parentNode.innerHTML=\'' + escapeHtml(CU.initials || 'U') + '\'">';
      } else {
        avatarInner.textContent = CU.initials || 'U';
      }
    }

    function fetchAppData(isInitial) {
      if (!sessionToken) return;

      google.script.run
        .withSuccessHandler(function(res) {
          if (!res || !res.ok) { handleAppError(res); return; }

          CU = res.user;
          convos = Array.isArray(res.conversations) ? res.conversations : [];
          if (res.online) onlineMap = res.online;

          // Only apply theme from server if user hasn't overridden locally
          if (!localThemeOverride) {
            applyTheme(CU.theme || 'light');
          }

          lang = CU.language || 'en';
          renderCurrentUser();
          renderSidebar();

          if (isInitial) {
            showPlaceholder();
          } else if (aCid) {
            aCon = getConvoById(aCid);
            if (!aCon) showPlaceholder();
            else renderTopbar();
          }
        })
        .withFailureHandler(function(err) { console.error(err); })
        .getAppData(sessionToken);
    }

    function applyTheme(theme) {
      document.body.className = (theme === 'dark') ? 'dark' : 'light';
    }

    function getConvoById(id) {
      return convos.find(function(c) { return c.conversationId === id; }) || null;
    }

    /* ============================================================
       Polling — single combined call
       ============================================================ */
    function startPolling() {
      stopPolling();
      pollHandle = setInterval(doPoll, 2500);
      doPoll(); // immediate first poll
    }

    function stopPolling() {
      if (pollHandle) { clearInterval(pollHandle); pollHandle = null; }
    }

    function doPoll() {
      if (!sessionToken || document.hidden) return;

      var currentCid = aCid;
      var sinceVersion = currentCid ? Number(convoVersions.get(currentCid) || 0) : 0;

      google.script.run
        .withSuccessHandler(function(res) {
          if (!res || !res.ok) return;

          if (res.online) onlineMap = res.online;

          if (res.conversations) {
            convos = res.conversations;
            aCon = getConvoById(aCid);
            renderSidebar();
            renderTopbar();
          }

          // Process messages if returned
          if (res.messagesData && String(res.messagesData.conversationId) === aCid) {
            var md = res.messagesData;
            if (typeof md.version === 'number') convoVersions.set(aCid, md.version);

            if (md.reset || !convoMessages.has(aCid)) {
              convoMessages.set(aCid, []);
            }
            if (md.messages && md.messages.length) {
              mergeMessages(aCid, md.messages, !!md.reset);
            } else if (md.reset) {
              convoMessages.set(aCid, []);
            }

            renderMessages(false);
          }
        })
        .withFailureHandler(function() {})
        .pollUpdates(sessionToken, currentCid, sinceVersion);
    }

    function checkPendingInvite() {
      var invite = localStorage.getItem('heyo_pending_invite');
      if (!invite) return;
      localStorage.removeItem('heyo_pending_invite');

      google.script.run
        .withSuccessHandler(function(res) {
          if (!res || !res.ok) {
            showAlert('Invite', (res && res.error) || 'Failed to join group.');
            return;
          }
          if (res.conversations) {
            convos = res.conversations;
            renderSidebar();
          }
          if (res.conversationId) selectConversation(res.conversationId);
        })
        .withFailureHandler(function() {
          showAlert('Invite', 'Failed to join group.');
        })
        .joinGroupByInvite(sessionToken, invite);
    }

    /* ============================================================
       Sidebar
       ============================================================ */
    function renderSidebar() {
      var channels = convos.filter(function(c) { return c.type === 'channel'; });
      var groups = convos.filter(function(c) { return c.type === 'group'; });
      var directs = convos.filter(function(c) { return c.type === 'direct'; });

      document.getElementById('chList').innerHTML = channels.map(renderConvoItem).join('');
      document.getElementById('grList').innerHTML = groups.map(renderConvoItem).join('');
      document.getElementById('dmList').innerHTML = directs.length
        ? directs.map(renderConvoItem).join('')
        : '<div class="empty-state" style="padding:14px;margin:0;font-size:13px">' + t('noMsgs') + '</div>';
    }

    function renderConvoItem(c) {
      var isActive = (c.conversationId === aCid) ? 'active' : '';
      var subtitle = c.subtitle ? '<div class="ci-sub">' + escapeHtml(c.subtitle) + '</div>' : '';
      var lastMsg = c.lastMessageText ? '<div class="ci-last">' + escapeHtml(c.lastMessageText) + '</div>' : '';
      var time = c.lastMessageAt ? formatSidebarTime(c.lastMessageAt) : '';

      return '<div class="ci ' + isActive + '" onclick="selectConversation(\'' + escapeJsStr(c.conversationId) + '\')">' +
        avatarHTML(c.initials, c.avatarFileId, '', false) +
        '<div class="ci-meta">' +
          '<div class="ci-line">' +
            '<div class="ci-title">' + escapeHtml(c.title || 'Chat') + '</div>' +
            '<div class="ci-time">' + escapeHtml(time) + '</div>' +
          '</div>' +
          subtitle + lastMsg +
        '</div></div>';
    }

    /* ============================================================
       Conversation Selection
       ============================================================ */
    function selectConversation(id) {
      aCid = id;
      aCon = getConvoById(id);
      replyTarget = null;
      renderReplyBanner();
      renderSidebar();
      renderTopbar();
      showConversationView();
      closeMobSB();
      resetUploadState(true);

      if (!convoVersions.has(id)) convoVersions.set(id, 0);
      if (!convoMessages.has(id)) convoMessages.set(id, []);

      updateComposerVisibility();
      loadConversation(true);
    }

    function renderTopbar() {
      var titleEl = document.getElementById('chatTitle');
      var subtitleEl = document.getElementById('chatSub');
      var avatarInner = document.getElementById('topAv').querySelector('.avatar-inner');

      if (!aCon) {
        titleEl.textContent = 'Heyo';
        subtitleEl.textContent = '';
        avatarInner.textContent = 'H';
        return;
      }

      titleEl.textContent = aCon.title || 'Chat';
      subtitleEl.textContent = aCon.subtitle || '';

      if (aCon.avatarFileId) {
        avatarInner.innerHTML = '<img src="' + driveImgUrl(aCon.avatarFileId) + '=s100" ' +
          'onerror="this.textContent=\'' + escapeHtml(aCon.initials || 'C') + '\'">';
      } else {
        avatarInner.textContent = aCon.initials || 'C';
      }
    }

    function showPlaceholder() {
      aCid = '';
      aCon = null;
      renderTopbar();
      renderSidebar();
      document.getElementById('phView').style.display = 'flex';
      document.getElementById('convoView').classList.remove('active');
    }

    function showConversationView() {
      document.getElementById('phView').style.display = 'none';
      document.getElementById('convoView').classList.add('active');
    }

    function updateComposerVisibility() {
      var wrap = document.getElementById('composerWrap');
      if (!aCon) { wrap.style.display = ''; return; }

      // Hide composer for channels unless user is the channel poster
      if (aCon.type === 'channel' && (!CU || CU.username !== 'usonance')) {
        wrap.style.display = 'none';
      } else {
        wrap.style.display = '';
      }
    }

    /* ============================================================
       Load Conversation Messages
       ============================================================ */
    function loadConversation(forceScroll) {
      if (!sessionToken || !aCid) return;
      if (isLoadingConvo) { needReloadConvo = true; return; }

      isLoadingConvo = true;
      var requestedId = aCid;
      var sinceVersion = Number(convoVersions.get(requestedId) || 0);

      google.script.run
        .withSuccessHandler(function(res) {
          isLoadingConvo = false;
          if (!res || !res.ok) { handleAppError(res); return; }

          var md = res.messagesData;
          if (!md || String(md.conversationId) !== requestedId) return;

          if (typeof md.version === 'number') convoVersions.set(requestedId, md.version);
          if (md.reset || !convoMessages.has(requestedId)) convoMessages.set(requestedId, []);

          if (md.messages && md.messages.length) {
            mergeMessages(requestedId, md.messages, !!md.reset);
          } else if (md.reset) {
            convoMessages.set(requestedId, []);
          }

          if (aCid === requestedId) renderMessages(forceScroll);
          if (needReloadConvo) { needReloadConvo = false; loadConversation(false); }
        })
        .withFailureHandler(function(err) {
          console.error(err);
          isLoadingConvo = false;
        })
        .getConversationMessages(sessionToken, requestedId, sinceVersion);
    }

    function mergeMessages(conversationId, incoming, reset) {
      var current = reset ? [] : (convoMessages.get(conversationId) || []);
      var byId = new Map();
      current.forEach(function(m) { byId.set(m.messageId, m); });
      incoming.forEach(function(m) { byId.set(m.messageId, m); });

      var merged = Array.from(byId.values()).sort(function(a, b) {
        var ta = a.createdAt ? new Date(a.createdAt).getTime() : 0;
        var tb = b.createdAt ? new Date(b.createdAt).getTime() : 0;
        if (ta !== tb) return ta - tb;
        return String(a.messageId).localeCompare(String(b.messageId));
      });

      convoMessages.set(conversationId, merged);
    }

    /* ============================================================
       Render Messages (with date separators)
       ============================================================ */
    function renderMessages(forceScroll) {
      var el = document.getElementById('messages');
      var list = convoMessages.get(aCid) || [];
      var nearBottom = Math.abs(el.scrollHeight - el.scrollTop - el.clientHeight) < 90;

      if (!list.length) {
        el.innerHTML = '<div class="empty-state">' + t('noMsgs') + '</div>';
        return;
      }

      var html = '';
      var lastDateStr = '';

      for (var i = 0; i < list.length; i++) {
        var msg = list[i];
        var dateStr = getDateString(msg.createdAt);

        if (dateStr && dateStr !== lastDateStr) {
          html += '<div class="date-sep">' + escapeHtml(formatDateSeparator(msg.createdAt)) + '</div>';
          lastDateStr = dateStr;
        }

        html += renderMessage(msg);
      }

      el.innerHTML = html;
      if (forceScroll || nearBottom) el.scrollTop = el.scrollHeight;
    }

    function getDateString(iso) {
      if (!iso) return '';
      var d = new Date(iso);
      if (isNaN(d.getTime())) return '';
      return d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
    }

    function formatDateSeparator(iso) {
      var d = new Date(iso);
      if (isNaN(d.getTime())) return '';

      var now = new Date();
      if (d.toDateString() === now.toDateString()) return t('today');

      var yesterday = new Date(now);
      yesterday.setDate(yesterday.getDate() - 1);
      if (d.toDateString() === yesterday.toDateString()) return t('yesterday');

      return d.toLocaleDateString(lang === 'ru' ? 'ru-RU' : 'en-US', {
        year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    function renderMessage(msg) {
      var mineClass = msg.isMine ? 'mine' : '';
      var isOnline = onlineMap[msg.userId] || false;
      var avatarClick = "openProfile('" + escapeJsStr(msg.userId) + "')";

      var forwardedHtml = msg.forwardedFromMessageId
        ? '<div class="m-fwd">↗ ' + t('forwarded') + '</div>'
        : '';

      var replyHtml = msg.replyToMessageId
        ? '<div class="m-reply">' +
            '<div class="m-reply-name">' + escapeHtml(msg.replyDisplayName || '') + '</div>' +
            '<div class="m-reply-text">' + escapeHtml(msg.replyPreview || '') + '</div>' +
          '</div>'
        : '';

      var attachmentsHtml = renderAttachments(msg.attachments || []);

      var textHtml = msg.deletedAt
        ? '<div class="m-text del">' + t('msgDeleted') + '</div>'
        : (msg.text ? '<div class="m-text">' + escapeHtml(msg.text) + '</div>' : '');

      var metaParts = [];
      if (msg.createdAt) metaParts.push(formatMessageTime(msg.createdAt));
      if (msg.editedAt && !msg.deletedAt) metaParts.push(t('edited'));

      var metaHtml = metaParts.map(function(x) {
        return '<span>' + escapeHtml(x) + '</span>';
      }).join('');

      return '<div class="mr ' + mineClass + '">' +
        avatarHTML(msg.initials, msg.avatarFileId || '', '', isOnline, avatarClick) +
        '<div class="mc" data-mid="' + escapeAttr(msg.messageId) + '" ' +
          'data-own="' + (msg.isMine ? '1' : '0') + '" data-del="' + (msg.deletedAt ? '1' : '0') + '">' +
          '<div class="mh">' +
            '<div class="mh-author" onclick="openProfile(\'' + escapeJsStr(msg.userId) + '\')">' +
              escapeHtml(msg.displayName || 'User') +
            '</div>' +
            '<div class="mh-user">@' + escapeHtml(msg.username || '') + '</div>' +
          '</div>' +
          forwardedHtml + replyHtml + attachmentsHtml + textHtml +
          '<div class="m-meta">' + metaHtml + '</div>' +
        '</div></div>';
    }

       Attachment Rendering (working inline previews)
       ============================================================ */

      if (!attachments || !attachments.length) return '';
      return '<div class="m-atts">' + attachments.map(renderSingleAttachment).join('') + '</div>';

          '<img class="att-img" src="' + imgSrc + '" alt="' + name + '" loading="lazy" ' +

              '<a class="att-link" href="' + downloadLink + '" target="_blank" rel="noopener">Download</a>' +
            '</div>' +

      }

      if (category === 'video') {
        var previewSrc = escapeAttr(drivePreviewUrl(fileId));
        return '<div class="att-card">' +
          '<div class="att-vid-wrap">' +
            '<iframe src="' + previewSrc + '" allow="autoplay" allowfullscreen></iframe>' +
          '</div>' +
          '<div class="att-caption">' +
            '<div class="att-caption-name">' + name + '</div>' +
            '<div class="att-caption-meta">' + meta + '</div>' +
            '<div class="att-actions">' +
              '<a class="att-link" href="' + viewLink + '" target="_blank" rel="noopener">Open</a>' +
              '<a class="att-link" href="' + downloadLink + '" target="_blank" rel="noopener">Download</a>' +
            '</div>' +
          '</div></div>';
      }

      if (category === 'audio') {
        var audioPreview = escapeAttr(drivePreviewUrl(fileId));
        return '<div class="att-card">' +
          '<div class="att-audio-wrap">' +
            '<iframe src="' + audioPreview + '" allow="autoplay"></iframe>' +
          '</div>' +
          '<div class="att-caption">' +
            '<div class="att-caption-name">' + name + '</div>' +
            '<div class="att-caption-meta">' + meta + '</div>' +
            '<div class="att-actions">' +
              '<a class="att-link" href="' + downloadLink + '" target="_blank" rel="noopener">Download</a>' +

      // Generic file

        '<div class="att-file">' +

            '<div class="att-name">' + name + '</div>' +
            '<div class="att-meta">' + meta + '</div>' +
            '<div class="att-actions">' +
              '<a class="att-link" href="' + viewLink + '" target="_blank" rel="noopener">Open</a>' +
              '<a class="att-link" href="' + downloadLink + '" target="_blank" rel="noopener">Download</a>' +
            '</div>' +
          '</div>' +
        '</div></div>';
    }

    function previewImage(src) {
      var overlay = document.createElement('div');
      overlay.className = 'img-ov';
      overlay.innerHTML = '<img src="' + src + '">';
      overlay.onclick = function() { overlay.remove(); };
      document.body.appendChild(overlay);

    /* ============================================================
       Send Message
       ============================================================ */
    function sendMsg() {
      if (!sessionToken || !aCid || uploadState.active) return;

      var input = document.getElementById('composerIn');
      var text = input.value.trim();
      if (!text) return;

      var requestedId = aCid;
      document.getElementById('sendBtn').disabled = true;

      google.script.run
        .withSuccessHandler(function(res) {
          document.getElementById('sendBtn').disabled = false;

          if (!res || !res.ok) {
            showAlert('Error', (res && res.error) || 'Send failed.');
            return;
          }

          input.value = '';
          autoGrowTextarea(input);
          clearReply();

          if (res.conversations) {
            convos = res.conversations;
            aCon = getConvoById(aCid);
            renderSidebar();
            renderTopbar();
          }

          if (res.message && String(res.conversationId) === requestedId) {
            convoVersions.set(requestedId, res.version);
            mergeMessages(requestedId, [res.message], false);
            renderMessages(true);
          }
        })
        .withFailureHandler(function() {
          document.getElementById('sendBtn').disabled = false;
          showAlert('Error', 'Send failed.');
        })
        .sendMessage(
          sessionToken,
          requestedId,
          text,
          replyTarget ? replyTarget.messageId : ''
        );
    }

    /* ============================================================
       File Upload
       ============================================================ */
    function openFilePicker() {
      if (!sessionToken || !aCid || uploadState.active) return;
      document.getElementById('fileIn').click();
    }

    function handleFileSelection(file) {
      if (!file || !sessionToken || !aCid || uploadState.active) return;
      if (file.size > MAX_UPLOAD_BYTES) { showAlert('Upload', 'File exceeds 1 GB.'); return; }

      var conversationId = aCid;
      var text = document.getElementById('composerIn').value.trim();

      uploadState = {
        active: true, file: file, conversationId: conversationId,
        progress: 0, xhr: null, uploadToken: '', uploadUrl: '', fileId: ''
      };

      showUploadBanner('Preparing: ' + file.name, 0, true);

      google.script.run
        .withSuccessHandler(function(res) {
          if (!uploadState.active) return;
          if (!res || !res.ok) {
            showAlert('Upload', (res && res.error) || 'Failed.');
            resetUploadState();
            return;
          }

          uploadState.uploadToken = res.uploadToken;
          uploadState.uploadUrl = res.uploadUrl;

          uploadFileResumable(file, res.uploadUrl, function onProgress(percent, xhr) {
            uploadState.xhr = xhr;
            uploadState.progress = percent;
            showUploadBanner('Uploading ' + file.name + ' — ' + percent + '%', percent, true);
          }).then(function(fileId) {
            if (!uploadState.active) return;

            uploadState.fileId = fileId || '';
            showUploadBanner('Finalizing...', 100, false);

            var doFinalize = function(resolvedFileId) {
              google.script.run
                .withSuccessHandler(function(finalRes) {
                  if (!finalRes || !finalRes.ok) {
                    showAlert('Upload', (finalRes && finalRes.error) || 'Finalize failed.');
                    resetUploadState();
                    return;
                  }

                  document.getElementById('composerIn').value = '';
                  autoGrowTextarea(document.getElementById('composerIn'));
                  clearReply();

                  if (finalRes.conversations) {
                    convos = finalRes.conversations;
                    aCon = getConvoById(aCid);
                    renderSidebar();
                    renderTopbar();
                  }

                  if (finalRes.message && String(finalRes.conversationId) === conversationId) {
                    convoVersions.set(conversationId, finalRes.version);
                    mergeMessages(conversationId, [finalRes.message], false);
                    renderMessages(true);
                  }

                  resetUploadState();
                })
                .withFailureHandler(function() {
                  showAlert('Upload', 'Finalize failed.');
                  resetUploadState();
                })
                .finalizeUploadedMessage(sessionToken, {
                  uploadToken: uploadState.uploadToken,
                  fileId: resolvedFileId,
                  fileName: file.name,
                  mimeType: file.type || 'application/octet-stream',
                  fileSize: file.size,
                  text: text,
                  replyToMessageId: replyTarget ? replyTarget.messageId : ''
                });
            };

            if (fileId) {
              doFinalize(fileId);
            } else {
              google.script.run
                .withSuccessHandler(function(resolveRes) {
                  if (!resolveRes || !resolveRes.ok) {
                    showAlert('Upload', 'Could not resolve file.');
                    resetUploadState();
                    return;
                  }
                  doFinalize(resolveRes.fileId);
                })
                .withFailureHandler(function() {
                  showAlert('Upload', 'Resolve failed.');
                  resetUploadState();
                })
                .resolveUploadedFileId(sessionToken, uploadState.uploadToken);
            }
          }).catch(function(err) {
            console.error(err);
            showAlert('Upload', err.message || 'Upload failed.');
            resetUploadState();
          });
        })
        .withFailureHandler(function() {
          showAlert('Upload', 'Session creation failed.');
          resetUploadState();
        })
        .createDriveUploadSession(sessionToken, {
          conversationId: conversationId,
          fileName: file.name,
          mimeType: file.type || 'application/octet-stream',
          fileSize: file.size,
          text: text,
          replyToMessageId: replyTarget ? replyTarget.messageId : ''
        });
    }

    async function uploadFileResumable(file, uploadUrl, onProgress) {
      var start = 0;
      var fileId = '';

      while (start < file.size) {
        var end = Math.min(start + CHUNK_SIZE, file.size);
        var chunk = file.slice(start, end);
        var contentRange = 'bytes ' + start + '-' + (end - 1) + '/' + file.size;

        var result = await sendUploadChunk(uploadUrl, chunk, file.type || 'application/octet-stream', contentRange, onProgress, start, end, file.size);

        if (result.status === 308) {
          var rangeHeader = result.xhr.getResponseHeader('Range');
          if (rangeHeader) {
            var match = rangeHeader.match(/bytes=0-(\d+)$/i);
            start = match ? (parseInt(match[1], 10) + 1) : end;
          } else {
            start = end;
          }
          var pct = Math.min(99, Math.floor((start / file.size) * 100));
          onProgress(pct, result.xhr);
          continue;
        }

        if (result.status >= 200 && result.status < 300) {
          try {
            var body = JSON.parse(result.xhr.responseText || '{}');
            fileId = body.id || '';
          } catch (e) {}
          onProgress(100, result.xhr);
          return fileId;
        }

        if (result.status === 0 && end >= file.size) {
          onProgress(100, result.xhr);
          return '';
        }

        throw new Error('Upload failed with HTTP ' + result.status);
      }

      return fileId;
    }

    function sendUploadChunk(url, blob, mime, contentRange, onProgress, chunkStart, chunkEnd, totalSize) {
      return new Promise(function(resolve, reject) {
        var xhr = new XMLHttpRequest();
        xhr.open('PUT', url, true);
        xhr.setRequestHeader('Content-Type', mime);
        xhr.setRequestHeader('Content-Range', contentRange);

        xhr.upload.onprogress = function(event) {
          if (!event.lengthComputable) return;
          var totalLoaded = Math.min(totalSize, chunkStart + event.loaded);
          var pct = Math.min(99, Math.floor((totalLoaded / totalSize) * 100));
          onProgress(pct, xhr);
        };

        xhr.onreadystatechange = function() {
          if (xhr.readyState === 4) {
            resolve({ status: xhr.status, xhr: xhr });
          }
        };
        xhr.onerror = function() { reject(new Error('Network error.')); };
        xhr.onabort = function() { reject(new Error('Upload cancelled.')); };
        xhr.send(blob);
      });
    }

    function cancelUpload() {
      if (!uploadState.active) return;
      if (uploadState.xhr) try { uploadState.xhr.abort(); } catch (e) {}
      resetUploadState();
    }

    function resetUploadState(clearBanner) {
      if (clearBanner !== false) hideUploadBanner();
      uploadState = { active: false, file: null, xhr: null, uploadToken: '', uploadUrl: '', fileId: '', conversationId: '', progress: 0 };
      document.getElementById('fileIn').value = '';
    }

    function showUploadBanner(text, percent, canCancel) {
      var banner = document.getElementById('uploadBanner');
      var label = document.getElementById('uplLabel');
      var valueEl = document.getElementById('uplText');
      var progressWrap = document.getElementById('uplProgW');
      var progressEl = document.getElementById('uplProg');
      var cancelBtn = document.getElementById('uplCancel');

      banner.classList.add('active');
      label.textContent = 'Upload';
      valueEl.textContent = text || '';

      if (typeof percent === 'number') {
        progressWrap.style.display = '';
        progressEl.value = Math.max(0, Math.min(100, percent));
      } else {
        progressWrap.style.display = 'none';
      }

      cancelBtn.style.display = canCancel ? '' : 'none';
    }

    function hideUploadBanner() {
      document.getElementById('uploadBanner').classList.remove('active');
    }

    /* ============================================================
       Reply
       ============================================================ */
    function clearReply() {
      replyTarget = null;
      renderReplyBanner();
    }

    function renderReplyBanner() {
      var banner = document.getElementById('replyBanner');
      var label = document.getElementById('replyLabel');
      var textEl = document.getElementById('replyText');

      if (!replyTarget) {
        banner.classList.remove('active');
        return;
      }

      banner.classList.add('active');
      label.textContent = t('reply') + ': ' + (replyTarget.displayName || '');
      textEl.textContent = truncate(replyTarget.text || '', 140);
    }

    function getMsgFromActive(messageId) {
      var list = convoMessages.get(aCid) || [];
      return list.find(function(m) { return m.messageId === messageId; }) || null;
    }

    /* ============================================================
       Message Context Menu (Dropdown)
       ============================================================ */
    function openDropdownAt(x, y, messageId) {
      var msg = getMsgFromActive(messageId);
      if (!msg) return;

      closeDD();
      ddOpen = true;
      ddMessageId = messageId;

      var menu = document.getElementById('msgDD');
      var backdrop = document.getElementById('ddBD');
      var items = [];

      if (!msg.deletedAt) {
        items.push('<button onclick="replyToMsg(\'' + escapeJsStr(messageId) + '\')">' + t('reply') + '</button>');
        items.push('<button onclick="copyMsgText(\'' + escapeJsStr(messageId) + '\')">' + t('copy') + '</button>');
        items.push('<button onclick="forwardMsgUI(\'' + escapeJsStr(messageId) + '\')">' + t('forward') + '</button>');
      }

      if (msg.isMine && !msg.deletedAt) {
        items.push('<button onclick="editMsgUI(\'' + escapeJsStr(messageId) + '\')">' + t('edit') + '</button>');
        items.push('<button class="danger" onclick="deleteMsgUI(\'' + escapeJsStr(messageId) + '\')">' + t('delMsg') + '</button>');
      }

      if (!items.length) {
        items.push('<button onclick="closeDD()">' + t('close') + '</button>');
      }

      menu.innerHTML = items.join('');
      menu.classList.add('open');
      backdrop.classList.add('open');

      // Position
      menu.style.left = '0px';
      menu.style.top = '0px';
      var rect = menu.getBoundingClientRect();
      var left = x;
      var top = y;
      if (left + rect.width > window.innerWidth - 8) left = window.innerWidth - rect.width - 8;
      if (top + rect.height > window.innerHeight - 8) top = window.innerHeight - rect.height - 8;
      if (left < 8) left = 8;
      if (top < 8) top = 8;
      menu.style.left = left + 'px';
      menu.style.top = top + 'px';
    }

    function closeDD() {
      ddOpen = false;
      document.getElementById('msgDD').classList.remove('open');
      document.getElementById('ddBD').classList.remove('open');
    }

    function replyToMsg(messageId) {
      var msg = getMsgFromActive(messageId);
      closeDD();
      if (!msg || msg.deletedAt) return;
      replyTarget = msg;
      renderReplyBanner();
      document.getElementById('composerIn').focus();
    }

    function copyMsgText(messageId) {
      var msg = getMsgFromActive(messageId);
      closeDD();
      if (!msg || !msg.text) return;
      if (navigator.clipboard) navigator.clipboard.writeText(msg.text);
    }

    function editMsgUI(messageId) {
      var msg = getMsgFromActive(messageId);
      closeDD();
      if (!msg) return;

      showPrompt(t('edit'), '', msg.text || '').then(function(value) {
        if (value === null) return;
        var newText = String(value || '').trim();
        if (!newText) return;

        google.script.run
          .withSuccessHandler(function(res) {
            if (!res || !res.ok) { showAlert('Error', (res && res.error) || 'Edit failed.'); return; }
            if (res.message) { mergeMessages(aCid, [res.message], false); renderMessages(false); }
            if (res.conversations) { convos = res.conversations; renderSidebar(); }
          })
          .withFailureHandler(function() { showAlert('Error', 'Edit failed.'); })
          .editMessage(sessionToken, messageId, newText);
      });
    }

    function deleteMsgUI(messageId) {
      closeDD();
      showConfirm(t('delMsg'), t('delMsg') + '?', t('delete'), true).then(function(confirmed) {
        if (!confirmed) return;

        google.script.run
          .withSuccessHandler(function(res) {
            if (!res || !res.ok) { showAlert('Error', (res && res.error) || 'Delete failed.'); return; }
            if (res.message) { mergeMessages(aCid, [res.message], false); renderMessages(false); }
            if (res.conversations) { convos = res.conversations; renderSidebar(); }
          })
          .withFailureHandler(function() { showAlert('Error', 'Delete failed.'); })
          .deleteMessage(sessionToken, messageId);
      });
    }

    /* ============================================================
       Forward Message
       ============================================================ */
    function forwardMsgUI(messageId) {
      closeDD();
      var targets = convos.filter(function(c) { return c.type !== 'channel'; });

      openModal({

    function doForward(messageId, targetConversationId) {
      closeModal(null);
      google.script.run
        .withSuccessHandler(function(res) {
          if (res && res.conversations) { convos = res.conversations; renderSidebar(); }
        })
        .withFailureHandler(function() { showAlert('Error', 'Forward failed.'); })
        .forwardMessage(sessionToken, { messageId: messageId, targetConversationId: targetConversationId });

    /* ============================================================
       User Profile Modal
       ============================================================ */
    function openProfile(userId) {
      if (!userId || profileModalOpen) return;
      profileModalOpen = true;

      google.script.run
        .withSuccessHandler(function(res) {
          profileModalOpen = false;
          if (!res || !res.ok) return;

          var p = res.profile;
          var html = '<div class="profile-header">' +
            avatarHTML(p.initials, p.avatarFileId, 'xl', p.isOnline) +
            '<div class="profile-name">' + escapeHtml(p.displayName) + '</div>';

          if (p.isSelf) {
            html += '<button class="secondary-btn" onclick="closeModal(null);changeAvatarUI(\'user\',\'\')">' + t('changeAvatar') + '</button>';

            html += '<button class="primary-btn" onclick="closeModal(null);startDirectMessage(\'' + escapeJsStr(p.userId) + '\')">' + t('sendMsg') + '</button>';

              html += '<button class="danger-btn" onclick="doBlock(\'' + escapeJsStr(p.userId) + '\')">' + t('block') + '</button>';

            buttons: [{ text: t('close'), cls: 'secondary-btn', val: 'close' }]
          });

        .withFailureHandler(function() { profileModalOpen = false; })
        .getUserProfile(sessionToken, userId);

    /* ============================================================
       Conversation/Group Profile
       ============================================================ */
    function openConvoProfile() {
      if (!aCon) return;

      if (aCon.type === 'group' || aCon.type === 'channel') {
        google.script.run

    /* ============================================================
       Avatar Change
       ============================================================ */
    function changeAvatarUI(targetType, targetId) {
      var input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';

      input.onchange = function() {
        var file = input.files && input.files[0];
        if (!file) return;
        if (file.size > 10 * 1024 * 1024) {
          showAlert('Avatar', 'Max 10 MB for avatar.');
          return;
        }

        // Upload file to Drive, then save the fileId as avatar
        google.script.run
          .withSuccessHandler(function(res) {
            if (!res || !res.ok) {
              showAlert('Avatar', (res && res.error) || 'Upload session failed.');
              return;
            }

            var uploadToken = res.uploadToken;
            var uploadUrl = res.uploadUrl;

            var xhr = new XMLHttpRequest();
            xhr.open('PUT', uploadUrl, true);
            xhr.setRequestHeader('Content-Type', file.type);
            xhr.setRequestHeader('Content-Range', 'bytes 0-' + (file.size - 1) + '/' + file.size);

            xhr.onreadystatechange = function() {
              if (xhr.readyState !== 4) return;

              var fileId = '';
              try {
                fileId = JSON.parse(xhr.responseText || '{}').id || '';
              } catch (e) {}

              if (!fileId) {
                // Try to resolve
                google.script.run
                  .withSuccessHandler(function(rr) {
                    if (rr && rr.ok && rr.fileId) {
                      saveAvatarFileId(rr.fileId, targetType, targetId);
                    } else {
                      showAlert('Avatar', 'Could not resolve file.');
                    }
                  })
                  .withFailureHandler(function() { showAlert('Avatar', 'Resolve failed.'); })
                  .resolveUploadedFileId(sessionToken, uploadToken);
                return;
              }

              saveAvatarFileId(fileId, targetType, targetId);
            };

            xhr.send(file);
          })
          .withFailureHandler(function() { showAlert('Avatar', 'Upload failed.'); })
          .createDriveUploadSession(sessionToken, {
            conversationId: aCid || HEYO_CHANNEL_ID || 'cnv_heyo_channel',
            fileName: file.name,
            mimeType: file.type,
            fileSize: file.size,
            text: '',
            replyToMessageId: ''
          });
      };

      input.click();
    }

    function saveAvatarFileId(fileId, targetType, targetId) {
      google.script.run
        .withSuccessHandler(function(res) {
          if (!res || !res.ok) {
            showAlert('Avatar', (res && res.error) || 'Save failed.');
            return;
          }
          if (res.user) {
            CU = res.user;
            renderCurrentUser();
          }
          if (res.conversations) {
            convos = res.conversations;
            aCon = getConvoById(aCid);
            renderSidebar();
            renderTopbar();
          }
        })
        .withFailureHandler(function() { showAlert('Avatar', 'Save failed.'); })
        .updateAvatar(sessionToken, {
          avatarFileId: fileId,
          targetType: targetType || 'user',
          targetId: targetId || ''
        });
    }

    /* ============================================================

       ============================================================ */
    function openModal(config) {
      return new Promise(function(resolve) {
        modalResolver = resolve;

        document.getElementById('modalTitle').textContent = config.title || '';
        document.getElementById('modalBody').textContent = config.message || '';
        document.getElementById('modalContent').innerHTML = config.html || '';

        var actionsEl = document.getElementById('modalActions');
        actionsEl.innerHTML = '';

        (config.buttons || []).forEach(function(btnConfig) {
          var btn = document.createElement('button');
          btn.className = btnConfig.cls || 'secondary-btn';
          btn.textContent = btnConfig.text || 'OK';
          btn.onclick = function() {
            if (typeof config.onAction === 'function') {
              config.onAction(btnConfig.val);
            } else {
              closeModal(btnConfig.val);
            }
          };
          actionsEl.appendChild(btn);
        });

        document.getElementById('modalOv').classList.add('open');
      });
    }

    function closeModal(result) {
      document.getElementById('modalOv').classList.remove('open');
      document.getElementById('modalContent').innerHTML = '';
      document.getElementById('modalActions').innerHTML = '';
      var resolver = modalResolver;
      modalResolver = null;
      if (resolver) resolver(result);
    }

    /* ============================================================
       Utility Functions
       ============================================================ */
    function autoGrowTextarea(el) {
      if (!el) return;
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 180) + 'px';
    }

    function findMessageCard(target) {
      return target ? target.closest('.mc[data-mid]') : null;
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/\n/g, '&#10;');
    }

    function escapeJsStr(value) {
      return String(value || '')
        .replace(/\\/g, '\\\\')
        .replace(/'/g, "\\'")
        .replace(/\n/g, '\\n')
        .replace(/</g, '\\x3C');
    }

    function truncate(value, maxLen) {
      var text = String(value || '');
      return text.length <= maxLen ? text : text.slice(0, maxLen - 1) + '…';
    }

    function formatMessageTime(iso) {
      var d = new Date(iso);
      if (isNaN(d.getTime())) return '';
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function formatSidebarTime(iso) {
      var d = new Date(iso);
      if (isNaN(d.getTime())) return '';
      var now = new Date();
      if (d.toDateString() === now.toDateString()) {
        return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }
      return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
    }

    function formatFileSize(bytes) {
      var v = Number(bytes);
      if (!Number.isFinite(v) || v <= 0) return '0 B';
      var units = ['B', 'KB', 'MB', 'GB'];
      var size = v;
      var unit = 0;
      while (size >= 1024 && unit < units.length - 1) { size /= 1024; unit++; }
      return (size >= 10 || unit === 0 ? size.toFixed(0) : size.toFixed(1)) + ' ' + units[unit];
    }

    function detectCategory(mimeType) {
      var type = String(mimeType || '').toLowerCase();
      if (type.startsWith('image/')) return 'image';
      if (type.startsWith('video/')) return 'video';
      if (type.startsWith('audio/')) return 'audio';
      return 'file';
    }

    function buildAttachmentMeta(att) {
      var parts = [];
      var cat = detectCategory(att.mimeType);
      if (cat === 'image') parts.push('Photo');
      else if (cat === 'video') parts.push('Video');
      else if (cat === 'audio') parts.push('Audio');
      else parts.push('File');
      if (att.size > 0) parts.push(formatFileSize(att.size));
      return parts.join(' • ');
    }

    function getAttachmentIcon(att) {
      var cat = detectCategory(att && att.mimeType);
      if (cat === 'image') return '🖼';
      if (cat === 'video') return '🎬';
      if (cat === 'audio') return '🎵';
      var ext = (att && att.name || '').split('.').pop().toLowerCase();
      if (ext === 'pdf') return '📕';
      if (['doc', 'docx', 'txt', 'md'].indexOf(ext) !== -1) return '📄';
      if (['zip', 'rar', '7z'].indexOf(ext) !== -1) return '🗜';
      return '📎';
    }

    messagesEl.addEventListener('touchmove', function() { clearTimeout(longPressTimer); }, { passive: true });

      }
    });

    document.addEventListener('scroll', function() { closeDD(); }, true);

    window.addEventListener('resize', function() {
      closeDD();
      if (window.innerWidth > 900) closeMobSB();
    });

    /* ============================================================
       Init
       ============================================================ */
    verifySession();
    switchAuth('login');
  </script>
