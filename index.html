<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  >
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap');

    :root {
      --bg: #f5f6fa;
      --panel: #ffffff;
      --panel-2: #f8f9fd;
      --text: #20242c;
      --muted: #6e7685;
      --border: #e5e8f0;
      --accent: #4f46e5;
      --accent-soft: #eef0ff;
      --danger: #d92d20;
      --success: #0f9d58;
      --warning: #c27803;
      --overlay: rgba(15, 23, 42, 0.44);
      --my-msg: #edf2ff;
      --other-msg: #ffffff;
      --reply-bg: #f4f6fb;
      --shadow: 0 14px 34px rgba(15, 23, 42, 0.10);
      --sidebar-width: 310px;
    }

    body.dark {
      --bg: #0d1117;
      --panel: #151b23;
      --panel-2: #10161d;
      --text: #e6edf3;
      --muted: #98a5b7;
      --border: #263041;
      --accent: #7c8cff;
      --accent-soft: #1d2442;
      --danger: #ff6b6b;
      --success: #39c57a;
      --warning: #f1b14d;
      --overlay: rgba(0, 0, 0, 0.58);
      --my-msg: #1a2747;
      --other-msg: #161d28;
      --reply-bg: #111824;
      --shadow: 0 16px 36px rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      animation: none !important;
      transition: none !important;
      scroll-behavior: auto !important;
    }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: 'Ubuntu', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      user-select: none;
    }

    input, textarea {
      user-select: text;
      font: inherit;
    }

    button, select, progress {
      font: inherit;
    }

    textarea {
      resize: none;
    }

    a {
      color: inherit;
    }

    .screen {
      display: none;
      height: 100vh;
      width: 100%;
    }

    .screen.active {
      display: flex;
    }

    .auth-screen {
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .auth-brand {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .auth-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .tabs button {
      flex: 1;
      height: 42px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }

    .tabs button.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .auth-block {
      display: none;
    }

    .auth-block.active {
      display: block;
    }

    .field {
      margin-bottom: 10px;
    }

    .field label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 5px;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 10px;
      outline: none;
      padding: 11px 12px;
    }

    .field-row {
      display: flex;
      gap: 10px;
    }

    .field-row > * {
      flex: 1;
      min-width: 0;
    }

    .submit-btn,
    .primary-btn,
    .secondary-btn,
    .danger-btn,
    .ghost-btn {
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      padding: 11px 14px;
    }

    .submit-btn,
    .primary-btn {
      background: var(--accent);
      color: white;
    }

    .secondary-btn,
    .ghost-btn {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .danger-btn {
      background: var(--danger);
      color: white;
    }

    .submit-btn[disabled],
    .primary-btn[disabled],
    .secondary-btn[disabled],
    .danger-btn[disabled],
    .ghost-btn[disabled],
    .icon-btn[disabled] {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .submit-btn {
      width: 100%;
      margin-top: 4px;
    }

    .status {
      min-height: 20px;
      margin-top: 12px;
      font-size: 14px;
      color: var(--danger);
    }

    .app-shell {
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      width: 100%;
      height: 100vh;
    }

    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .sidebar-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid var(--border);
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 700;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    .avatar.large {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      font-size: 18px;
    }

    .user-box {
      min-width: 0;
      flex: 1;
    }

    .user-box .name {
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-box .meta {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .icon-btn {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      width: 38px;
      height: 38px;
      border-radius: 10px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .search-wrap {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 10px;
      outline: none;
      padding: 11px 12px;
    }

    .search-results {
      position: absolute;
      top: calc(100% - 4px);
      left: 14px;
      right: 14px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      max-height: 300px;
      overflow-y: auto;
      display: none;
      z-index: 1200;
    }

    .search-results.open {
      display: block;
    }

    .search-item {
      display: flex;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      background: var(--panel);
    }

    .search-item:last-child {
      border-bottom: none;
    }

    .search-item:hover {
      background: var(--panel-2);
    }

    .search-item-meta {
      min-width: 0;
      flex: 1;
    }

    .search-item-title {
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-item-sub {
      font-size: 12px;
      color: var(--muted);
      overflow-wrap: anywhere;
      margin-top: 2px;
      line-height: 1.35;
    }

    .sidebar-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 10px;
    }

    .section-title {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 8px 8px 6px;
    }

    .conversation-item {
      display: flex;
      gap: 10px;
      padding: 10px;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 4px;
      border: 1px solid transparent;
    }

    .conversation-item:hover {
      background: var(--panel-2);
    }

    .conversation-item.active {
      background: var(--accent-soft);
      border-color: rgba(79, 70, 229, 0.16);
    }

    .conversation-meta {
      min-width: 0;
      flex: 1;
    }

    .conversation-line {
      display: flex;
      gap: 8px;
      align-items: center;
      min-width: 0;
    }

    .conversation-title {
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conversation-time {
      margin-left: auto;
      flex-shrink: 0;
      font-size: 11px;
      color: var(--muted);
    }

    .conversation-subtitle,
    .conversation-last {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .chat-panel {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }

    .chat-topbar {
      height: 64px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      flex-shrink: 0;
    }

    .chat-title-box {
      min-width: 0;
      flex: 1;
    }

    .chat-title {
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-subtitle {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .chat-main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .placeholder-card {
      width: 100%;
      max-width: 700px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .placeholder-card h2 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .placeholder-card p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.6;
    }

    .tip-box {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }

    .tip-index {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .tip-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .tip-text {
      line-height: 1.6;
    }

    .tip-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .conversation-view {
      display: none;
      flex: 1;
      min-height: 0;
      flex-direction: column;
    }

    .conversation-view.active {
      display: flex;
    }

    .messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .empty-state {
      margin: auto;
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }

    .message-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      max-width: 88%;
    }

    .message-row.mine {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message-row .avatar {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      font-size: 13px;
    }

    .message-card {
      min-width: 0;
      max-width: 100%;
      background: var(--other-msg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    .message-row.mine .message-card {
      background: var(--my-msg);
    }

    .message-head {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 6px;
    }

    .message-author {
      font-size: 13px;
      font-weight: 700;
    }

    .message-username {
      font-size: 12px;
      color: var(--muted);
    }

    .message-reply {
      border-left: 3px solid var(--accent);
      background: var(--reply-bg);
      border-radius: 10px;
      padding: 7px 10px;
      margin-bottom: 8px;
    }

    .message-reply-name {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 2px;
    }

    .message-reply-text {
      font-size: 12px;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message-text {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.55;
      user-select: text;
    }

    .message-text.deleted {
      font-style: italic;
      color: var(--muted);
    }

    .message-attachments {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }

    .message-attachments:first-child {
      margin-top: 0;
      margin-bottom: 10px;
    }

    .attachment-card {
      border: 1px solid var(--border);
      background: var(--panel-2);
      border-radius: 14px;
      overflow: hidden;
    }

    .attachment-image-link,
    .attachment-video-link {
      display: block;
      text-decoration: none;
    }

    .attachment-image,
    .attachment-video {
      display: block;
      width: 100%;
      max-width: 420px;
      max-height: 360px;
      object-fit: cover;
      background: #000;
      border-bottom: 1px solid var(--border);
    }

    .attachment-file {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px;
      min-width: 0;
    }

    .attachment-file-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--accent-soft);
      color: var(--accent);
      display: grid;
      place-items: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .attachment-file-body {
      min-width: 0;
      flex: 1;
    }

    .attachment-file-name {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
      word-break: break-word;
    }

    .attachment-file-meta {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
      word-break: break-word;
    }

    .attachment-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .attachment-action-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 8px 10px;
      border-radius: 10px;
      text-decoration: none;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
    }

    .attachment-caption {
      padding: 10px 12px;
      border-top: 1px solid var(--border);
    }

    .attachment-caption-name {
      font-size: 14px;
      font-weight: 700;
      word-break: break-word;
    }

    .attachment-caption-meta {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
      word-break: break-word;
    }

    .message-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .composer-wrap {
      background: var(--panel);
      border-top: 1px solid var(--border);
      padding: 12px 14px 14px;
      flex-shrink: 0;
    }

    .reply-banner,
    .upload-banner {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }

    .reply-banner.active,
    .upload-banner.active {
      display: flex;
    }

    .reply-banner-meta,
    .upload-banner-meta {
      min-width: 0;
      flex: 1;
    }

    .reply-banner-label,
    .upload-banner-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .reply-banner-text,
    .upload-banner-text {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .upload-banner-label.error {
      color: var(--danger);
    }

    .upload-banner-label.success {
      color: var(--success);
    }

    .upload-progress-wrap {
      margin-top: 8px;
    }

    .upload-progress {
      width: 100%;
      height: 10px;
      appearance: none;
      border: none;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(0,0,0,0.08);
    }

    .upload-progress::-webkit-progress-bar {
      background: rgba(0,0,0,0.08);
    }

    .upload-progress::-webkit-progress-value {
      background: var(--accent);
    }

    .upload-progress::-moz-progress-bar {
      background: var(--accent);
    }

    .composer {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .composer-actions {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .composer textarea {
      flex: 1;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 12px;
      outline: none;
      min-height: 48px;
      max-height: 180px;
      padding: 12px;
      overflow-y: auto;
    }

    .dropdown-backdrop,
    .modal-overlay {
      position: fixed;
      inset: 0;
      display: none;
    }

    .dropdown-backdrop.open {
      display: block;
      z-index: 9998;
    }

    .message-dropdown {
      position: fixed;
      min-width: 180px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 6px;
      display: none;
      z-index: 9999;
    }

    .message-dropdown.open {
      display: block;
    }

    .message-dropdown button {
      width: 100%;
      border: none;
      background: transparent;
      text-align: left;
      color: var(--text);
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 500;
    }

    .message-dropdown button:hover {
      background: var(--panel-2);
    }

    .message-dropdown button.danger {
      color: var(--danger);
    }

    .modal-overlay {
      background: var(--overlay);
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 12000;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 500px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .modal-head {
      padding: 16px 18px 8px;
      font-size: 18px;
      font-weight: 700;
    }

    .modal-body {
      padding: 0 18px 16px;
      color: var(--muted);
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .modal-content {
      padding: 0 18px 16px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 0 18px 18px;
      flex-wrap: wrap;
    }

    .mobile-toggle {
      display: none;
    }

    .mobile-sidebar-backdrop {
      display: none;
    }

    @media (max-width: 900px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      .sidebar.mobile-open {
        display: flex;
        position: fixed;
        inset: 0 auto 0 0;
        width: min(92vw, 360px);
        z-index: 13000;
        box-shadow: var(--shadow);
      }

      .mobile-sidebar-backdrop {
        position: fixed;
        inset: 0;
        background: var(--overlay);
        display: none;
        z-index: 12999;
      }

      .mobile-sidebar-backdrop.open {
        display: block;
      }

      .mobile-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .message-row {
        max-width: 100%;
      }

      .composer {
        align-items: stretch;
      }

      .composer-actions {
        flex-direction: column;
      }

      .attachment-image,
      .attachment-video {
        max-width: 100%;
      }
    }
  </style>
</head>
<body class="light">
  <div id="authScreen" class="screen auth-screen active">
    <div class="auth-card">
      <div class="auth-brand">Heyo</div>
      <div class="auth-sub">Main chat, direct messages, profile settings, reply menu, theme support, and file uploads.</div>

      <div class="tabs">
        <button id="loginTabBtn" class="active" onclick="switchAuthMode('login')">Login</button>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyNPd61vCK7kVy_eLBlBGsPI2L3q6G2ZMTrIRJx8RHN-EguZrO8rtPIZci8kxkUFMBvbA/exec';
    const MAX_UPLOAD_BYTES = 1024 * 1024 * 1024;
    const CHUNK_SIZE = 8 * 1024 * 1024;

    (function initGoogleScriptRunAdapter() {
      function createRunner(successHandler, failureHandler) {
        const chain = {
          withSuccessHandler(cb) {
            return createRunner(typeof cb === 'function' ? cb : null, failureHandler);
          },

          withFailureHandler(cb) {
            return createRunner(successHandler, typeof cb === 'function' ? cb : null);
          }
        };

        return new Proxy(chain, {
          get(target, prop) {
            if (prop in target) return target[prop];
            if (typeof prop !== 'string') return undefined;

            return function(...args) {
              callServerAction(prop, args, successHandler, failureHandler);
            };
          }
        });
      }

      async function callServerAction(action, args, successHandler, failureHandler) {
        try {
          if (!SCRIPT_URL || SCRIPT_URL === 'YOUR_GAS_WEB_APP_URL_HERE') {
            throw new Error('SCRIPT_URL is not configured.');
          }

          const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            redirect: 'follow',
            headers: {
              'Content-Type': 'text/plain;charset=utf-8'
            },
            body: JSON.stringify({
              action: action,
              data: args
            })
          });

          const raw = await response.text();

          let result;
          try {
            result = raw ? JSON.parse(raw) : null;
          } catch (e) {
            throw new Error('Server returned invalid JSON.');
          }

          if (typeof successHandler === 'function') {
            successHandler(result);
          }
        } catch (error) {
          if (typeof failureHandler === 'function') {
            failureHandler(error);
          } else {
            console.error('google.script.run adapter error:', error);
          }
        }
      }

      window.google = window.google || {};
      window.google.script = window.google.script || {};
      window.google.script.run = createRunner(null, null);
    })();

    let authMode = 'login';
    let registerMethod = 'email';

    let sessionToken = localStorage.getItem('heyo_token') || '';
    let currentUser = null;

    let conversations = [];
    let activeConversationId = '';
    let activeConversation = null;

    const conversationVersions = new Map();
    const messagesByConversation = new Map();

    let pollingHandle = null;
    let sidebarRefreshHandle = null;

    let isLoadingConversation = false;
    let needsReloadConversation = false;

    let searchDebounce = null;
    let replyTarget = null;
    let activeModalResolver = null;

    let dropdownState = {
      open: false,
      messageId: '',
      anchor: null
    };

    let longPressTimer = null;
    let longPressTriggered = false;

    let uploadState = {
      active: false,
      file: null,
      xhr: null,
      uploadToken: '',
      uploadUrl: '',
      fileId: '',
      conversationId: '',
      progress: 0,
      phase: ''
    };

    const tips = [
      {
        title: 'Main is the public room',
        text: 'Every authenticated user can see and use the Main conversation.'
      },
      {
        title: 'Direct messages are isolated',
        text: 'Main and direct messages are separate conversations and do not share messages.'
      },
      {
        title: 'Search works with username and @username',
        text: 'You can search by display name, bio, username, or @username.'
      },
      {
        title: 'You can message yourself',
        text: 'Your own account is included in search results, which works like saved messages.'
      },
      {
        title: 'Right-click and long-press open the message menu',
        text: 'Use right-click on desktop or long-press on mobile to reply, edit, delete, or copy.'
      },
      {
        title: 'Files go straight to Google Drive',
        text: 'Photos, videos, and any files up to 1 GB upload directly to Drive and then appear in chat.'
      }
    ];
    let tipIndex = 0;

    function switchAuthMode(mode) {
      authMode = mode;
      document.getElementById('loginTabBtn').classList.toggle('active', mode === 'login');
      document.getElementById('registerTabBtn').classList.toggle('active', mode === 'register');
      document.getElementById('loginBlock').classList.toggle('active', mode === 'login');
      document.getElementById('registerBlock').classList.toggle('active', mode === 'register');
      setAuthStatus('');
    }

    function switchRegisterMethod(method) {
      registerMethod = method;
      document.getElementById('regEmailBtn').classList.toggle('active', method === 'email');
      document.getElementById('regPhoneBtn').classList.toggle('active', method === 'phone');
      document.getElementById('registerEmailWrap').style.display = method === 'email' ? '' : 'none';
      document.getElementById('registerPhoneWrap').style.display = method === 'phone' ? '' : 'none';
    }

    function setAuthStatus(text) {
      document.getElementById('authStatus').textContent = text || '';
    }

    function submitLogin() {
      const identifier = document.getElementById('loginIdentifier').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!identifier || !password) {
        setAuthStatus('Identifier and password are required.');
        return;
      }

      setAuthStatus('Logging in...');

      google.script.run
        .withSuccessHandler(function(res) {
          if (!res || !res.ok) {
            setAuthStatus((res && res.error) || 'Login failed.');
            return;
          }

          sessionToken = res.token;
          localStorage.setItem('heyo_token', sessionToken);
          currentUser = res.user;
          document.getElementById('loginPassword').value = '';
          setAuthStatus('');
          startApp();
        })
        .withFailureHandler(function(err) {
          console.error(err);
          setAuthStatus('Login failed.');
        })
        .login(identifier, password);
    }

    function submitRegister() {
      const payload = {
        displayName: document.getElementById('registerDisplayName').value.trim(),
        username: document.getElementById('registerUsername').value.trim(),
        password: document.getElementById('registerPassword').value,
        email: registerMethod === 'email' ? document.getElementById('registerEmail').value.trim() : '',
        phoneCountry: registerMethod === 'phone' ? document.getElementById('registerPhoneCountry').value : '',
        phone: registerMethod === 'phone' ? document.getElementById('registerPhone').value.trim() : '',
        bio: document.getElementById('registerBio').value.trim(),
        theme: 'light'
      };

      if (!payload.displayName || !payload.username || !payload.password) {
        setAuthStatus('Display name, username and password are required.');
        return;
      }

      if (registerMethod === 'email' && !payload.email) {
        setAuthStatus('Email is required.');
        return;
      }

      if (registerMethod === 'phone' && !payload.phone) {
        setAuthStatus('Phone is required.');
        return;
      }

      setAuthStatus('Creating account...');

      google.script.run
        .withSuccessHandler(function(res) {
          if (!res || !res.ok) {
            setAuthStatus((res && res.error) || 'Registration failed.');
            return;
          }

          sessionToken = res.token;
          localStorage.setItem('heyo_token', sessionToken);
          currentUser = res.user;
          setAuthStatus('');
          startApp();
        })
        .withFailureHandler(function(err) {
          console.error(err);
          setAuthStatus('Registration failed.');
        })
        .registerAccount(payload);
    }

    function verifySession() {
      if (!sessionToken) {
        showAuthScreen();
        return;
      }

      google.script.run
        .withSuccessHandler(function(res) {
          if (!res || !res.ok) {
            localStorage.removeItem('heyo_token');
            sessionToken = '';
            currentUser = null;
            showAuthScreen();
            return;
          }

          currentUser = res.user;
          startApp();
        })
        .withFailureHandler(function(err) {
          console.error(err);
          localStorage.removeItem('heyo_token');
          sessionToken = '';
          currentUser = null;
          showAuthScreen();
        })
        .getSession(sessionToken);
    }

    function showAuthScreen() {
      stopPolling();
      document.getElementById('authScreen').classList.add('active');
      document.getElementById('appScreen').classList.remove('active');
    }

    function showAppScreen() {
      document.getElementById('authScreen').classList.remove('active');
      document.getElementById('appScreen').classList.add('active');
    }

    function startApp() {
      resetAppState();
      showAppScreen();
      applyTheme(currentUser && currentUser.theme ? currentUser.theme : 'light');
      renderCurrentUser();
      renderTips();
      autoGrowTextarea(document.getElementById('composerInput'));
      fetchAppData(true);
      startPolling();
    }

    function resetAppState() {
      conversations = [];
      activeConversationId = '';
      activeConversation = null;
      conversationVersions.clear();
      messagesByConversation.clear();
      replyTarget = null;
      clearSearchResults();
      closeMessageDropdown();
      resetUploadState(true);
      showPlaceholder();
    }

    function renderCurrentUser() {
      if (!currentUser) return;
      document.getElementById('meDisplayName').textContent = currentUser.displayName || 'User';
      document.getElementById('meUsername').textContent = '@' + (currentUser.username || 'user');
      document.getElementById('meAvatar').textContent = getInitial(currentUser.displayName || currentUser.username || 'U');
    }

    function fetchAppData(initial) {
      if (!sessionToken) return;

      google.script.run
        .withSuccessHandler(function(res) {
          if (!res || !res.ok) {
            handleAppError(res);
            return;
          }

          currentUser = res.user;
          conversations = Array.isArray(res.conversations) ? res.conversations : [];
          renderCurrentUser();
          applyTheme(currentUser.theme || 'light');
          renderSidebar();

          if (initial) {
            showPlaceholder();
          } else if (activeConversationId) {
            activeConversation = getConversationById(activeConversationId);
            if (!activeConversation) {
              showPlaceholder();
            } else {
              renderActiveTopbar();
            }
          }
        })
        .withFailureHandler(function(err) {
          console.error(err);
        })
        .getAppData(sessionToken);
    }

    function refreshSidebarOnly() {
      if (!sessionToken) return;

      google.script.run
        .withSuccessHandler(function(res) {
          if (!res || !res.ok) return;
          if (res.user) {
            currentUser = res.user;
            renderCurrentUser();
            applyTheme(currentUser.theme || 'light');
          }
          if (Array.isArray(res.conversations)) {
            conversations = res.conversations;
            activeConversation = getConversationById(activeConversationId);
            renderSidebar();
            renderActiveTopbar();
          }
        })
        .withFailureHandler(function(err) {
          console.error(err);
        })
        .getAppData(sessionToken);
    }

    function startPolling() {
      stopPolling();

      pollingHandle = setInterval(function() {
        if (activeConversationId) {
          loadConversation(false);
        }
      }, 1400);

      sidebarRefreshHandle = setInterval(function() {
        refreshSidebarOnly();
      }, 4000);
    }

    function stopPolling() {
      if (pollingHandle) {
        clearInterval(pollingHandle);
        pollingHandle = null;
      }
      if (sidebarRefreshHandle) {
        clearInterval(sidebarRefreshHandle);
        sidebarRefreshHandle = null;
      }
    }

    function getConversationById(conversationId) {
      return conversations.find(function(item) {
        return item.conversationId === conversationId;
      }) || null;
    }

    function renderSidebar() {
      const main = conversations.filter(function(c) { return c.type === 'main'; });
      const direct = conversations.filter(function(c) { return c.type === 'direct'; });

      document.getElementById('mainConversationList').innerHTML =
        main.map(renderConversationItem).join('') || '';

      document.getElementById('directConversationList').innerHTML =
        direct.length
          ? direct.map(renderConversationItem).join('')
          : '<div class="empty-state" style="margin:0; padding:14px;">No direct messages yet</div>';
    }

    function renderConversationItem(conversation) {
      const active = conversation.conversationId === activeConversationId ? 'active' : '';
      const subtitle = conversation.subtitle ? `<div class="conversation-subtitle">${escapeHtml(conversation.subtitle)}</div>` : '';
      const last = conversation.lastMessageText ? `<div class="conversation-last">${escapeHtml(conversation.lastMessageText)}</div>` : '';
      const time = conversation.lastMessageAt ? formatSidebarTime(conversation.lastMessageAt) : '';

      return `
        <div class="conversation-item ${active}" onclick="selectConversation('${escapeJsString(conversation.conversationId)}')">
          <div class="avatar">${escapeHtml(conversation.initials || 'C')}</div>
          <div class="conversation-meta">
            <div class="conversation-line">
              <div class="conversation-title">${escapeHtml(conversation.title || 'Conversation')}</div>
              <div class="conversation-time">${escapeHtml(time)}</div>
            </div>
            ${subtitle}
            ${last}
          </div>
        </div>
      `;
    }

    function selectMainConversation() {
      const main = conversations.find(function(c) { return c.type === 'main'; });
      if (main) selectConversation(main.conversationId);
    }

    function selectConversation(conversationId) {
      activeConversationId = conversationId;
      activeConversation = getConversationById(conversationId);
      replyTarget = null;
      renderReplyBanner();
      renderSidebar();
      renderActiveTopbar();
      showConversationView();
      closeMobileSidebar();
      resetUploadState(true);

      if (!conversationVersions.has(conversationId)) {
        conversationVersions.set(conversationId, 0);
      }
      if (!messagesByConversation.has(conversationId)) {
        messagesByConversation.set(conversationId, []);
      }

      loadConversation(true);
    }

    function renderActiveTopbar() {
      const title = document.getElementById('chatTitle');
      const subtitle = document.getElementById('chatSubtitle');
      const avatar = document.getElementById('topAvatar');

      if (!activeConversation) {
        title.textContent = 'Tips';
        subtitle.textContent = 'No conversation selected';
        avatar.textContent = 'T';
        return;
      }

      title.textContent = activeConversation.title || 'Conversation';
      subtitle.textContent = activeConversation.subtitle || (activeConversation.type === 'main' ? 'Public room' : 'Direct message');
      avatar.textContent = getInitial(activeConversation.title || 'C');
    }

    function showPlaceholder() {
      activeConversationId = '';
      activeConversation = null;
      renderActiveTopbar();
      renderSidebar();
      document.getElementById('placeholderView').style.display = 'flex';
      document.getElementById('conversationView').classList.remove('active');
    }

    function showConversationView() {
      document.getElementById('placeholderView').style.display = 'none';
      document.getElementById('conversationView').classList.add('active');
    }

    function loadConversation(forceScroll) {
      if (!sessionToken || !activeConversationId) return;

      if (isLoadingConversation) {
        needsReloadConversation = true;
        return;
      }

      isLoadingConversation = true;

      const requestedConversationId = activeConversationId;
      const sinceVersion = Number(conversationVersions.get(requestedConversationId) || 0);

      google.script.run
        .withSuccessHandler(function(res) {
          isLoadingConversation = false;

          if (!res || !res.ok) {
            handleAppError(res);
            return;
          }

          if (String(res.conversationId || '') !== requestedConversationId) {
            return;
          }

          if (typeof res.version === 'number') {
            conversationVersions.set(requestedConversationId, res.version);
          }

          if (res.reset || !messagesByConversation.has(requestedConversationId)) {
            messagesByConversation.set(requestedConversationId, []);
          }

          if (Array.isArray(res.messages) && res.messages.length) {
            mergeMessages(requestedConversationId, res.messages, !!res.reset);
          } else if (res.reset) {
            messagesByConversation.set(requestedConversationId, []);
          }

          if (activeConversationId === requestedConversationId) {
            renderMessages(forceScroll);
          }

          if (needsReloadConversation) {
            needsReloadConversation = false;
            loadConversation(false);
          }
        })
        .withFailureHandler(function(err) {
          console.error(err);
          isLoadingConversation = false;
        })
        .getConversationMessages(sessionToken, requestedConversationId, sinceVersion);
    }

    function mergeMessages(conversationId, incoming, reset) {
      let current = reset ? [] : (messagesByConversation.get(conversationId) || []);
      const byId = new Map();

      current.forEach(function(item) {
        byId.set(item.messageId, item);
      });

      incoming.forEach(function(item) {
        byId.set(item.messageId, normalizeIncomingMessage(item));
      });

      const merged = Array.from(byId.values()).sort(function(a, b) {
        const ta = a.createdAt ? new Date(a.createdAt).getTime() : 0;
        const tb = b.createdAt ? new Date(b.createdAt).getTime() : 0;
        if (ta !== tb) return ta - tb;
        return String(a.messageId).localeCompare(String(b.messageId));
      });

      messagesByConversation.set(conversationId, merged);
    }

    function normalizeIncomingMessage(msg) {
      const normalized = Object.assign({}, msg || {});
      normalized.attachments = Array.isArray(normalized.attachments)
        ? normalized.attachments.map(normalizeIncomingAttachment).filter(Boolean)
        : [];
      normalized.hasAttachments = normalized.attachments.length > 0;
      normalized.attachmentCount = normalized.attachments.length;
      normalized.messageType = deriveClientMessageType(normalized.text, normalized.attachments, normalized.messageType);
      return normalized;
    }

    function normalizeIncomingAttachment(item) {
      if (!item || typeof item !== 'object') return null;
      const att = Object.assign({}, item);
      att.fileId = String(att.fileId || '');
      att.name = String(att.name || '');
      att.mimeType = String(att.mimeType || 'application/octet-stream');
      att.size = Number.isFinite(Number(att.size)) ? Math.max(0, Math.floor(Number(att.size))) : 0;
      att.category = detectAttachmentCategory(att.mimeType);
      att.extension = extractFileExtension(att.name);
      att.webViewLink = String(att.webViewLink || '');
      att.webContentLink = String(att.webContentLink || '');
      att.thumbnailLink = String(att.thumbnailLink || '');
      att.iconLink = String(att.iconLink || '');
      if (!att.fileId || !att.name) return null;
      return att;
    }

    function renderMessages(forceScroll) {
      const messagesEl = document.getElementById('messages');
      const list = messagesByConversation.get(activeConversationId) || [];
      const nearBottom = Math.abs(messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight) < 90;

      if (!list.length) {
        messagesEl.innerHTML = '<div class="empty-state">No messages here yet</div>';
      } else {
        messagesEl.innerHTML = list.map(renderMessage).join('');
      }

      if (forceScroll || nearBottom) {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
    }

    function renderMessage(msg) {
      const mineClass = msg.isMine ? 'mine' : '';
      const replyBlock = msg.replyToMessageId ? `
        <div class="message-reply">
          <div class="message-reply-name">${escapeHtml(msg.replyDisplayName || 'Reply')}</div>
          <div class="message-reply-text">${escapeHtml(msg.replyPreview || '')}</div>
        </div>
      ` : '';

      const attachmentsHtml = renderMessageAttachments(msg.attachments || []);
      const textBlock = msg.deletedAt
        ? '<div class="message-text deleted">This message was deleted.</div>'
        : (msg.text ? `<div class="message-text">${escapeHtml(msg.text || '')}</div>` : '');

      const meta = [];
      if (msg.createdAt) meta.push(formatMessageTime(msg.createdAt));
      if (msg.editedAt && !msg.deletedAt) meta.push('edited');
      if (msg.hasAttachments) meta.push(String(msg.attachmentCount || 0) + ' file' + ((msg.attachmentCount || 0) === 1 ? '' : 's'));

      return `
        <div class="message-row ${mineClass}">
          <div class="avatar">${escapeHtml(msg.initials || 'U')}</div>
          <div
            class="message-card"
            data-message-id="${escapeAttr(msg.messageId)}"
            data-own="${msg.isMine ? '1' : '0'}"
            data-deleted="${msg.deletedAt ? '1' : '0'}"
          >
            <div class="message-head">
              <div class="message-author">${escapeHtml(msg.displayName || 'User')}</div>
              <div class="message-username">@${escapeHtml(msg.username || '')}</div>
            </div>
            ${replyBlock}
            ${attachmentsHtml}
            ${textBlock}
            <div class="message-meta">
              ${meta.map(function(x) {
                return '<span>' + escapeHtml(x) + '</span>';
              }).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function renderMessageAttachments(attachments) {
      if (!attachments || !attachments.length) return '';

      return `
        <div class="message-attachments">
          ${attachments.map(renderSingleAttachment).join('')}
        </div>
      `;
    }

    function renderSingleAttachment(att) {
      const safeName = escapeHtml(att.name || 'file');
      const safeMeta = escapeHtml(buildAttachmentMetaText(att));
      const viewLink = escapeAttr(att.webViewLink || att.webContentLink || '#');
      const downloadLink = escapeAttr(att.webContentLink || att.webViewLink || '#');
      const canOpen = !!(att.webViewLink || att.webContentLink);

      if (att.category === 'image') {
        const src = escapeAttr(att.thumbnailLink || att.webContentLink || att.webViewLink || '');
        return `
          <div class="attachment-card">
            <a class="attachment-image-link" href="${viewLink}" target="_blank" rel="noopener noreferrer">
              <img class="attachment-image" src="${src}" alt="${safeName}" loading="lazy">
            </a>
            <div class="attachment-caption">
              <div class="attachment-caption-name">${safeName}</div>
              <div class="attachment-caption-meta">${safeMeta}</div>
              <div class="attachment-actions">
                ${canOpen ? `<a class="attachment-action-link" href="${viewLink}" target="_blank" rel="noopener noreferrer">Open</a>` : ''}
                ${canOpen ? `<a class="attachment-action-link" href="${downloadLink}" target="_blank" rel="noopener noreferrer">Download</a>` : ''}
              </div>
            </div>
          </div>
        `;
      }

      if (att.category === 'video') {
        const src = escapeAttr(att.webContentLink || att.webViewLink || '');
        return `
          <div class="attachment-card">
            <a class="attachment-video-link" href="${viewLink}" target="_blank" rel="noopener noreferrer">
              <video class="attachment-video" controls preload="metadata" ${src ? `src="${src}"` : ''}></video>
            </a>
            <div class="attachment-caption">
              <div class="attachment-caption-name">${safeName}</div>
              <div class="attachment-caption-meta">${safeMeta}</div>
              <div class="attachment-actions">
                ${canOpen ? `<a class="attachment-action-link" href="${viewLink}" target="_blank" rel="noopener noreferrer">Open</a>` : ''}
                ${canOpen ? `<a class="attachment-action-link" href="${downloadLink}" target="_blank" rel="noopener noreferrer">Download</a>` : ''}
              </div>
            </div>
          </div>
        `;
      }

      return `
        <div class="attachment-card">
          <div class="attachment-file">
            <div class="attachment-file-icon">${escapeHtml(getAttachmentIcon(att))}</div>
            <div class="attachment-file-body">
              <div class="attachment-file-name">${safeName}</div>
              <div class="attachment-file-meta">${safeMeta}</div>
              <div class="attachment-actions">
                ${canOpen ? `<a class="attachment-action-link" href="${viewLink}" target="_blank" rel="noopener noreferrer">Open</a>` : ''}
                ${canOpen ? `<a class="attachment-action-link" href="${downloadLink}" target="_blank" rel="noopener noreferrer">Download</a>` : ''}
              </div>
            </div>
          </div>

    function sendMessageFromUI() {
      if (!sessionToken || !activeConversationId) return;
      if (uploadState.active) return;

      const input = document.getElementById('composerInput');
      const button = document.getElementById('sendBtn');
      const text = input.value.trim();
      if (!text) return;

      const requestedConversationId = activeConversationId;
      button.disabled = true;
      setComposerDisabled(true);

      google.script.run
        .withSuccessHandler(function(res) {
          button.disabled = false;
          setComposerDisabled(false);

          if (!res || !res.ok) {
            showAlert('Send message', (res && res.error) || 'Failed to send message.');
            return;
          }

          input.value = '';
          autoGrowTextarea(input);
          clearReplyTarget();

          if (Array.isArray(res.conversations)) {
            conversations = res.conversations;
            activeConversation = getConversationById(activeConversationId);
            renderSidebar();
            renderActiveTopbar();
          }

          if (String(res.conversationId || '') !== requestedConversationId) {
            return;
          }

          if (typeof res.version === 'number') {
            conversationVersions.set(requestedConversationId, res.version);
          }

          if (res.message) {
            mergeMessages(requestedConversationId, [res.message], false);

    function openFilePicker() {
      if (!sessionToken || !activeConversationId) return;
      if (uploadState.active) return;
      document.getElementById('fileInput').click();
    }

    function handleFileSelection(file) {
      if (!file) return;
      if (!sessionToken || !activeConversationId) return;

      if (uploadState.active) {
        showAlert('Upload', 'Another upload is already in progress.');
        return;
      }

      if (file.size <= 0) {
        showAlert('Upload', 'Empty file is not allowed.');
        return;
      }

      if (file.size > MAX_UPLOAD_BYTES) {
        showAlert('Upload', 'File exceeds 1 GB limit.');
        return;
      }

      const conversationIdAtStart = activeConversationId;
      const text = document.getElementById('composerInput').value.trim();

      uploadState.active = true;
      uploadState.file = file;
      uploadState.conversationId = conversationIdAtStart;
      uploadState.phase = 'preparing';
      uploadState.progress = 0;
      renderUploadBanner('Preparing upload: ' + file.name, 'default', 0, true);
      setComposerDisabled(true);

      google.script.run
        .withSuccessHandler(function(res) {
          if (!uploadState.active) return;

          if (!res || !res.ok) {
            showAlert('Upload', (res && res.error) || 'Failed to create upload session.');
            resetUploadState();
            return;
          }

          if (conversationIdAtStart !== activeConversationId) {
            showAlert('Upload', 'Conversation changed during upload setup.');
            resetUploadState();
            return;
          }

          uploadState.uploadToken = String(res.uploadToken || '');
          uploadState.uploadUrl = String(res.uploadUrl || '');
          uploadState.phase = 'uploading';

          if (!uploadState.uploadUrl || !uploadState.uploadToken) {
            showAlert('Upload', 'Upload session is invalid.');
            resetUploadState();
            return;
          }

          uploadFileResumable(file, uploadState.uploadUrl, function(percent, xhr) {
            uploadState.xhr = xhr || uploadState.xhr;
            uploadState.progress = percent;
            renderUploadBanner('Uploading ' + file.name + ' — ' + percent + '%', 'default', percent, true);
          }).then(function(fileId) {
            if (!uploadState.active) return;
            uploadState.fileId = fileId;
            uploadState.phase = 'finalizing';
            renderUploadBanner('Finalizing message: ' + file.name, 'default', 100, false);

            google.script.run
              .withSuccessHandler(function(finalizeRes) {
                if (!uploadState.active) return;

                if (!finalizeRes || !finalizeRes.ok) {
                  showAlert('Upload', (finalizeRes && finalizeRes.error) || 'Failed to finalize uploaded message.');
                  resetUploadState();
                  return;
                }

                const conversationIdAtFinalize = uploadState.conversationId;

                document.getElementById('composerInput').value = '';
                autoGrowTextarea(document.getElementById('composerInput'));
                clearReplyTarget();

                if (Array.isArray(finalizeRes.conversations)) {
                  conversations = finalizeRes.conversations;
                  activeConversation = getConversationById(activeConversationId);
                  renderSidebar();
                  renderActiveTopbar();
                }

                if (typeof finalizeRes.version === 'number' && conversationIdAtFinalize) {
                  conversationVersions.set(conversationIdAtFinalize, finalizeRes.version);
                }

                if (finalizeRes.message && String(finalizeRes.conversationId || '') === conversationIdAtFinalize) {
                  mergeMessages(conversationIdAtFinalize, [finalizeRes.message], false);
                  if (activeConversationId === conversationIdAtFinalize) {
                    renderMessages(true);
                  }
                } else if (conversationIdAtFinalize) {
                  loadConversation(true);
                }

                renderUploadBanner('Upload complete: ' + file.name, 'success', 100, false);
                const keepMessage = 'Upload complete: ' + file.name;
                resetUploadState(false);
                setTimeout(function() {
                  if (!uploadState.active) {
                    hideUploadBannerIfTextMatches(keepMessage);
                  }
                }, 1400);
              })
              .withFailureHandler(function(err) {
                console.error(err);
                showAlert('Upload', 'Failed to finalize uploaded message.');
                resetUploadState();
              })
              .finalizeUploadedMessage(sessionToken, {
                uploadToken: uploadState.uploadToken,
                fileId: fileId,
                fileName: file.name,
                mimeType: file.type || 'application/octet-stream',
                fileSize: file.size,
                text: text,
                replyToMessageId: replyTarget ? replyTarget.messageId : ''
              });
          }).catch(function(error) {
            console.error(error);
            showAlert('Upload', error && error.message ? error.message : 'Upload failed.');
            resetUploadState();
          });
        })
        .withFailureHandler(function(err) {
          console.error(err);
          showAlert('Upload', 'Failed to create upload session.');
          resetUploadState();
        })
        .createDriveUploadSession(sessionToken, {
          conversationId: conversationIdAtStart,
          fileName: file.name,
          mimeType: file.type || 'application/octet-stream',
          fileSize: file.size,
          text: text,
          replyToMessageId: replyTarget ? replyTarget.messageId : ''
        });
    }

    async function uploadFileResumable(file, uploadUrl, onProgress) {
      let start = 0;
      let fileId = '';

      while (start < file.size) {
        const endExclusive = Math.min(start + CHUNK_SIZE, file.size);
        const chunk = file.slice(start, endExclusive);
        const contentRange = 'bytes ' + start + '-' + (endExclusive - 1) + '/' + file.size;
        const response = await sendUploadChunk(uploadUrl, chunk, file.type || 'application/octet-stream', contentRange, onProgress, endExclusive, file.size);
        const status = response.status;

        if (status === 308) {
          const range = response.getResponseHeader('Range');
          if (range) {
            const parsedEnd = parseResumableRangeEnd(range);
            start = parsedEnd + 1;
          } else {
            start = endExclusive;
          }
          const percent = Math.min(99, Math.floor((start / file.size) * 100));
          if (typeof onProgress === 'function') onProgress(percent, response.xhr);
          continue;
        }

        if (status >= 200 && status < 300) {
          let body = {};
          try {
            body = response.responseText ? JSON.parse(response.responseText) : {};
          } catch (e) {
            body = {};
          }
          fileId = body.id || '';
          if (!fileId) {
            throw new Error('Drive upload completed but file ID was not returned.');
          }
          if (typeof onProgress === 'function') onProgress(100, response.xhr);
          return fileId;
        }

        throw new Error('Upload failed with HTTP ' + status + '.');
      }

      throw new Error('Upload did not complete.');
    }

    function sendUploadChunk(uploadUrl, blobChunk, mimeType, contentRange, onProgress, uploadedBytes, totalBytes) {
      return new Promise(function(resolve, reject) {
        const xhr = new XMLHttpRequest();
        xhr.open('PUT', uploadUrl, true);
        xhr.setRequestHeader('Content-Type', mimeType || 'application/octet-stream');
        xhr.setRequestHeader('Content-Range', contentRange);

        xhr.upload.onprogress = function(event) {
          if (!event.lengthComputable) return;
          const loadedForChunk = event.loaded || 0;
          const chunkSize = blobChunk.size || 0;
          const chunkStart = uploadedBytes - chunkSize;
          const totalLoaded = Math.min(totalBytes, chunkStart + loadedForChunk);
          const percent = Math.min(99, Math.floor((totalLoaded / totalBytes) * 100));
          if (typeof onProgress === 'function') {
            onProgress(percent, xhr);
          }
        };

        xhr.onreadystatechange = function() {
          if (xhr.readyState !== 4) return;
          resolve({
            status: xhr.status,
            responseText: xhr.responseText,
            xhr: xhr,
            getResponseHeader: function(name) {
              return xhr.getResponseHeader(name);
            }
          });
        };

        xhr.onerror = function() {
          reject(new Error('Network error during upload.'));
        };

        xhr.onabort = function() {
          reject(new Error('Upload cancelled.'));
        };

        xhr.send(blobChunk);
      });
    }

    function parseResumableRangeEnd(rangeHeader) {
      const match = String(rangeHeader || '').match(/bytes=0-(\d+)$/i);
      if (!match) return -1;
      return Number(match[1]) || -1;
    }

    function cancelCurrentUpload() {
      if (!uploadState.active) return;

      if (uploadState.xhr) {
        try {
          uploadState.xhr.abort();
        } catch (e) {
          console.error(e);
        }
      }

      renderUploadBanner('Upload cancelled.', 'error', 0, false);
      resetUploadState(false);
      setTimeout(function() {
        if (!uploadState.active) {
          hideUploadBannerIfTextMatches('Upload cancelled.');
        }
      }, 1200);
    }

    function resetUploadState(clearBanner) {
      if (clearBanner !== false) {
        hideUploadBanner();
      }
      uploadState.active = false;
      uploadState.file = null;
      uploadState.xhr = null;
      uploadState.uploadToken = '';
      uploadState.uploadUrl = '';
      uploadState.fileId = '';
      uploadState.conversationId = '';
      uploadState.progress = 0;
      uploadState.phase = '';
      document.getElementById('fileInput').value = '';
      setComposerDisabled(false);
    }

    function renderUploadBanner(text, state, percent, canCancel) {
      const banner = document.getElementById('uploadBanner');
      const label = document.getElementById('uploadBannerLabel');
      const value = document.getElementById('uploadBannerText');
      const progressWrap = document.getElementById('uploadProgressWrap');
      const progress = document.getElementById('uploadProgress');
      const cancelBtn = document.getElementById('cancelUploadBtn');

      banner.classList.add('active');
      label.classList.remove('error', 'success');

      if (state === 'error') {
        label.classList.add('error');
        label.textContent = 'Upload error';
      } else if (state === 'success') {
        label.classList.add('success');
        label.textContent = 'Upload complete';
      } else {
        label.textContent = 'Upload';
      }

      value.textContent = text || '';
      if (typeof percent === 'number') {
        progressWrap.style.display = '';
        progress.value = Math.max(0, Math.min(100, percent));
      } else {
        progressWrap.style.display = 'none';
        progress.value = 0;
      }

      cancelBtn.style.display = canCancel ? '' : 'none';
    }

    function hideUploadBanner() {
      const banner = document.getElementById('uploadBanner');
      banner.classList.remove('active');
      document.getElementById('uploadBannerLabel').classList.remove('error', 'success');
      document.getElementById('uploadBannerLabel').textContent = 'Upload';
      document.getElementById('uploadBannerText').textContent = '';
      document.getElementById('uploadProgressWrap').style.display = 'none';
      document.getElementById('uploadProgress').value = 0;
      document.getElementById('cancelUploadBtn').style.display = 'none';
    }

    function hideUploadBannerIfTextMatches(expectedText) {
      const current = document.getElementById('uploadBannerText').textContent;
      if (current === expectedText) {
        hideUploadBanner();
      }
    }

    function setComposerDisabled(disabled) {
      const composer = document.getElementById('composerInput');
      const sendBtn = document.getElementById('sendBtn');
      const attachBtn = document.getElementById('attachBtn');

      composer.disabled = !!disabled && !uploadState.active;
      sendBtn.disabled = !!disabled;
      attachBtn.disabled = !!disabled;
    }

    function clearReplyTarget() {
      replyTarget = null;
      renderReplyBanner();
    }

    function renderReplyBanner() {
      const banner = document.getElementById('replyBanner');
      const label = document.getElementById('replyBannerLabel');
      const text = document.getElementById('replyBannerText');

      if (!replyTarget) {
        banner.classList.remove('active');
        label.textContent = 'Replying';
        text.textContent = '';
        return;
      }

      banner.classList.add('active');
      label.textContent = 'Replying to ' + (replyTarget.displayName || replyTarget.username || 'message');
      text.textContent = buildReplyPreviewClient(replyTarget);
    }

    function buildReplyPreviewClient(message) {
      const text = String(message && message.text || '').trim();
      if (text) return truncate(text, 140);

      const attachments = Array.isArray(message && message.attachments) ? message.attachments : [];
      if (attachments.length) return describeAttachmentListShortClient(attachments);

      return '';
    }

    function getMessageByIdFromActive(messageId) {
      const list = messagesByConversation.get(activeConversationId) || [];
      return list.find(function(item) {
        return item.messageId === messageId;
      }) || null;
    }

    function openMessageDropdownAt(x, y, messageId) {
      const msg = getMessageByIdFromActive(messageId);
      if (!msg) return;

      closeMessageDropdown();

      dropdownState.open = true;
      dropdownState.messageId = messageId;

      const menu = document.getElementById('messageDropdown');
      const backdrop = document.getElementById('dropdownBackdrop');

      const items = [];

      if (!msg.deletedAt) {
        items.push(`<button onclick="replyToMessage('${escapeJsString(msg.messageId)}')">Reply</button>`);
        items.push(`<button onclick="copyMessageText('${escapeJsString(msg.messageId)}')">Copy message</button>`);
      }

      if (msg.isMine && !msg.deletedAt) {
        items.push(`<button onclick="editMessageUI('${escapeJsString(msg.messageId)}')">Edit text</button>`);
        items.push(`<button class="danger" onclick="deleteMessageUI('${escapeJsString(msg.messageId)}')">Delete</button>`);
      }

      if (!items.length) {
        items.push('<button onclick="closeMessageDropdown()">Close</button>');
      }

      menu.innerHTML = items.join('');
      menu.classList.add('open');
      backdrop.classList.add('open');

      menu.style.left = '0px';
      menu.style.top = '0px';

      const rect = menu.getBoundingClientRect();
      let left = x;
      let top = y;

      if (left + rect.width > window.innerWidth - 8) {
        left = window.innerWidth - rect.width - 8;
      }
      if (top + rect.height > window.innerHeight - 8) {
        top = window.innerHeight - rect.height - 8;
      }
      if (left < 8) left = 8;
      if (top < 8) top = 8;

      menu.style.left = left + 'px';
      menu.style.top = top + 'px';
    }

    function closeMessageDropdown() {
      dropdownState.open = false;
      dropdownState.messageId = '';
      document.getElementById('messageDropdown').classList.remove('open');
      document.getElementById('dropdownBackdrop').classList.remove('open');
    }

    function replyToMessage(messageId) {
      const msg = getMessageByIdFromActive(messageId);
      closeMessageDropdown();
      if (!msg || msg.deletedAt) return;
      replyTarget = msg;
      renderReplyBanner();
      document.getElementById('composerInput').focus();
    }

    function copyMessageText(messageId) {
      const msg = getMessageByIdFromActive(messageId);
      closeMessageDropdown();
      if (!msg || msg.deletedAt) return;

      const text = buildCopyTextFromMessage(msg);
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function() {
          showToast('Message copied.');
        }).catch(function() {
          fallbackCopyText(text);
        });
      } else {
        fallbackCopyText(text);
      }
    }

    function buildCopyTextFromMessage(msg) {
      const blocks = [];
      if (msg.text) blocks.push(msg.text);

      if (Array.isArray(msg.attachments) && msg.attachments.length) {
        msg.attachments.forEach(function(att) {
          const line = '[' + attachmentTypeLabelClient(att) + '] ' + (att.name || 'file') + (att.webViewLink ? ' - ' + att.webViewLink : '');
          blocks.push(line);
        });
      }

      return blocks.join('\n');
    }

    function fallbackCopyText(text) {
      const temp = document.createElement('textarea');
      temp.value = text;
      document.body.appendChild(temp);
      temp.select();
      try {
        document.execCommand('copy');
        showToast('Message copied.');
      } catch (e) {
        showAlert('Copy message', 'Failed to copy message.');
      }
      document.body.removeChild(temp);
    }
