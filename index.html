<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap');
    :root{--bg:#f5f6fa;--panel:#fff;--panel-2:#f8f9fd;--text:#20242c;--muted:#6e7685;--border:#e5e8f0;--accent:#4f46e5;--accent-soft:#eef0ff;--danger:#d92d20;--success:#0f9d58;--warning:#c27803;--overlay:rgba(15,23,42,.44);--my-msg:#edf2ff;--other-msg:#fff;--reply-bg:#f4f6fb;--shadow:0 14px 34px rgba(15,23,42,.10);--sidebar-width:310px;--online:#22c55e}
    body.dark{--bg:#0d1117;--panel:#151b23;--panel-2:#10161d;--text:#e6edf3;--muted:#98a5b7;--border:#263041;--accent:#7c8cff;--accent-soft:#1d2442;--danger:#ff6b6b;--success:#39c57a;--warning:#f1b14d;--overlay:rgba(0,0,0,.58);--my-msg:#1a2747;--other-msg:#161d28;--reply-bg:#111824;--shadow:0 16px 36px rgba(0,0,0,.34);--online:#22c55e}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;animation:none!important;transition:none!important;scroll-behavior:auto!important}
    html,body{height:100%}
    body{margin:0;font-family:'Ubuntu',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;user-select:none}
    input,textarea{user-select:text;font:inherit}button,select,progress{font:inherit}textarea{resize:none}a{color:inherit}
    .screen{display:none;height:100vh;width:100%}.screen.active{display:flex}
    .auth-screen{align-items:center;justify-content:center;padding:24px}
    .auth-card{width:100%;max-width:420px;background:var(--panel);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:20px}
    .auth-brand{font-size:24px;font-weight:700;margin-bottom:8px}
    .auth-sub{font-size:14px;color:var(--muted);margin-bottom:14px;line-height:1.5}
    .tabs{display:flex;gap:8px;margin-bottom:14px}
    .tabs button{flex:1;height:42px;border-radius:10px;border:1px solid var(--border);background:var(--panel-2);color:var(--text);font-weight:700;cursor:pointer}
    .tabs button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .auth-block{display:none}.auth-block.active{display:block}
    .field{margin-bottom:10px}.field label{display:block;font-size:13px;color:var(--muted);font-weight:700;margin-bottom:5px}
    .field input,.field textarea,.field select{width:100%;border:1px solid var(--border);background:var(--panel-2);color:var(--text);border-radius:10px;outline:none;padding:11px 12px}
    .field-row{display:flex;gap:10px}.field-row>*{flex:1;min-width:0}
    .submit-btn,.primary-btn,.secondary-btn,.danger-btn,.ghost-btn{border:none;border-radius:10px;cursor:pointer;font-weight:700;padding:11px 14px}
    .submit-btn,.primary-btn{background:var(--accent);color:#fff}
    .secondary-btn,.ghost-btn{background:var(--panel-2);color:var(--text);border:1px solid var(--border)}
    .danger-btn{background:var(--danger);color:#fff}
    .submit-btn[disabled],.primary-btn[disabled],.secondary-btn[disabled],.danger-btn[disabled],.ghost-btn[disabled],.icon-btn[disabled]{opacity:.6;cursor:not-allowed}
    .submit-btn{width:100%;margin-top:4px}
    .status{min-height:20px;margin-top:12px;font-size:14px;color:var(--danger)}
    .app-shell{display:grid;grid-template-columns:var(--sidebar-width) 1fr;width:100%;height:100vh}
    .sidebar{background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;min-width:0}
    .sidebar-head{display:flex;align-items:center;gap:12px;padding:14px;border-bottom:1px solid var(--border)}
    .avatar{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent);font-weight:700;border:1px solid var(--border);flex-shrink:0;position:relative;overflow:hidden}
    .avatar.large{width:54px;height:54px;border-radius:16px;font-size:18px}
    .avatar.xl{width:72px;height:72px;border-radius:20px;font-size:24px}
    .avatar img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
    .online-dot{width:10px;height:10px;border-radius:50%;background:var(--online);border:2px solid var(--panel);position:absolute;bottom:-1px;right:-1px;z-index:1}
    .user-box{min-width:0;flex:1}
    .user-box .name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .user-box .meta{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .icon-btn{border:1px solid var(--border);background:var(--panel-2);color:var(--text);width:38px;height:38px;border-radius:10px;cursor:pointer;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center}
    .search-wrap{padding:12px 14px;border-bottom:1px solid var(--border);position:relative}
    .search-wrap input{width:100%;border:1px solid var(--border);background:var(--panel-2);color:var(--text);border-radius:10px;outline:none;padding:11px 12px}
    .search-results{position:absolute;top:calc(100% - 4px);left:14px;right:14px;background:var(--panel);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);max-height:300px;overflow-y:auto;display:none;z-index:1200}
    .search-results.open{display:block}
    .search-item{display:flex;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;background:var(--panel)}
    .search-item:last-child{border-bottom:none}.search-item:hover{background:var(--panel-2)}
    .search-item-meta{min-width:0;flex:1}
    .search-item-title{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .search-item-sub{font-size:12px;color:var(--muted);overflow-wrap:anywhere;margin-top:2px;line-height:1.35}
    .sidebar-body{flex:1;min-height:0;overflow-y:auto;padding:10px}
    .section-title{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:8px 8px 6px;display:flex;align-items:center;justify-content:space-between}
    .section-title .icon-btn{width:26px;height:26px;font-size:14px;border-radius:8px}
    .conversation-item{display:flex;gap:10px;padding:10px;border-radius:12px;cursor:pointer;margin-bottom:4px;border:1px solid transparent}
    .conversation-item:hover{background:var(--panel-2)}
    .conversation-item.active{background:var(--accent-soft);border-color:rgba(79,70,229,.16)}
    .conversation-meta{min-width:0;flex:1}
    .conversation-line{display:flex;gap:8px;align-items:center;min-width:0}
    .conversation-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .conversation-time{margin-left:auto;flex-shrink:0;font-size:11px;color:var(--muted)}
    .conversation-subtitle,.conversation-last{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
    .chat-panel{display:flex;flex-direction:column;min-width:0;min-height:0}
    .chat-topbar{height:64px;border-bottom:1px solid var(--border);background:var(--panel);display:flex;align-items:center;gap:12px;padding:10px 14px;flex-shrink:0}
    .chat-title-box{min-width:0;flex:1;cursor:pointer}
    .chat-title{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .chat-subtitle{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
    .chat-main{flex:1;min-height:0;display:flex;flex-direction:column}
    .placeholder{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
    .placeholder-card{width:100%;max-width:700px;background:var(--panel);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:24px}
    .placeholder-card h2{margin:0 0 8px;font-size:28px}
    .placeholder-card p{margin:0 0 16px;color:var(--muted);line-height:1.6}
    .conversation-view{display:none;flex:1;min-height:0;flex-direction:column}
    .conversation-view.active{display:flex}
    .messages{flex:1;min-height:0;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:6px}
    .empty-state{margin:auto;color:var(--muted);text-align:center;padding:24px}
    .date-separator{display:flex;align-items:center;gap:12px;padding:8px 0;color:var(--muted);font-size:12px;font-weight:700}
    .date-separator::before,.date-separator::after{content:'';flex:1;height:1px;background:var(--border)}
    .message-row{display:flex;gap:10px;align-items:flex-start;max-width:88%}
    .message-row.mine{align-self:flex-end;flex-direction:row-reverse}
    .message-row .avatar{width:34px;height:34px;border-radius:10px;font-size:13px;cursor:pointer}
    .message-card{min-width:0;max-width:100%;background:var(--other-msg);border:1px solid var(--border);border-radius:16px;padding:10px 12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
    .message-row.mine .message-card{background:var(--my-msg)}
    .message-head{display:flex;gap:8px;align-items:center;margin-bottom:6px}
    .message-author{font-size:13px;font-weight:700;cursor:pointer}.message-author:hover{text-decoration:underline}
    .message-username{font-size:12px;color:var(--muted)}
    .message-forwarded{font-size:11px;color:var(--accent);font-weight:700;margin-bottom:4px}
    .message-reply{border-left:3px solid var(--accent);background:var(--reply-bg);border-radius:10px;padding:7px 10px;margin-bottom:8px}
    .message-reply-name{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:2px}
    .message-reply-text{font-size:12px;color:var(--muted);white-space:pre-wrap;word-break:break-word}
    .message-text{white-space:pre-wrap;word-break:break-word;line-height:1.55;user-select:text}
    .message-text.deleted{font-style:italic;color:var(--muted)}
    .message-attachments{display:flex;flex-direction:column;gap:10px;margin-top:10px}
    .message-attachments:first-child{margin-top:0;margin-bottom:10px}
    .attachment-card{border:1px solid var(--border);background:var(--panel-2);border-radius:14px;overflow:hidden}
    .attachment-image{display:block;width:100%;max-width:420px;max-height:360px;object-fit:contain;background:#000;cursor:pointer}
    .attachment-video{display:block;width:100%;max-width:420px;max-height:360px;background:#000;border-bottom:1px solid var(--border)}
    .attachment-audio{width:100%;padding:12px}
    .attachment-file{display:flex;align-items:flex-start;gap:10px;padding:12px;min-width:0}
    .attachment-file-icon{width:42px;height:42px;border-radius:12px;border:1px solid var(--border);background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;font-size:18px;flex-shrink:0}
    .attachment-file-body{min-width:0;flex:1}
    .attachment-file-name{font-size:14px;font-weight:700;line-height:1.35;word-break:break-word}
    .attachment-file-meta{margin-top:4px;font-size:12px;color:var(--muted);line-height:1.4;word-break:break-word}
    .attachment-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .attachment-action-link{display:inline-flex;align-items:center;justify-content:center;min-height:34px;padding:8px 10px;border-radius:10px;text-decoration:none;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:12px;font-weight:700}
    .attachment-caption{padding:10px 12px;border-top:1px solid var(--border)}
    .attachment-caption-name{font-size:14px;font-weight:700;word-break:break-word}
    .attachment-caption-meta{margin-top:4px;font-size:12px;color:var(--muted);line-height:1.35;word-break:break-word}
    .message-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;font-size:12px;color:var(--muted)}
    .composer-wrap{background:var(--panel);border-top:1px solid var(--border);padding:12px 14px 14px;flex-shrink:0}
    .reply-banner,.upload-banner{display:none;align-items:center;justify-content:space-between;gap:12px;border:1px solid var(--border);background:var(--panel-2);border-radius:12px;padding:10px 12px;margin-bottom:10px}
    .reply-banner.active,.upload-banner.active{display:flex}
    .reply-banner-meta,.upload-banner-meta{min-width:0;flex:1}
    .reply-banner-label,.upload-banner-label{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:4px}
    .reply-banner-text,.upload-banner-text{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .upload-banner-label.error{color:var(--danger)}.upload-banner-label.success{color:var(--success)}
    .upload-progress-wrap{margin-top:8px}
    .upload-progress{width:100%;height:10px;appearance:none;border:none;overflow:hidden;border-radius:999px;background:rgba(0,0,0,.08)}
    .upload-progress::-webkit-progress-bar{background:rgba(0,0,0,.08)}.upload-progress::-webkit-progress-value{background:var(--accent)}.upload-progress::-moz-progress-bar{background:var(--accent)}
    .composer{display:flex;gap:10px;align-items:flex-end}
    .composer-actions{display:flex;gap:10px;align-items:flex-end}
    .composer textarea{flex:1;border:1px solid var(--border);background:var(--panel-2);color:var(--text);border-radius:12px;outline:none;min-height:48px;max-height:180px;padding:12px;overflow-y:auto}
    .dropdown-backdrop,.modal-overlay{position:fixed;inset:0;display:none}
    .dropdown-backdrop.open{display:block;z-index:9998}
    .message-dropdown{position:fixed;min-width:180px;background:var(--panel);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);padding:6px;display:none;z-index:9999}
    .message-dropdown.open{display:block}
    .message-dropdown button{width:100%;border:none;background:transparent;text-align:left;color:var(--text);padding:10px 12px;border-radius:10px;cursor:pointer;font-weight:500}
    .message-dropdown button:hover{background:var(--panel-2)}
    .message-dropdown button.danger{color:var(--danger)}
    .modal-overlay{background:var(--overlay);align-items:center;justify-content:center;padding:18px;z-index:12000}
    .modal-overlay.open{display:flex}
    .modal{width:100%;max-width:500px;background:var(--panel);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;max-height:90vh;overflow-y:auto}
    .modal-head{padding:16px 18px 8px;font-size:18px;font-weight:700}
    .modal-body{padding:0 18px 16px;color:var(--muted);line-height:1.5;white-space:pre-wrap;word-break:break-word}
    .modal-content{padding:0 18px 16px}
    .modal-actions{display:flex;justify-content:flex-end;gap:10px;padding:0 18px 18px;flex-wrap:wrap}
    .profile-header{display:flex;flex-direction:column;align-items:center;padding:20px;gap:12px}
    .profile-header .avatar{width:80px;height:80px;border-radius:24px;font-size:28px}
    .profile-name{font-size:20px;font-weight:700}.profile-username{font-size:14px;color:var(--muted)}
    .profile-bio{font-size:14px;color:var(--muted);text-align:center;max-width:300px;line-height:1.5}
    .profile-status{font-size:13px;font-weight:700;padding:4px 10px;border-radius:8px}
    .profile-status.online{color:var(--success);background:rgba(34,197,94,.1)}
    .profile-status.offline{color:var(--muted);background:var(--panel-2)}
    .profile-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:8px}
    .mobile-toggle{display:none}
    .mobile-sidebar-backdrop{display:none}
    @media(max-width:900px){.app-shell{grid-template-columns:1fr}.sidebar{display:none}.sidebar.mobile-open{display:flex;position:fixed;inset:0 auto 0 0;width:min(92vw,360px);z-index:13000;box-shadow:var(--shadow)}.mobile-sidebar-backdrop{position:fixed;inset:0;background:var(--overlay);display:none;z-index:12999}.mobile-sidebar-backdrop.open{display:block}.mobile-toggle{display:inline-flex}.message-row{max-width:100%}.composer{align-items:stretch}.composer-actions{flex-direction:column}.attachment-image,.attachment-video{max-width:100%}}
    .img-preview-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:20000;cursor:pointer}
    .img-preview-overlay img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:8px}
  </style>
</head>
<body class="light">
  <div id="authScreen" class="screen auth-screen active">
    <div class="auth-card">
      <div class="auth-brand">Heyo</div>
      <div id="authSub" class="auth-sub">Welcome back. Log in to continue.</div>
      <div class="tabs">
        <button id="loginTabBtn" class="active" onclick="switchAuthMode('login')">Login</button>
        <button id="registerTabBtn" onclick="switchAuthMode('register')">Create account</button>
      </div>
      <div id="loginBlock" class="auth-block active">
        <div class="field"><label for="loginIdentifier" data-i18n="authIdentifierLabel">Email / phone / username</label><input id="loginIdentifier" type="text" autocomplete="username" placeholder="user@example.com"></div>
        <div class="field"><label for="loginPassword" data-i18n="password">Password</label><input id="loginPassword" type="password" autocomplete="current-password" placeholder="Password"></div>
        <button class="submit-btn" onclick="submitLogin()" data-i18n="loginBtn">Login</button>
      </div>
      <div id="registerBlock" class="auth-block">
        <div class="tabs" style="margin-bottom:12px"><button id="regEmailBtn" class="active" onclick="switchRegisterMethod('email')">Email</button><button id="regPhoneBtn" onclick="switchRegisterMethod('phone')">Phone</button></div>
        <div class="field"><label for="registerDisplayName" data-i18n="displayName">Display name</label><input id="registerDisplayName" type="text" maxlength="40"></div>
        <div class="field"><label for="registerUsername" data-i18n="username">Username</label><input id="registerUsername" type="text" maxlength="20" placeholder="lowercase letters only"></div>
        <div id="registerEmailWrap" class="field"><label for="registerEmail">Email</label><input id="registerEmail" type="email" placeholder="mail@example.com"></div>
        <div id="registerPhoneWrap" style="display:none"><div class="field-row"><div class="field"><label for="registerPhoneCountry">Country</label><select id="registerPhoneCountry"><option value="RU">Russia (+7)</option><option value="US">US (+1)</option></select></div><div class="field"><label for="registerPhone">Phone</label><input id="registerPhone" type="text"></div></div></div>
        <div class="field"><label for="registerPassword" data-i18n="password">Password</label><input id="registerPassword" type="password" autocomplete="new-password" placeholder="At least 6 characters"></div>
        <div class="field"><label for="registerBio">Bio</label><textarea id="registerBio" maxlength="240" rows="3"></textarea></div>
        <button class="submit-btn" onclick="submitRegister()" data-i18n="createAccountBtn">Create account</button>
      </div>
      <div id="authStatus" class="status"></div>
    </div>
  </div>

  <div id="appScreen" class="screen">
    <div id="mobileSidebarBackdrop" class="mobile-sidebar-backdrop" onclick="closeMobileSidebar()"></div>
    <div class="app-shell">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-head">
          <div id="meAvatar" class="avatar" onclick="openProfile(currentUser&&currentUser.userId)">U</div>
          <div class="user-box" onclick="openProfile(currentUser&&currentUser.userId)" style="cursor:pointer">
            <div id="meDisplayName" class="name">User</div>
            <div id="meUsername" class="meta">@user</div>
          </div>
          <button class="icon-btn" title="Settings" onclick="openSettings()">⚙</button>
        </div>
        <div class="search-wrap">
          <input id="userSearchInput" type="text" data-i18n-placeholder="searchUsers" placeholder="Search users">
          <div id="searchResults" class="search-results"></div>
        </div>
        <div class="sidebar-body">
          <div class="section-title"><span data-i18n="channels">Channels</span></div>
          <div id="channelList"></div>
          <div class="section-title"><span data-i18n="groups">Groups</span><button class="icon-btn" onclick="createGroupUI()" title="Create group">+</button></div>
          <div id="groupList"></div>
          <div class="section-title"><span data-i18n="directMessages">Direct messages</span></div>
          <div id="directConversationList"></div>
        </div>
      </aside>
      <main class="chat-panel">
        <div class="chat-topbar">
          <button class="icon-btn mobile-toggle" onclick="openMobileSidebar()">☰</button>
          <div id="topAvatar" class="avatar" onclick="openConversationProfile()">M</div>
          <div class="chat-title-box" onclick="openConversationProfile()">
            <div id="chatTitle" class="chat-title">Heyo</div>
            <div id="chatSubtitle" class="chat-subtitle"></div>
          </div>
          <button class="secondary-btn" onclick="doLogout()" data-i18n="logout">Log out</button>
        </div>
        <div class="chat-main">
          <div id="placeholderView" class="placeholder">
            <div class="placeholder-card">
              <h2 data-i18n="welcomeTitle">Welcome to Heyo</h2>
              <p data-i18n="welcomeText">Select a conversation from the left to start chatting.</p>
            </div>
          </div>
          <div id="conversationView" class="conversation-view">
            <div id="messages" class="messages"></div>
            <div id="composerWrap" class="composer-wrap">
              <div id="replyBanner" class="reply-banner">
                <div class="reply-banner-meta"><div id="replyBannerLabel" class="reply-banner-label">Replying</div><div id="replyBannerText" class="reply-banner-text"></div></div>
                <button class="secondary-btn" onclick="clearReplyTarget()">✕</button>
              </div>
              <div id="uploadBanner" class="upload-banner">
                <div class="upload-banner-meta"><div id="uploadBannerLabel" class="upload-banner-label">Upload</div><div id="uploadBannerText" class="upload-banner-text"></div><div id="uploadProgressWrap" class="upload-progress-wrap" style="display:none"><progress id="uploadProgress" class="upload-progress" value="0" max="100"></progress></div></div>
                <button id="cancelUploadBtn" class="secondary-btn" onclick="cancelCurrentUpload()" style="display:none">✕</button>
              </div>
              <div class="composer">
                <textarea id="composerInput" placeholder="Write a message..." rows="1"></textarea>
                <div class="composer-actions">
                  <input id="fileInput" type="file" style="display:none">
                  <button id="attachBtn" class="secondary-btn" onclick="openFilePicker()">📎</button>
                  <button id="sendBtn" class="primary-btn" onclick="sendMessageFromUI()">➤</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="dropdownBackdrop" class="dropdown-backdrop" onclick="closeMessageDropdown()"></div>
  <div id="messageDropdown" class="message-dropdown"></div>
  <div id="modalOverlay" class="modal-overlay" aria-hidden="true">

(function(){

function avatarHtml(initials, avatarFileId, cssClass, onlineStatus, onclick) {
  cssClass = cssClass || '';
  const onclickAttr = onclick ? ` onclick="${onclick}"` : '';
  let inner = escapeHtml(initials || 'U');
  if (avatarFileId) {
    const src = 'https://drive.google.com/thumbnail?id=' + encodeURIComponent(avatarFileId) + '&sz=w200';
    inner = `<img src="${escapeAttr(src)}" alt="" loading="lazy">`;
  }
  let dot = '';
  if (onlineStatus === true) dot = '<div class="online-dot"></div>';
  return `<div class="avatar ${cssClass}"${onclickAttr}>${inner}${dot}</div>`;
}

function startPolling(){stopPolling();pollingHandle=setInterval(()=>{if(activeConversationId)loadConversation(false)},1400);sidebarRefreshHandle=setInterval(refreshSidebarOnly,4000);onlineStatusHandle=setInterval(fetchOnlineUsers,5000);fetchOnlineUsers()}

function loadConversation(forceScroll){
  if(!sessionToken||!activeConversationId)return;
  if(isLoadingConversation){needsReloadConversation=true;return}
  isLoadingConversation=true;
  const reqId=activeConversationId,sv=Number(conversationVersions.get(reqId)||0);
  google.script.run.withSuccessHandler(r=>{isLoadingConversation=false;if(!r||!r.ok){handleAppError(r);return}if(String(r.conversationId||'')!==reqId)return;if(typeof r.version==='number')conversationVersions.set(reqId,r.version);if(r.reset||!messagesByConversation.has(reqId))messagesByConversation.set(reqId,[]);if(Array.isArray(r.messages)&&r.messages.length)mergeMessages(reqId,r.messages,!!r.reset);else if(r.reset)messagesByConversation.set(reqId,[]);if(activeConversationId===reqId)renderMessages(forceScroll);if(needsReloadConversation){needsReloadConversation=false;loadConversation(false)}}).withFailureHandler(e=>{console.error(e);isLoadingConversation=false}).getConversationMessages(sessionToken,reqId,sv);
}
function mergeMessages(cid,incoming,reset){
  let current=reset?[]:(messagesByConversation.get(cid)||[]);
  const byId=new Map();
  current.forEach(m=>byId.set(m.messageId,m));
  incoming.forEach(m=>byId.set(m.messageId,normalizeMsg(m)));
  const merged=Array.from(byId.values()).sort((a,b)=>{const ta=a.createdAt?new Date(a.createdAt).getTime():0,tb=b.createdAt?new Date(b.createdAt).getTime():0;return ta!==tb?ta-tb:String(a.messageId).localeCompare(String(b.messageId))});
  messagesByConversation.set(cid,merged);
}
function normalizeMsg(m){const n=Object.assign({},m);n.attachments=Array.isArray(n.attachments)?n.attachments.filter(Boolean):[];n.hasAttachments=n.attachments.length>0;return n}

/* ========================= Render Messages with Date Separators ========================= */
function renderMessages(forceScroll){
  const el=document.getElementById('messages');
  const list=messagesByConversation.get(activeConversationId)||[];
  const near=Math.abs(el.scrollHeight-el.scrollTop-el.clientHeight)<90;
  if(!list.length){el.innerHTML=`<div class="empty-state">${t('noMessages')}</div>`;return}
  let html='',lastDateStr='';
  for(let i=0;i<list.length;i++){
    const msg=list[i];
    const dateStr=getDateString(msg.createdAt);
    if(dateStr&&dateStr!==lastDateStr){html+=`<div class="date-separator">${escapeHtml(formatDateSeparator(msg.createdAt))}</div>`;lastDateStr=dateStr}
    html+=renderMessage(msg);
  }
  el.innerHTML=html;
  if(forceScroll||near)el.scrollTop=el.scrollHeight;
}
function getDateString(iso){if(!iso)return'';const d=new Date(iso);return isNaN(d)?'':d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate()}
function formatDateSeparator(iso){
  const d=new Date(iso);if(isNaN(d))return'';
  const now=new Date();
  const isToday=d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth()&&d.getDate()===now.getDate();
  if(isToday)return t('today');
  const yest=new Date(now);yest.setDate(yest.getDate()-1);
  if(d.getFullYear()===yest.getFullYear()&&d.getMonth()===yest.getMonth()&&d.getDate()===yest.getDate())return t('yesterday');
  return d.toLocaleDateString(lang==='ru'?'ru-RU':'en-US',{year:'numeric',month:'long',day:'numeric'});
}

function renderMessage(msg){
  const mine=msg.isMine?'mine':'';
  const isOnline=onlineUsers[msg.userId]||false;
  const avatarClick=`openProfile('${escapeJs(msg.userId)}')`;
  const fwd=msg.forwardedFromMessageId?`<div class="message-forwarded">↗ ${t('forwarded')}</div>`:'';
  const reply=msg.replyToMessageId?`<div class="message-reply"><div class="message-reply-name">${escapeHtml(msg.replyDisplayName||'Reply')}</div><div class="message-reply-text">${escapeHtml(msg.replyPreview||'')}</div></div>`:'';
  const attHtml=renderAttachments(msg.attachments||[]);
  const textBlock=msg.deletedAt?`<div class="message-text deleted">${t('messageDeleted')}</div>`:(msg.text?`<div class="message-text">${escapeHtml(msg.text)}</div>`:'');
  const meta=[];
  if(msg.createdAt)meta.push(formatMsgTime(msg.createdAt));
  if(msg.editedAt&&!msg.deletedAt)meta.push(t('edited'));
  return `<div class="message-row ${mine}">${avatarHtml(msg.initials,msg.avatarFileId||'','',isOnline,avatarClick)}<div class="message-card" data-message-id="${escapeAttr(msg.messageId)}" data-own="${msg.isMine?'1':'0'}" data-deleted="${msg.deletedAt?'1':'0'}"><div class="message-head"><div class="message-author" onclick="openProfile('${escapeJs(msg.userId)}')">${escapeHtml(msg.displayName||'User')}</div><div class="message-username">@${escapeHtml(msg.username||'')}</div></div>${fwd}${reply}${attHtml}${textBlock}<div class="message-meta">${meta.map(x=>'<span>'+escapeHtml(x)+'</span>').join('')}</div></div></div>`;
}

/* ========================= Inline File Previews ========================= */
function renderAttachments(atts){if(!atts||!atts.length)return'';return `<div class="message-attachments">${atts.map(renderAtt).join('')}</div>`}
function renderAtt(a){
  const name=escapeHtml(a.name||'file');
  const meta=escapeHtml(buildAttMeta(a));
  const view=escapeAttr(a.webViewLink||a.webContentLink||'#');
  const dl=escapeAttr(a.webContentLink||a.webViewLink||'#');
  const cat=detectCategory(a.mimeType);

  if(cat==='image'){
    // Use webContentLink for direct image, or thumbnail
    const src=escapeAttr(a.webContentLink||a.thumbnailLink||a.webViewLink||'');
    return `<div class="attachment-card"><img class="attachment-image" src="${src}" alt="${name}" loading="lazy" onclick="previewImage('${escapeJs(src)}')"><div class="attachment-caption"><div class="attachment-caption-name">${name}</div><div class="attachment-caption-meta">${meta}</div><div class="attachment-actions"><a class="attachment-action-link" href="${dl}" target="_blank" rel="noopener">Download</a></div></div></div>`;
  }
  if(cat==='video'){
    const src=escapeAttr(a.webContentLink||a.webViewLink||'');
    return `<div class="attachment-card"><video class="attachment-video" controls preload="metadata" src="${src}"></video><div class="attachment-caption"><div class="attachment-caption-name">${name}</div><div class="attachment-caption-meta">${meta}</div></div></div>`;
  }
  if(cat==='audio'){
    const src=escapeAttr(a.webContentLink||a.webViewLink||'');
    return `<div class="attachment-card"><audio class="attachment-audio" controls preload="metadata" src="${src}"></audio><div class="attachment-caption"><div class="attachment-caption-name">${name}</div><div class="attachment-caption-meta">${meta}</div></div></div>`;
  }
  return `<div class="attachment-card"><div class="attachment-file"><div class="attachment-file-icon">${getIcon(a)}</div><div class="attachment-file-body"><div class="attachment-file-name">${name}</div><div class="attachment-file-meta">${meta}</div><div class="attachment-actions"><a class="attachment-action-link" href="${view}" target="_blank" rel="noopener">Open</a><a class="attachment-action-link" href="${dl}" target="_blank" rel="noopener">Download</a></div></div></div></div>`;
}

function previewImage(src){
  const ov=document.createElement('div');ov.className='img-preview-overlay';ov.innerHTML=`<img src="${src}">`;ov.onclick=()=>ov.remove();document.body.appendChild(ov);
}

function sendMessageFromUI(){

  const input=document.getElementById('composerInput'),text=input.value.trim();
  if(!text)return;

function handleAppError(r){const e=(r&&r.error)||'Error';if(/session|auth|expired|invalid/i.test(e))showAlert('Session',e).then(doLogout)}

/* ========================= Modal ========================= */
function openCustomModal(cfg){return new Promise(res=>{activeModalResolver=res;document.getElementById('modalTitle').textContent=cfg.title||'';document.getElementById('modalBody').textContent=cfg.message||'';document.getElementById('modalContent').innerHTML=cfg.html||'';const act=document.getElementById('modalActions');act.innerHTML='';(cfg.buttons||[]).forEach(b=>{const btn=document.createElement('button');btn.className=b.className||'secondary-btn';btn.textContent=b.text||'OK';btn.onclick=()=>{if(typeof cfg.onAction==='function')cfg.onAction(b.value);else closeModal(b.value)};act.appendChild(btn)});document.getElementById('modalOverlay').classList.add('open')})}
function closeModal(result){document.getElementById('modalOverlay').classList.remove('open');document.getElementById('modalContent').innerHTML='';document.getElementById('modalActions').innerHTML='';const r=activeModalResolver;activeModalResolver=null;if(r)r(result)}
function showAlert(title,msg){return openCustomModal({title,message:msg,buttons:[{text:'OK',className:'primary-btn',value:true}]})}
function showConfirm(title,msg,okText,danger){return openCustomModal({title,message:msg,buttons:[{text:t('cancel'),className:'secondary-btn',value:false},{text:okText||'OK',className:danger?'danger-btn':'primary-btn',value:true}]})}
function showPrompt(title,msg,val){return openCustomModal({title,message:msg,html:`<div class="field"><textarea id="promptInput" rows="4">${escapeHtml(val||'')}</textarea></div>`,buttons:[{text:t('cancel'),className:'secondary-btn',value:'cancel'},{text:t('save'),className:'primary-btn',value:'save'}],onAction(v){if(v!=='save'){closeModal(null);return}closeModal(document.getElementById('promptInput').value)}})}

/* ========================= Helpers ========================= */
function autoGrowTextarea(el){if(!el)return;el.style.height='auto';el.style.height=Math.min(el.scrollHeight,180)+'px'}
function findMessageCardNode(target){return target?target.closest('.message-card[data-message-id]'):null}
function escapeHtml(v){return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function escapeAttr(v){return escapeHtml(v).replace(/\n/g,'&#10;')}
function escapeJs(v){return String(v||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/</g,'\\x3C')}
function truncate(v,m){const t=String(v||'');return t.length<=m?t:t.slice(0,m-1)+'…'}
function getInitial(v){const s=String(v||'').trim();return s?s.charAt(0).toUpperCase():'U'}
function formatMsgTime(iso){const d=new Date(iso);return isNaN(d)?'':d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
function formatSidebarTime(iso){const d=new Date(iso);if(isNaN(d))return'';const now=new Date();if(d.toDateString()===now.toDateString())return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});return d.toLocaleDateString([],{month:'short',day:'numeric'})}
function formatFileSize(b){const v=Number(b);if(!Number.isFinite(v)||v<=0)return'0 B';const u=['B','KB','MB','GB','TB'];let s=v,i=0;while(s>=1024&&i<u.length-1){s/=1024;i++}return(s>=10||i===0?s.toFixed(0):s.toFixed(1))+' '+u[i]}
function detectCategory(m){const t=String(m||'').toLowerCase();if(t.startsWith('image/'))return'image';if(t.startsWith('video/'))return'video';if(t.startsWith('audio/'))return'audio';return'file'}
function buildAttMeta(a){const p=[];const cat=detectCategory(a.mimeType);if(cat==='image')p.push('Photo');else if(cat==='video')p.push('Video');else if(cat==='audio')p.push('Audio');else p.push('File');if(a.size>0)p.push(formatFileSize(a.size));return p.join(' • ')}
function getIcon(a){const cat=detectCategory(a&&a.mimeType);if(cat==='image')return'🖼';if(cat==='video')return'🎬';if(cat==='audio')return'🎵';const ext=(a&&a.name||'').split('.').pop().toLowerCase();if(['pdf'].includes(ext))return'📕';if(['doc','docx','txt','md'].includes(ext))return'📄';if(['zip','rar','7z'].includes(ext))return'🗜';return'📎'}

/* ========================= Event Listeners ========================= */
document.getElementById('composerInput').addEventListener('input',function(){autoGrowTextarea(this)});
document.getElementById('composerInput').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessageFromUI()}});
document.getElementById('fileInput').addEventListener('change',function(e){const f=e.target.files;if(f&&f[0])handleFileSelection(f[0]);e.target.value=''});
document.getElementById('userSearchInput').addEventListener('input',function(){clearTimeout(searchDebounce);searchDebounce=setTimeout(performUserSearch,220)});
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this&&activeModalResolver)closeModal(null)});

const messagesEl=document.getElementById('messages');
messagesEl.addEventListener('contextmenu',function(e){const c=findMessageCardNode(e.target);if(!c)return;e.preventDefault();openMessageDropdownAt(e.clientX,e.clientY,c.getAttribute('data-message-id'))});
messagesEl.addEventListener('touchstart',function(e){const c=findMessageCardNode(e.target);if(!c)return;longPressTriggered=false;const touch=e.touches&&e.touches[0];if(!touch)return;clearTimeout(longPressTimer);longPressTimer=setTimeout(()=>{longPressTriggered=true;openMessageDropdownAt(touch.clientX,touch.clientY,c.getAttribute('data-message-id'))},550)},{passive:true});
messagesEl.addEventListener('touchend',()=>clearTimeout(longPressTimer),{passive:true});
messagesEl.addEventListener('touchcancel',()=>clearTimeout(longPressTimer),{passive:true});
messagesEl.addEventListener('touchmove',()=>clearTimeout(longPressTimer),{passive:true});
messagesEl.addEventListener('click',function(e){if(longPressTriggered){e.preventDefault();longPressTriggered=false}});
document.addEventListener('click',function(e){if(dropdownState.open&&!document.getElementById('messageDropdown').contains(e.target))closeMessageDropdown();const sw=document.getElementById('searchResults');if(sw.classList.contains('open')&&!document.getElementById('userSearchInput').contains(e.target)&&!sw.contains(e.target))clearSearchResults()});
document.addEventListener('scroll',()=>closeMessageDropdown(),true);
window.addEventListener('resize',()=>{closeMessageDropdown();if(window.innerWidth>900)closeMobileSidebar()});

verifySession();
applyI18n();
</script>
</body>
</html>
