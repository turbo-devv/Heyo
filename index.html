async function performUserSearch(){
  var qText=document.getElementById('searchInput').value.trim();
  if(!qText){ clearSearchResults(); return; }

  try{
    var q = safeLower(qText.replace(/^@+/,''));
    var users=[];
    var conversationsFound=[];

    function computeSearchScore(fields){
      var best=0;
      fields.forEach(function(field){
        var value=safeLower(field);
        if(!value) return;
        if(value===q) best=Math.max(best,120);
        else if(value.indexOf(q)===0) best=Math.max(best,88);
        else if(value.indexOf(' '+q)!==-1 || value.indexOf('@'+q)!==-1) best=Math.max(best,54);
        else if(value.indexOf(q)!==-1) best=Math.max(best,32);
      });
      return best;
    }

    var userMap={};
    var convoMap={};
    var userQueries=[
      query(collection(db, PROFILE_COLLECTION), orderBy('usernameLower'), startAt(q), endAt(q+'\uf8ff'), limit(12))
    ];
    if(q.indexOf('+')===0 || /\d/.test(q)) userQueries.push(query(collection(db, PROFILE_COLLECTION), where('phone','==',q), limit(6)));
    var userSnapshots=await Promise.all(userQueries.map(function(item){ return getDocs(item); }));
    userSnapshots.forEach(function(userSnap){
      userSnap.forEach(function(docSnap){
        var d=docSnap.data()||{};
        if(docSnap.id===auth.currentUser.uid || d.deleted || d.banned) return;
        var score=computeSearchScore([d.username,d.displayName,d.bio,d.phone,d.email]);
        if(score<=0) return;
        userMap[docSnap.id]={
          userId: docSnap.id,
          displayName: d.displayName || 'User',
          username: d.username || '',
          initials: d.initials || makeInitials(d.displayName || 'User'),
          avatarFileId: d.avatarURL || '',
          isOnline: !!d.online,
          isVerified: !!(d.isVerified || d.isAdmin || d.username==='usonance'),
          score: Math.max(score, (userMap[docSnap.id]||{}).score||0)
        };
      });
    });
    users=Object.keys(userMap).map(function(key){ return userMap[key]; });

    var convoSnapshots=await Promise.all([
      getDocs(query(collection(db, CONVERSATION_COLLECTION), orderBy('titleLower'), startAt(q), endAt(q+'\uf8ff'), limit(12)))
    ]);
    convoSnapshots.forEach(function(convoSnap){
      convoSnap.forEach(function(docSnap){
        var d=docSnap.data()||{};
        if(d.isDeleted || (d.type!=='group' && d.type!=='channel')) return;
        var score=computeSearchScore([d.title,d.description,d.subtitle,d.initials,docSnap.id===APP_CHANNEL_ID?'heyo official official channel':'']);
        if(score<=0) return;
        convoMap[docSnap.id]={
          conversationId: docSnap.id,
          type: d.type || 'group',
          title: d.title || 'Conversation',
          description: d.description || '',
          initials: d.initials || makeInitials(d.title || 'C'),
          avatarFileId: d.avatarURL || '',
          isJoined: !!findConversationById(docSnap.id),
          isOfficial: !!d.isOfficial || docSnap.id===APP_CHANNEL_ID,
          memberCount: Number(d.memberCount || 0),
          score: Math.max(score, (convoMap[docSnap.id]||{}).score||0)
        };
      });
    });

    conversations.forEach(function(convo){
      var score=computeSearchScore([convo.title,convo.subtitle,convo.description,convo.lastMessageText]);
      if(score<=0) return;
      convoMap[convo.conversationId]=Object.assign({}, convoMap[convo.conversationId]||{}, {
        conversationId: convo.conversationId,
        type: convo.type,
        title: convo.title || 'Conversation',
        description: convo.subtitle || convo.description || '',
        initials: convo.initials || makeInitials(convo.title || 'C'),
        avatarFileId: convo.avatarFileId || '',
        isJoined: true,
        isOfficial: !!convo.isOfficial,
        memberCount: Number(convo.memberCount || 0),
        score: Math.max(score + (convo.type==='direct'?12:0), (convoMap[convo.conversationId]||{}).score||0)
      });
    });

    conversationsFound=Object.keys(convoMap).map(function(key){ return convoMap[key]; });
    users.sort(function(a,b){ return b.score-a.score || String(a.displayName).localeCompare(String(b.displayName)); });
    conversationsFound.sort(function(a,b){ return b.score-a.score || String(a.title).localeCompare(String(b.title)); });
    users=users.slice(0,12);
    conversationsFound=conversationsFound.slice(0,12);

    var resultsContainer=document.getElementById('searchResults');
    if(!users.length && !conversationsFound.length){
      resultsContainer.innerHTML='<div class="si"><div class="si-meta"><div class="si-title">—</div></div></div>';
      resultsContainer.classList.add('open');
      return;
    }
    var userHtml=users.map(function(user){
      return '<div class="si" onclick="startDirectMessage(\''+escapeJsString(user.userId)+'\')">'+buildAvatarHTML(user.initials,user.avatarFileId,'',user.isOnline,"event.stopPropagation();openProfile('"+escapeJsString(user.userId)+"')",user.userId||user.username||user.initials)+'<div class="si-meta"><div class="si-title">'+titleWithBadge(user.displayName,user.isVerified,t('verified'))+'</div><div class="si-sub">@'+escapeHtml(user.username)+'</div></div></div>';
    }).join('');
    var convoHtml=conversationsFound.map(function(convo){
      var typeLabel=convo.type==='channel'?t('channel'):(convo.type==='group'?t('groups'):t('directMessages'));
      var actionLabel=convo.isJoined?(convo.type==='channel'?t('openChannel'):t('open')):(convo.type==='channel'?t('joinChannel'):t('joinGroup'));
      return '<div class="si" onclick="openConversationSearchResult(\''+escapeJsString(convo.conversationId)+'\')">'+buildAvatarHTML(convo.initials,convo.avatarFileId,'',false,'',convo.conversationId||convo.title||convo.initials)+'<div class="si-meta"><div class="si-title">'+titleWithBadge(convo.title,convo.isOfficial,t('official'))+'</div><div class="si-sub">'+escapeHtml(typeLabel)+' • '+escapeHtml(String(convo.memberCount))+' • '+escapeHtml(actionLabel)+'</div></div></div>';
    }).join('');
    resultsContainer.innerHTML=userHtml+convoHtml;
    resultsContainer.classList.add('open');
  }catch(e){
    console.error(e);
    clearSearchResults();
  }
}

async function startDirectMessage(userId){
  clearSearchResults();
  document.getElementById('searchInput').value='';
  try{
    var myUid=auth.currentUser.uid;
    var dmKey=dmKeyFor(myUid,userId);

    var existing = await getDocs(query(collection(db, CONVERSATION_COLLECTION), where('type','==','direct'), where('dmKey','==',dmKey), limit(1)));
    var conversationId='';

    if(!existing.empty){
      conversationId=existing.docs[0].id;
    }else{
      var otherProfileSnap = await getDoc(doc(db, PROFILE_COLLECTION, userId));
      if(!otherProfileSnap.exists()) return;
      var other = otherProfileSnap.data() || {};
      var convoRef = doc(collection(db, CONVERSATION_COLLECTION));
      conversationId = convoRef.id;

      await setDoc(convoRef,{
        conversationId: conversationId,
        type: 'direct',
        dmKey: dmKey,
        title: other.displayName || 'Chat',
        titleLower: safeLower(other.displayName || 'Chat'),
        subtitle: '@'+(other.username||''),
        description: '',
        initials: other.initials || makeInitials(other.displayName || 'User'),
        avatarURL: other.avatarURL || '',
        createdBy: myUid,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp(),
        memberCount: 2,
        lastMessageText: '',
        lastMessageAt: null,
        isDeleted: false,
        otherUserId: userId
      });

      await setDoc(doc(db, CONVERSATION_COLLECTION, conversationId, MEMBER_SUBCOLLECTION, myUid),{
        uid: myUid,
        role: 'member',
        joinedAt: serverTimestamp()
      });
      await setDoc(doc(db, CONVERSATION_COLLECTION, conversationId, MEMBER_SUBCOLLECTION, userId),{
        uid: userId,
        role: 'member',
        joinedAt: serverTimestamp()
      });

      await addUserToConversationIndexes(myUid, conversationId, {
        conversationId: conversationId,
        type: 'direct',
        title: other.displayName || 'Chat',
        subtitle: '@'+(other.username||''),
        initials: other.initials || makeInitials(other.displayName || 'User'),
        avatarURL: other.avatarURL || '',
        description: '',
        memberCount: 2,
        lastMessageText: '',
        lastMessageAt: null,
        updatedAt: serverTimestamp(),
        otherUserId: userId
      });

      if(currentUser){
        await addUserToConversationIndexes(userId, conversationId, {
          conversationId: conversationId,
          type: 'direct',
          title: currentUser.displayName || 'Chat',
          subtitle: '@'+(currentUser.username||''),
          initials: currentUser.initials || makeInitials(currentUser.displayName || 'User'),
          avatarURL: currentUser.avatarFileId || '',
          description: '',
          memberCount: 2,
          lastMessageText: '',
          lastMessageAt: null,
          updatedAt: serverTimestamp(),
          otherUserId: myUid
        });
      }
    }

    await selectConversation(conversationId);
  }catch(e){
    console.error(e);
  }
}

/* ======================== Modal System ======================== */

function openModal(config){
  return new Promise(function(resolve){
    modalResolveFunction=resolve;
    currentModalConfig=config||{};
    document.getElementById('modalTitle').textContent=config.title||'';
    document.getElementById('modalBody').textContent=config.message||'';
    document.getElementById('modalContent').innerHTML=config.html||'';
    document.getElementById('modalBox').className='modal'+(config.wide?' modal-wide':'');
    var actionsContainer=document.getElementById('modalActions');
    actionsContainer.innerHTML='';
    (config.buttons||[]).forEach(function(buttonConfig){
      var button=document.createElement('button');
      button.className=buttonConfig.className||'secondary-btn';
      button.textContent=buttonConfig.text||'OK';
      button.onclick=function(){
        if(typeof config.onAction==='function') config.onAction(buttonConfig.value);
        else closeModal(buttonConfig.value);
      };
      actionsContainer.appendChild(button);
    });
    document.getElementById('modalOverlay').classList.add('open');
  });
}

function closeModal(result){
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('modalContent').innerHTML='';
  document.getElementById('modalActions').innerHTML='';
  document.getElementById('modalBox').className='modal';
  var resolver=modalResolveFunction;
  modalResolveFunction=null;
  currentModalConfig=null;
  if(resolver) resolver(result);
}

function showAlert(title,message){ return openModal({title:title,message:message,buttons:[{text:t('confirm'),className:'primary-btn',value:true}]}); }
function showConfirm(title,message,okText,isDanger){
  return openModal({

    buttons:[
      {text:t('cancel'),className:'secondary-btn',value:false},
      {text:okText||'OK',className:isDanger?'danger-btn':'primary-btn',value:true}

  });
}
function showPrompt(title,message,defaultValue){
  return openModal({
    title:title,
    message:message,
    html:'<div class="field"><textarea id="promptInput" rows="4">'+escapeHtml(defaultValue||'')+'</textarea></div>',
    buttons:[
      {text:t('cancel'),className:'secondary-btn',value:'cancel'},
      {text:t('save'),className:'primary-btn',value:'save'}
    ],

      if(value!=='save'){ closeModal(null); return; }
      var input=document.getElementById('promptInput');
      closeModal(input?input.value:null);
    }

function findMessageCardElement(target){ return target?target.closest('.mc[data-mid]'):null; }
function escapeHtml(value){ return String(value||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function escapeAttr(value){ return escapeHtml(value).replace(/\n/g,'&#10;'); }
function escapeJsString(value){ return String(value||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/</g,'\\x3C'); }
function truncateString(value,maxLength){ var text=String(value||''); return text.length<=maxLength?text:text.slice(0,maxLength-1)+'…'; }
function formatMessageTime(isoString){ var date=new Date(isoString); if(isNaN(date.getTime())) return ''; return date.toLocaleTimeString(getCurrentLocale(), {hour:'2-digit',minute:'2-digit'}); }
function formatSidebarTime(isoString){ var date=new Date(isoString); if(isNaN(date.getTime())) return ''; if(date.toDateString()===new Date().toDateString()) return date.toLocaleTimeString(getCurrentLocale(), {hour:'2-digit',minute:'2-digit'}); return date.toLocaleDateString(getCurrentLocale(), {month:'short',day:'numeric'}); }
function formatFileSize(bytes){ var value=Number(bytes); if(!Number.isFinite(value)||value<=0)return'0 B'; var units=['B','KB','MB','GB'], size=value, unitIndex=0; while(size>=1024&&unitIndex<units.length-1){size/=1024;unitIndex++} return (size>=10||unitIndex===0?size.toFixed(0):size.toFixed(1))+' '+units[unitIndex]; }
function detectFileCategory(mimeType){ var type=String(mimeType||'').toLowerCase(); if(type.startsWith('image/'))return'image'; if(type.startsWith('video/'))return'video'; if(type.startsWith('audio/'))return'audio'; return'file'; }
function buildAttachmentMetaText(attachment){ var parts=[], category=detectFileCategory(attachment.mimeType); if(category==='image')parts.push(t('photoLabel')); else if(category==='video')parts.push(t('videoLabel')); else if(category==='audio')parts.push(t('audioLabel')); else parts.push(t('fileLabel')); if(attachment.size>0)parts.push(formatFileSize(attachment.size)); return parts.join(' • '); }
function getFileIcon(attachment){ var category=detectFileCategory(attachment&&attachment.mimeType); if(category==='image')return'🖼'; if(category==='video')return'🎬'; if(category==='audio')return'🎵'; var extension=(attachment&&attachment.name||'').split('.').pop().toLowerCase(); if(extension==='pdf')return'📕'; if(['doc','docx','txt','md'].indexOf(extension)!==-1)return'📄'; if(['zip','rar','7z'].indexOf(extension)!==-1)return'🗜'; return'📎'; }
function isTextLikeFile(attachment){ var name=String((attachment&&attachment.name)||'').toLowerCase(); var type=String((attachment&&attachment.mimeType)||'').toLowerCase(); return type.indexOf('text/')===0 || type.indexOf('json')!==-1 || type.indexOf('javascript')!==-1 || /\.(txt|md|json|js|ts|css|html|xml|yml|yaml|csv)$/i.test(name); }
function renderFormattedMessageText(text){
  var html=escapeHtml(text||'');
  html=html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,'<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  html=html.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  html=html.replace(/\*([^*]+)\*/g,'<em>$1</em>');
  return html.replace(/\n/g,'<br>');
}
function refreshFormattingToolbar(){
  var input=document.getElementById('composerInput');
  var toolbar=document.getElementById('formattingToolbar');
  if(!input||!toolbar) return;
  var hasSelection=(input.selectionEnd-input.selectionStart)>0;
  toolbar.classList.toggle('active',hasSelection);
}
function wrapComposerSelection(prefix,suffix){
  var input=document.getElementById('composerInput');
  if(!input) return;
  var start=input.selectionStart||0;
  var end=input.selectionEnd||0;
  if(end<=start) return;
  var value=input.value;
  var selected=value.slice(start,end);
  input.value=value.slice(0,start)+prefix+selected+suffix+value.slice(end);
  input.focus();
  input.selectionStart=start+prefix.length;
  input.selectionEnd=end+prefix.length;
  autoGrowTextarea(input);
  refreshFormattingToolbar();
}
function insertComposerLink(){
  var input=document.getElementById('composerInput');
  if(!input) return;
  var start=input.selectionStart||0;
  var end=input.selectionEnd||0;
  if(end<=start) return;
  var selected=input.value.slice(start,end);
  showPrompt('Insert link','Paste URL','https://').then(function(url){
    if(!url) return;
    var safeUrl=String(url||'').trim();
    var before=input.value.slice(0,start);
    var after=input.value.slice(end);
    input.value=before+'['+selected+']('+safeUrl+')'+after;
    input.focus();
    autoGrowTextarea(input);
    refreshFormattingToolbar();
  });
}
function clearComposerFormatting(){
  var input=document.getElementById('composerInput');
  if(!input) return;
  var start=input.selectionStart||0;
  var end=input.selectionEnd||0;
  if(end<=start) return;
  var selected=input.value.slice(start,end)
    .replace(/\*\*([^*]+)\*\*/g,'$1')
    .replace(/\*([^*]+)\*/g,'$1')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,'$1');
  input.value=input.value.slice(0,start)+selected+input.value.slice(end);
  input.focus();
  input.selectionStart=start;
  input.selectionEnd=start+selected.length;
  autoGrowTextarea(input);
  refreshFormattingToolbar();
}

/* ======================== Invite URL ======================== */

function checkPendingInvite(){
  var pendingInvite=localStorage.getItem('heyo_pending_invite')||'';
  if(!pendingInvite) return Promise.resolve();
  return loadInviteState(pendingInvite).then(function(inviteState){
    pendingInviteState=inviteState;
    if(!inviteState) return;
    if(isSignedIn() && findConversationById(inviteState.conversationId)){
      localStorage.removeItem('heyo_pending_invite');
      pendingInviteState=null;
      selectConversation(inviteState.conversationId);
      return;
    }
    if(isSignedIn()){
      joinConversationById(inviteState.conversationId).then(function(){
        localStorage.removeItem('heyo_pending_invite');
        pendingInviteState=null;
        selectConversation(inviteState.conversationId);
      }).catch(function(){
        showInviteScreen();
      });
      return;
    }
    showInviteScreen();
  }).catch(function(error){
    console.error(error);
  });
}

onAuthStateChanged(auth, async function(user){
  try{
    if(!user){
      localStorage.removeItem('heyo_token');
      forceLogoutToAuth();
      return;
    }

    localStorage.setItem('heyo_token', user.uid);
    var profileSnap = await getDoc(doc(db, PROFILE_COLLECTION, user.uid));
    if(!profileSnap.exists()){
      forceLogoutToAuth();
      return;
    }

    var p = profileSnap.data() || {};
    if(p.banned || p.deleted){
      await signOut(auth);
      forceLogoutToAuth();
      return;
    }

    currentUser = {
      userId: user.uid,
      uid: user.uid,
      email: user.email || p.email || '',
      phone: p.phone || '',
      username: p.username || '',
      displayName: p.displayName || 'User',
      initials: p.initials || makeInitials(p.displayName || 'User'),
      bio: p.bio || '',
      birthday: p.birthday || '',
      theme: p.theme || 'light',
      accentColor: p.accentColor || 'indigo',
      language: p.language || 'en',
      avatarFileId: p.avatarURL || '',
      avatarURL: p.avatarURL || '',
      isAdmin: !!(p.isAdmin || p.username==='usonance'),
      isVerified: !!(p.isVerified || p.isAdmin || p.username==='usonance'),
      banned: !!p.banned,
      deleted: !!p.deleted,
      online: !!p.online,
      mutedUntilAt: p.mutedUntilAt || p.mutedUntil || '',
      mutedUntil: p.mutedUntil || p.mutedUntilAt || ''
    };

    currentLanguage=normalizeLanguageValue(currentUser.language||'en');
    localStorage.setItem('heyo_lang',currentLanguage);
    syncWindowState();
    await startApplication();
  }catch(e){
    console.error(e);
    forceLogoutToAuth();
  }
});
