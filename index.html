<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<link rel="icon" type="image/png" sizes="32x32" href="./favicon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4f46e5">
<style>
@import url('https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap');

:root{
  --bg:#f5f6fa; --panel:#fff; --panel-2:#f8f9fd; --text:#20242c; --muted:#6e7685;
  --border:#e5e8f0; --danger:#d92d20; --success:#0f9d58; --warning:#ca8a04;
  --overlay:rgba(15,23,42,.44); --my-msg:#edf2ff; --other-msg:#fff;
  --reply-bg:#f4f6fb; --shadow:0 14px 34px rgba(15,23,42,.10);
  --sidebar-width:310px; --online:#22c55e; --accent:#4f46e5; --accent-soft:#eef0ff;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
body.dark{
  --bg:#0d1117; --panel:#151b23; --panel-2:#10161d; --text:#e6edf3; --muted:#98a5b7;
  --border:#263041; --danger:#ff6b6b; --success:#39c57a; --warning:#facc15;
  --overlay:rgba(0,0,0,.58); --my-msg:#1a2747; --other-msg:#161d28;
  --reply-bg:#111824; --shadow:0 16px 36px rgba(0,0,0,.34);
}

body.ac-indigo{--accent:#4f46e5;--accent-soft:#eef0ff} body.dark.ac-indigo{--accent:#7c8cff;--accent-soft:#1d2442}
body.ac-red{--accent:#dc2626;--accent-soft:#fef2f2} body.dark.ac-red{--accent:#f87171;--accent-soft:#3b1111}
body.ac-blue{--accent:#2563eb;--accent-soft:#eff6ff} body.dark.ac-blue{--accent:#60a5fa;--accent-soft:#172554}
body.ac-orange{--accent:#ea580c;--accent-soft:#fff7ed} body.dark.ac-orange{--accent:#fb923c;--accent-soft:#431407}
body.ac-yellow{--accent:#ca8a04;--accent-soft:#fefce8} body.dark.ac-yellow{--accent:#facc15;--accent-soft:#422006}
body.ac-pink{--accent:#db2777;--accent-soft:#fdf2f8} body.dark.ac-pink{--accent:#f472b6;--accent-soft:#500724}
body.ac-purple{--accent:#7c3aed;--accent-soft:#f5f3ff} body.dark.ac-purple{--accent:#a78bfa;--accent-soft:#2e1065}
body.ac-gray{--accent:#6b7280;--accent-soft:#f3f4f6} body.dark.ac-gray{--accent:#9ca3af;--accent-soft:#1f2937}
body.ac-green{--accent:#16a34a;--accent-soft:#f0fdf4} body.dark.ac-green{--accent:#4ade80;--accent-soft:#052e16}

*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
html,body{height:100%;height:-webkit-fill-available}
body{margin:0;font-family:'Ubuntu',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg)!important;color:var(--text);overflow:hidden;user-select:none;-webkit-font-smoothing:antialiased}
input,textarea{user-select:text;font:inherit} button,select{font:inherit} textarea{resize:none} a{color:inherit;text-decoration:none}
/* Dark theme icon fixes */
body.dark .icon-btn{color:var(--text);border-color:var(--border)}
body.dark .att-ico{color:var(--accent)}
body.dark .admin-row{border-color:var(--border);background:var(--panel)}
body.dark .ci.active{background:var(--accent-soft)}
body.dark .modal{background:var(--panel);border-color:var(--border)}
body.dark input,body.dark textarea,body.dark select{color:var(--text);background:var(--panel-2);border-color:var(--border)}
body.dark .secondary-btn{color:var(--text);background:var(--panel-2);border-color:var(--border)}
body.dark .p-st.off{color:var(--muted);background:var(--panel-2)}

.screen{display:none;height:100vh;height:100dvh;width:100%;overflow:hidden}.screen.active{display:flex}
.auth-screen{align-items:center;justify-content:center;padding:20px;background:var(--bg)!important;overflow-y:auto}
.auth-card{width:100%;max-width:420px;background:var(--panel);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:20px}
.auth-brand{font-size:24px;font-weight:700;margin-bottom:8px}
.auth-sub{font-size:14px;color:var(--muted);margin-bottom:14px;line-height:1.5}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tabs button{flex:1;height:42px;border-radius:10px;border:1px solid var(--border);background:var(--panel-2);color:var(--text);font-weight:700;cursor:pointer;font-size:14px;transition:background .15s,color .15s}
.tabs button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.auth-block{display:none}.auth-block.active{display:block}
.field{margin-bottom:10px}
.field label{display:block;font-size:13px;color:var(--muted);font-weight:700;margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;border:1px solid var(--border);background:var(--panel-2);color:var(--text);border-radius:10px;outline:none;padding:11px 12px;font-size:15px;transition:border-color .15s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
.field-row{display:flex;gap:10px}.field-row>*{flex:1;min-width:0}
.submit-btn,.primary-btn,.secondary-btn,.danger-btn,.warning-btn{border:none;border-radius:10px;cursor:pointer;font-weight:700;padding:11px 14px;font-size:14px;transition:opacity .15s,transform .1s}
.submit-btn:active,.primary-btn:active,.secondary-btn:active,.danger-btn:active,.warning-btn:active{transform:scale(.97)}
.submit-btn,.primary-btn{background:var(--accent);color:#fff}
.secondary-btn{background:var(--panel-2);color:var(--text);border:1px solid var(--border)}
.danger-btn{background:var(--danger);color:#fff}
.warning-btn{background:var(--warning);color:#111}
[disabled]{opacity:.6;cursor:not-allowed}
.submit-btn{width:100%;margin-top:4px}
.status{min-height:20px;margin-top:12px;font-size:14px;color:var(--muted)}
.status.error{color:var(--danger)}
.status.ok{color:var(--muted)}

.app-shell{display:grid;grid-template-columns:var(--sidebar-width) 1fr;width:100%;height:100vh;height:100dvh;overflow:hidden;background:var(--bg)!important}
.sidebar{background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;min-width:0;height:100%;overflow:hidden}
.sidebar-head{display:flex;align-items:center;gap:12px;padding:14px;padding-top:calc(14px + var(--safe-top));border-bottom:1px solid var(--border)}
.avatar{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent);font-weight:700;border:1px solid var(--border);flex-shrink:0;position:relative;overflow:visible;cursor:pointer;font-size:14px}
.avatar.lg{width:54px;height:54px;border-radius:16px;font-size:18px}
.avatar.xl{width:80px;height:80px;border-radius:24px;font-size:28px}
.av-inner{width:100%;height:100%;border-radius:inherit;overflow:hidden;display:grid;place-items:center;background:transparent}
.av-inner img{width:100%;height:100%;object-fit:cover;display:block}
.online-dot{width:11px;height:11px;border-radius:50%;background:var(--online);border:2.5px solid var(--panel);position:absolute;bottom:-2px;right:-2px;z-index:2}
.user-box{min-width:0;flex:1}
.user-box .name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-box .meta{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.icon-btn{border:1px solid var(--border);background:var(--panel-2);color:var(--text);width:38px;height:38px;border-radius:10px;cursor:pointer;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;font-size:16px;transition:background .12s}
.icon-btn:hover{background:var(--accent-soft)}
.icon-btn.accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.search-wrap{padding:12px 14px;border-bottom:1px solid var(--border);position:relative}
.search-wrap input{width:100%;border:1px solid var(--border);background:var(--panel-2);color:var(--text);border-radius:10px;outline:none;padding:11px 12px;font-size:14px}
.search-results{position:absolute;top:calc(100% - 4px);left:14px;right:14px;background:var(--panel);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);max-height:300px;overflow-y:auto;display:none;z-index:1200}
.search-results.open{display:block}
.si{display:flex;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.si:last-child{border-bottom:none}.si:hover{background:var(--panel-2)}
.si-meta{min-width:0;flex:1}
.si-title{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-sub{font-size:12px;color:var(--muted)}
.sidebar-body{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px}
.sec-title{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:8px 8px 6px;display:flex;align-items:center;justify-content:space-between}
.sec-title .icon-btn{width:24px;height:24px;font-size:14px;border-radius:7px}
.ci{display:flex;gap:10px;padding:10px;border-radius:12px;cursor:pointer;margin-bottom:4px;border:1px solid transparent;transition:background .12s}
.ci:hover{background:var(--panel-2)}
.ci.active{background:var(--accent-soft);border-color:color-mix(in srgb,var(--accent) 16%,transparent)}
.ci-meta{min-width:0;flex:1}
.ci-line{display:flex;gap:8px;align-items:center}
.ci-t{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-tm{margin-left:auto;flex-shrink:0;font-size:11px;color:var(--muted)}
.ci-sub,.ci-last{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}

.chat-panel{display:flex;flex-direction:column;min-width:0;min-height:0;height:100%;overflow:hidden;background:var(--bg)!important}
.chat-topbar{min-height:56px;border-bottom:1px solid var(--border);background:var(--panel);display:flex;align-items:center;gap:12px;padding:10px 14px;padding-top:calc(10px + var(--safe-top));flex-shrink:0}
.ct-box{min-width:0;flex:1;cursor:pointer}
.ct-t{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ct-s{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.chat-main{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)!important}
.placeholder{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)!important}
.ph-card{width:100%;max-width:600px;background:var(--panel);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:24px;text-align:center}
.ph-card h2{margin:0 0 8px;font-size:28px}.ph-card p{margin:0;color:var(--muted);line-height:1.6}
.convo-view{display:none;flex:1;min-height:0;flex-direction:column;overflow:hidden}.convo-view.active{display:flex}
.messages{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;display:flex;flex-direction:column;gap:6px;background:var(--bg)!important}
.empty-st{margin:auto;color:var(--muted);text-align:center;padding:24px}
.date-sep{display:flex;align-items:center;gap:12px;padding:6px 0;color:var(--muted);font-size:12px;font-weight:700}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border)}
.mr{display:flex;gap:10px;align-items:flex-start;max-width:85%}
.mr.mine{align-self:flex-end;flex-direction:row-reverse}
.mr .avatar{width:34px;height:34px;border-radius:10px;font-size:13px;flex-shrink:0}
.mc{min-width:0;max-width:100%;background:var(--other-msg);border:1px solid var(--border);border-radius:16px;padding:10px 12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.mr.mine .mc{background:var(--my-msg)}
.mh{display:flex;gap:8px;align-items:center;margin-bottom:4px}
.mh-a{font-size:13px;font-weight:700;cursor:pointer}.mh-a:hover{text-decoration:underline}
.mh-u{font-size:12px;color:var(--muted)}
.m-fwd{font-size:11px;color:var(--accent);font-weight:700;margin-bottom:4px}
.m-rpl{border-left:3px solid var(--accent);background:var(--reply-bg);border-radius:10px;padding:7px 10px;margin-bottom:6px}
.m-rpl-n{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:2px}
.m-rpl-t{font-size:12px;color:var(--muted);white-space:pre-wrap;word-break:break-word}
.m-txt{white-space:pre-wrap;word-break:break-word;line-height:1.55;user-select:text}
.m-atts{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.att-card{border:1px solid var(--border);background:var(--panel-2);border-radius:14px;overflow:hidden}
.att-img{display:block;width:100%;max-width:400px;max-height:340px;object-fit:contain;cursor:pointer}
.att-vw{position:relative;width:100%;max-width:400px}.att-vw iframe{width:100%;height:240px;border:none}
.att-aw{padding:12px}.att-aw iframe{width:100%;height:80px;border:none}
.att-file{display:flex;align-items:flex-start;gap:10px;padding:12px}
.att-ico{width:42px;height:42px;border-radius:12px;border:1px solid var(--border);background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;font-size:18px;flex-shrink:0}
.att-body{min-width:0;flex:1}.att-name{font-size:14px;font-weight:700;word-break:break-word}
.att-meta{margin-top:4px;font-size:12px;color:var(--muted)}
.att-acts{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.att-lnk{display:inline-flex;align-items:center;min-height:32px;padding:6px 10px;border-radius:10px;text-decoration:none;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:12px;font-weight:700}
.att-cap{padding:8px 12px;border-top:1px solid var(--border)}
.att-cap-n{font-size:13px;font-weight:700}.att-cap-m{font-size:12px;color:var(--muted);margin-top:2px}
.m-meta{display:flex;gap:8px;margin-top:6px;font-size:12px;color:var(--muted)}
.inv-card{border:1px solid var(--border);background:var(--panel-2);border-radius:14px;padding:12px;margin-top:6px}
.inv-head{display:flex;gap:10px;align-items:center}
.inv-meta{min-width:0;flex:1}
.inv-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inv-sub{font-size:12px;color:var(--muted);margin-top:2px}
.inv-acts{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.inv-btn{display:inline-flex;align-items:center;justify-content:center;min-height:34px;padding:8px 12px;border-radius:10px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-weight:700}
.inv-sec{display:inline-flex;align-items:center;justify-content:center;min-height:34px;padding:8px 12px;border-radius:10px;background:var(--panel);color:var(--text);border:1px solid var(--border);cursor:pointer;font-weight:700}

.comp-wrap{background:var(--panel);border-top:1px solid var(--border);padding:12px 14px;padding-bottom:calc(14px + var(--safe-bottom));flex-shrink:0;max-height:40vh;overflow-y:auto}
.rpl-banner,.upl-banner{display:none;align-items:center;justify-content:space-between;gap:12px;border:1px solid var(--border);background:var(--panel-2);border-radius:12px;padding:10px 12px;margin-bottom:10px}
.rpl-banner.active,.upl-banner.active{display:flex}
.rpl-meta,.upl-meta{min-width:0;flex:1}
.rpl-label,.upl-label{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:4px}
.rpl-text,.upl-text{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.staged-file{display:none;align-items:center;gap:10px;border:1px solid var(--border);background:var(--panel-2);border-radius:12px;padding:10px 12px;margin-bottom:10px}
.staged-file.active{display:flex}
.staged-info{min-width:0;flex:1}.staged-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.staged-meta{font-size:12px;color:var(--muted)}
.staged-img{max-width:80px;max-height:60px;border-radius:8px;object-fit:cover}
.upl-prog-w{margin-top:6px}.upl-prog{width:100%;height:8px;appearance:none;border:none;border-radius:99px;background:rgba(0,0,0,.08)}
.upl-prog::-webkit-progress-bar{background:rgba(0,0,0,.08)} .upl-prog::-webkit-progress-value{background:var(--accent);border-radius:99px} .upl-prog::-moz-progress-bar{background:var(--accent)}
.composer{display:flex;gap:10px;align-items:flex-end}
.composer textarea{flex:1;border:1px solid var(--border);background:var(--panel-2);color:var(--text);border-radius:12px;outline:none;min-height:48px;max-height:180px;padding:12px;overflow-y:auto;font-size:15px}
.comp-left,.comp-right{display:flex;gap:6px;align-items:flex-end}
.comp-left .icon-btn,.comp-right .icon-btn{width:48px;height:48px;font-size:18px}
#sendBtn{background:var(--accent);color:#fff;border-color:var(--accent)}

.dd-bd,.modal-ov{position:fixed;inset:0;display:none}
.dd-bd.open{display:block;z-index:9998}
.msg-dd{position:fixed;min-width:180px;background:var(--panel);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);padding:6px;display:none;z-index:9999}
.msg-dd.open{display:block}
.msg-dd button{width:100%;border:none;background:transparent;text-align:left;color:var(--text);padding:10px 12px;border-radius:10px;cursor:pointer;font-weight:500;font-size:14px}
.msg-dd button:hover{background:var(--panel-2)}.msg-dd button.danger{color:var(--danger)}
.modal-ov{background:var(--overlay);align-items:center;justify-content:center;padding:18px;z-index:12000}
.modal-ov.open{display:flex}
.modal{width:100%;max-width:500px;background:var(--panel);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;max-height:90vh;max-height:90dvh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal.modal-wide{max-width:860px}
.modal-hd{padding:16px 18px 8px;font-size:18px;font-weight:700}
.modal-bd{padding:0 18px 12px;color:var(--muted);line-height:1.5;white-space:pre-wrap;word-break:break-word}
.modal-ct{padding:0 18px 12px}
.modal-ac{display:flex;justify-content:flex-end;gap:10px;padding:0 18px 18px;flex-wrap:wrap}
.p-hdr{display:flex;flex-direction:column;align-items:center;padding:16px;gap:10px}
.p-name{font-size:20px;font-weight:700}.p-un{font-size:14px;color:var(--muted)}
.p-bio{font-size:14px;color:var(--muted);text-align:center;max-width:300px;line-height:1.5}
.p-info{font-size:13px;color:var(--muted);text-align:center}
.p-st{font-size:13px;font-weight:700;padding:4px 10px;border-radius:8px}
.p-st.on{color:var(--success);background:rgba(34,197,94,.1)} .p-st.off{color:var(--muted);background:var(--panel-2)}
.p-acts{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:6px}
.ac-picker{display:flex;gap:8px;flex-wrap:wrap;padding:4px 0}
.ac-dot{width:32px;height:32px;border-radius:10px;cursor:pointer;border:3px solid transparent;transition:border-color .15s}
.ac-dot.sel{border-color:var(--text)}
.ac-indigo{background:#4f46e5}.ac-red{background:#dc2626}.ac-blue{background:#2563eb}
.ac-orange{background:#ea580c}.ac-yellow{background:#ca8a04}.ac-pink{background:#db2777}
.ac-purple{background:#7c3aed}.ac-gray{background:#6b7280}.ac-green{background:#16a34a}
.img-ov{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:20000;cursor:pointer}
.img-ov img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:8px}
.mobile-toggle{display:none}.mob-bd{display:none}

.admin-kpi-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:14px}
.admin-kpi{border:1px solid var(--border);background:var(--panel-2);border-radius:14px;padding:12px}
.admin-kpi-v{font-size:22px;font-weight:700}
.admin-kpi-l{font-size:12px;color:var(--muted);margin-top:4px}
.admin-split{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.admin-box{border:1px solid var(--border);background:var(--panel-2);border-radius:14px;padding:12px;min-height:120px}
.admin-box h3{margin:0 0 10px;font-size:14px}
.admin-list{display:flex;flex-direction:column;gap:8px;max-height:320px;overflow:auto;-webkit-overflow-scrolling:touch}
.admin-row{display:flex;align-items:center;gap:10px;padding:8px;border:1px solid var(--border);background:var(--panel);border-radius:12px}
.admin-row-meta{min-width:0;flex:1}
.admin-row-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.admin-row-sub{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.admin-row-actions{display:flex;gap:6px;flex-wrap:wrap}
.admin-inline{display:flex;gap:8px;align-items:center}

function generateId(prefix){
  return prefix + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,10);
}
function makeInitials(value){
  var v=String(value||'').trim();
  if(!v) return 'U';
  var parts=v.split(/\s+/).filter(Boolean);
  if(parts.length===1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0]+parts[1][0]).toUpperCase();
}
function toIso(value){
  if(!value) return '';
  if(typeof value === 'string') return value;
  if(value instanceof Date) return value.toISOString();
  if(typeof value.toDate === 'function') return value.toDate().toISOString();
  return '';
}
function safeLower(value){ return String(value||'').trim().toLowerCase(); }
function normalizeUsername(value){ return String(value||'').trim().replace(/^@+/,'').toLowerCase(); }
function isSignedIn(){ return !!(auth.currentUser && currentUser); }

    conversationId: conversationId,
    userId: data.userId || '',
    displayName: data.displayName || 'User',
    username: data.username || '',
    initials: data.initials || makeInitials(data.displayName || 'User'),
    avatarFileId: data.avatarURL || '',
    text: data.text || '',
    createdAt: toIso(data.createdAt),
    editedAt: toIso(data.editedAt),
    deletedAt: toIso(data.deletedAt),
    isDeletedEvent: !!data.isDeletedEvent,
    isMine: !!(currentUser && data.userId === currentUser.userId),
    messageType: data.messageType || 'text',
    attachments: Array.isArray(data.attachments) ? data.attachments : [],
    meta: data.meta || {},
    replyToMessageId: data.replyToMessageId || '',
    replyDisplayName: data.replyDisplayName || '',
    replyPreview: data.replyPreview || '',
    forwardedFromMessageId: data.forwardedFromMessageId || '',
    forwardedFromTitle: data.forwardedFromTitle || ''
  };
}

/* ======================== Notifications ======================== */

function requestNotificationPermission(){
  if(!('Notification' in window)) return;
  if(Notification.permission==='granted'){ notificationsEnabled=true; return; }
  if(Notification.permission==='denied') return;
  Notification.requestPermission().then(function(permission){
    notificationsEnabled=(permission==='granted');
  });
}

function showBrowserNotification(title,body,conversationId){
  if(!notificationsEnabled||!('Notification' in window)||Notification.permission!=='granted') return;
  if(document.hasFocus()&&activeConversationId===conversationId) return;
  try{
    var notification = new Notification(title,{body:body,icon:'/favicon.ico',tag:'heyo-'+conversationId,renotify:true,silent:false});
    notification.onclick=function(){
      window.focus();
      if(conversationId) selectConversation(conversationId);
      notification.close();
    };
    setTimeout(function(){ try{notification.close();}catch(e){} },8000);
  }catch(e){}
}

function notifyIfNew_(msg){
  if(!msg||msg.isDeletedEvent||msg.deletedAt) return;
  if(msg.isMine) return;
  if(notifiedMessageIds.has(msg.messageId)) return;
  notifiedMessageIds.add(msg.messageId);
  if(notifiedMessageIds.size>500){
    var arr=Array.from(notifiedMessageIds);
    notifiedMessageIds=new Set(arr.slice(arr.length-250));
  }
  if(document.hasFocus()&&activeConversationId===msg.conversationId) return;
  var convo=findConversationById(msg.conversationId);
  var convoTitle=convo?convo.title:'Heyo';
  var body=(msg.displayName||'User')+': '+(msg.text||'[file]');
  showBrowserNotification(convoTitle,body,msg.conversationId);
}

async function findUserByLoginIdentifier(identifier){
  var raw = String(identifier||'').trim();
  if(!raw) return null;
  if(raw.indexOf('@')!==-1 && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(raw)) return {email: raw, uid: null};

  var username = normalizeUsername(raw);
  if(username){
    var q = query(collection(db, PROFILE_COLLECTION), where('usernameLower','==',username), limit(1));
    var snap = await getDocs(q);
    if(!snap.empty){
      var docSnap = snap.docs[0];
      var data = docSnap.data() || {};
      return { email: data.email || '', uid: docSnap.id };
    }
  }
  return null;
}

async function doLogin(){
  try{
    var identifier=document.getElementById('loginId').value.trim();
    var password=document.getElementById('loginPw').value;
    if(!identifier||!password){
      setAuthStatus(t('emailPhoneUsername')+' & '+t('password')+' required.','error');
      return;
    }
    setAuthStatus(t('loggingIn'),'ok');
    var match = await findUserByLoginIdentifier(identifier);
    if(!match || !match.email){
      setAuthStatus('User not found.','error');
      return;
    }
    await signInWithEmailAndPassword(auth, match.email, password);
    document.getElementById('loginPw').value='';
    setAuthStatus('','ok');
  }catch(error){
    console.error(error);
    setAuthStatus(error && error.message ? error.message : 'Login failed.','error');
  }
}

async function listenSidebar(){
  if(!auth.currentUser) return;
  if(typeof sidebarUnsubscribe === 'function'){ try{ sidebarUnsubscribe(); }catch(e){} }

  sidebarUnsubscribe = onSnapshot(
    query(collection(db, PROFILE_COLLECTION, auth.currentUser.uid, USER_CONVO_SUBCOLLECTION), orderBy('updatedAt','desc')),
    async function(snap){
      var list = [];
      for (const convoDoc of snap.docs){
        var data = convoDoc.data() || {};
        var mapped = await hydrateConversationFromUserSummary(data);
        list.push(mapped);
      }
      conversations = list.filter(function(c){ return !c.isDeleted; });
      if(currentUser){
        var channelExists = conversations.some(function(c){ return c.conversationId===APP_CHANNEL_ID; });
        if(!channelExists){
          conversations.unshift({
            conversationId: APP_CHANNEL_ID,
            type: 'channel',
            title: 'Heyo',
            titleLower: 'heyo',
            subtitle: '',
            description: 'Global channel',
            initials: 'H',
            avatarFileId: '',
            avatarURL: '',
            memberCount: 0,
            lastMessageText: '',
            lastMessageAt: '',
            updatedAt: '',
            isDeleted: false
          });
        }
      }
      activeConversation = findConversationById(activeConversationId);
      syncWindowState();
      renderSidebar();
      renderTopbar();
      updateComposerVisibility();
      refreshOnlineMapFromConversations();
      if(!activeConversationId) showPlaceholder();

  );

  var ids = [];
  conversations.forEach(function(c){
    if(c.type==='direct' && c.otherUserId) ids.push(c.otherUserId);

  ids = Array.from(new Set(ids)).filter(Boolean);
  var results = {};
  for (var i=0;i<ids.length;i++){
    try{
      var s = await getDoc(doc(db, PROFILE_COLLECTION, ids[i]));
      if(s.exists()) results[ids[i]] = !!(s.data()||{}).online;
    }catch(e){}
  }
  onlineStatusMap = results;
}

/* ======================== Realtime Messages ======================== */

async function loadConversationMessages(forceScroll){
  if(!activeConversationId) return;

  if(typeof messageUnsubscribe === 'function' && activeMessageListenerConversationId !== activeConversationId){
    try{ messageUnsubscribe(); }catch(e){}
    messageUnsubscribe = null;
    activeMessageListenerConversationId = '';
  }

  if(activeMessageListenerConversationId === activeConversationId && typeof messageUnsubscribe === 'function'){
    if(forceScroll) renderAllMessages(true);
    return;
  }

  conversationMessages.set(activeConversationId,[]);
  renderAllMessages(false);
  activeMessageListenerConversationId = activeConversationId;

  var initialLoaded = false;
  messageUnsubscribe = onSnapshot(
    query(collection(db, CONVERSATION_COLLECTION, activeConversationId, MESSAGE_SUBCOLLECTION), orderBy('createdAt','asc')),
    function(snap){
      if(activeConversationId !== activeMessageListenerConversationId) return;

      var nextMessages = [];
      snap.forEach(function(docSnap){
        var m = messageDocToClient(docSnap.id, docSnap.data()||{}, activeConversationId);
        if(!m.deletedAt && !m.isDeletedEvent) nextMessages.push(m);
      });

      nextMessages.sort(function(a,b){
        var ta=a.createdAt?new Date(a.createdAt).getTime():0;
        var tb=b.createdAt?new Date(b.createdAt).getTime():0;
        if(ta!==tb) return ta-tb;
        return String(a.messageId).localeCompare(String(b.messageId));
      });

      conversationMessages.set(activeConversationId,nextMessages);

      if(initialLoaded){
        snap.docChanges().forEach(function(change){
          if(change.type==='added'){
            var added = messageDocToClient(change.doc.id, change.doc.data()||{}, activeConversationId);
            notifyIfNew_(added);
          }
        });
      }

      renderAllMessages(forceScroll || !initialLoaded);
      initialLoaded = true;
    },
    function(error){
      console.error('Messages snapshot failed:', error);
    }
  );
}

function renderAllMessages(forceScroll){
  var messagesContainer=document.getElementById('messagesContainer');
  var messageList=conversationMessages.get(activeConversationId)||[];
  var isNearBottom=Math.abs(messagesContainer.scrollHeight-messagesContainer.scrollTop-messagesContainer.clientHeight)<120;

  if(!messageList.length){
    messagesContainer.innerHTML='<div class="empty-st">'+t('noMessages')+'</div>';
    return;
  }

  var htmlParts=[], previousDateString='';
  for(var i=0;i<messageList.length;i++){
    var message=messageList[i];
    var dateString=getDateString(message.createdAt);
    if(dateString&&dateString!==previousDateString){
      htmlParts.push('<div class="date-sep">'+escapeHtml(formatDateSeparator(message.createdAt))+'</div>');
      previousDateString=dateString;
    }
    htmlParts.push(renderSingleMessage(message));
  }

  messagesContainer.innerHTML=htmlParts.join('');
  if(forceScroll||isNearBottom) messagesContainer.scrollTop=messagesContainer.scrollHeight;
}

function getDateString(isoString){
  if(!isoString) return '';
  var date=new Date(isoString);
  if(isNaN(date.getTime())) return '';
  return date.getFullYear()+'-'+(date.getMonth()+1)+'-'+date.getDate();
}

function formatDateSeparator(isoString){
  var date=new Date(isoString);
  if(isNaN(date.getTime())) return '';
  var now=new Date();
  if(date.toDateString()===now.toDateString()) return t('today');
  var yesterday=new Date(now); yesterday.setDate(yesterday.getDate()-1);
  if(date.toDateString()===yesterday.toDateString()) return t('yesterday');
  return date.toLocaleDateString(currentLanguage==='ru'?'ru-RU':'en-US',{year:'numeric',month:'long',day:'numeric'});
}

function renderSingleMessage(message){
  var mineClass=message.isMine?'mine':'';
  var isOnline=onlineStatusMap[message.userId]||false;
  var avatarClickHandler="openProfile('"+escapeJsString(message.userId)+"')";
  var msgAvatar=message.avatarFileId||'';
  if(!msgAvatar&&message.isMine&&currentUser&&currentUser.avatarFileId) msgAvatar=currentUser.avatarFileId;

  var forwardedHtml='';
  if(message.forwardedFromMessageId){
    var sourceLabel=message.forwardedFromTitle?escapeHtml(message.forwardedFromTitle):'';
    forwardedHtml='<div class="m-fwd">↗ '+t('forwarded')+' '+sourceLabel+'</div>';
  }

  var replyHtml='';
  if(message.replyToMessageId){
    replyHtml='<div class="m-rpl"><div class="m-rpl-n">'+escapeHtml(message.replyDisplayName||'')+'</div><div class="m-rpl-t">'+escapeHtml(message.replyPreview||'')+'</div></div>';
  }

  var specialHtml=renderSpecialMessageContent(message);
  var attachmentsHtml=renderMessageAttachments(message.attachments||[]);
  var textHtml=message.text?'<div class="m-txt">'+escapeHtml(message.text)+'</div>':'';
  var metaParts=[];
  if(message.createdAt) metaParts.push(formatMessageTime(message.createdAt));
  if(message.editedAt) metaParts.push(t('edited'));
  var metaHtml=metaParts.map(function(part){ return '<span>'+escapeHtml(part)+'</span>'; }).join('');

  return '<div class="mr '+mineClass+'">'+
    buildAvatarHTML(message.initials,msgAvatar,'',isOnline,avatarClickHandler)+
    '<div class="mc" data-mid="'+escapeAttr(message.messageId)+'" data-own="'+(message.isMine?'1':'0')+'">'+
      '<div class="mh"><div class="mh-a" onclick="openProfile(\''+escapeJsString(message.userId)+'\')">'+escapeHtml(message.displayName||'User')+'</div><div class="mh-u">@'+escapeHtml(message.username||'')+'</div></div>'+
      forwardedHtml+replyHtml+specialHtml+attachmentsHtml+textHtml+
      '<div class="m-meta">'+metaHtml+'</div>'+
    '</div></div>';
}

function renderSpecialMessageContent(message){
  if(message.messageType==='group_invite'){
    var meta=message.meta||{};
    var title=meta.groupTitle||'Group';
    var avatarFileId=meta.groupAvatarURL||'';
    var initials=meta.groupInitials||'G';
    var memberCount=Number(meta.memberCount||0);
    var conversationId=String(meta.groupConversationId||'');
    var isAlreadyIn=!!findConversationById(conversationId);
    return '<div class="inv-card"><div class="inv-head">'+buildAvatarHTML(initials,avatarFileId,'',false,"openConversationProfileById('"+escapeJsString(conversationId)+"')")+'<div class="inv-meta"><div class="inv-title">'+escapeHtml(title)+'</div><div class="inv-sub">'+escapeHtml(String(memberCount)+' '+t('members'))+'</div></div></div><div class="inv-acts">'+
      (isAlreadyIn?'<button class="inv-sec" onclick="selectConversation(\''+escapeJsString(conversationId)+'\')">'+t('openGroup')+'</button>':'<button class="inv-btn" onclick="joinGroupFromMessage(\''+escapeJsString(meta.inviteCode||'')+'\')">'+t('joinGroup')+'</button>')+
      '<button class="inv-sec" onclick="openConversationProfileById(\''+escapeJsString(conversationId)+'\')">'+t('groupProfile')+'</button>'+
      '</div></div>';
  }
  return '';
}

/* ======================== Attachment Rendering ======================== */

function renderMessageAttachments(attachments){
  if(!attachments||!attachments.length) return '';
  return '<div class="m-atts">'+attachments.map(renderSingleAttachment).join('')+'</div>';
}

function renderSingleAttachment(attachment){
  var fileName=escapeHtml(attachment.name||'file');
  var metaText=escapeHtml(buildAttachmentMetaText(attachment));
  var fileId=attachment.downloadURL;
  var category=detectFileCategory(attachment.mimeType);
  var viewLink=escapeAttr(fileId||'#');
  var downloadLink=escapeAttr(fileId||'#');

  if(category==='image'){
    var imageSrc=escapeAttr(fileId||'');
    return '<div class="att-card"><img class="att-img" src="'+imageSrc+'" alt="'+fileName+'" loading="lazy" onclick="previewFullImage(\''+escapeJsString(imageSrc)+'\')" onerror="this.style.display=\'none\'"><div class="att-cap"><div class="att-cap-n">'+fileName+'</div><div class="att-cap-m">'+metaText+'</div><div class="att-acts"><a class="att-lnk" href="'+viewLink+'" target="_blank">Open</a><a class="att-lnk" href="'+downloadLink+'" target="_blank">Download</a></div></div></div>';
  }
  if(category==='video'){
    return '<div class="att-card"><div class="att-vw"><iframe src="'+viewLink+'" allow="autoplay" allowfullscreen></iframe></div><div class="att-cap"><div class="att-cap-n">'+fileName+'</div><div class="att-cap-m">'+metaText+'</div><div class="att-acts"><a class="att-lnk" href="'+viewLink+'" target="_blank">Open</a><a class="att-lnk" href="'+downloadLink+'" target="_blank">Download</a></div></div></div>';
  }
  if(category==='audio'){
    return '<div class="att-card"><div class="att-aw"><iframe src="'+viewLink+'" allow="autoplay"></iframe></div><div class="att-cap"><div class="att-cap-n">'+fileName+'</div><div class="att-cap-m">'+metaText+'</div><div class="att-acts"><a class="att-lnk" href="'+downloadLink+'" target="_blank">Download</a></div></div></div>';
  }
  return '<div class="att-card"><div class="att-file"><div class="att-ico">'+getFileIcon(attachment)+'</div><div class="att-body"><div class="att-name">'+fileName+'</div><div class="att-meta">'+metaText+'</div><div class="att-acts"><a class="att-lnk" href="'+viewLink+'" target="_blank">Open</a><a class="att-lnk" href="'+downloadLink+'" target="_blank">Download</a></div></div></div></div>';
}

function previewFullImage(imageSource){
  var overlay=document.createElement('div');
  overlay.className='img-ov';
  overlay.innerHTML='<img src="'+imageSource+'">';
  overlay.onclick=function(){ overlay.remove(); };
  document.body.appendChild(overlay);
}

function stageSelectedFile(file){

/* ======================== Conversation Summary Sync ======================== */

async function updateConversationLastMessage(conversationId, text, createdAtValue){
  try{
    await updateDoc(doc(db, CONVERSATION_COLLECTION, conversationId), {
      lastMessageText: text || '',
      lastMessageAt: createdAtValue || serverTimestamp(),
      updatedAt: serverTimestamp()
    });
  }catch(e){}

  try{
    var convoSnap = await getDoc(doc(db, CONVERSATION_COLLECTION, conversationId));
    if(!convoSnap.exists()) return;
    var convo = convoSnap.data() || {};
    var memberSnap = await getDocs(collection(db, CONVERSATION_COLLECTION, conversationId, MEMBER_SUBCOLLECTION));
    var updates = [];
    memberSnap.forEach(function(m){
      var uid = m.id;
      updates.push(addUserToConversationIndexes(uid, conversationId, {
        conversationId: conversationId,
        type: convo.type || 'direct',
        title: convo.title || 'Chat',
        subtitle: convo.subtitle || '',
        initials: convo.initials || makeInitials(convo.title || 'Chat'),
        avatarURL: convo.avatarURL || '',
        description: convo.description || '',
        memberCount: Number(convo.memberCount || 0),
        lastMessageText: text || '',
        lastMessageAt: createdAtValue || serverTimestamp(),
        updatedAt: serverTimestamp(),
        otherUserId: convo.otherUserId || ''
      }));
    });
    await Promise.all(updates);
  }catch(e){}
}

/* ======================== Send Message ======================== */

async function handleSend(){
  if(!isSignedIn()||!activeConversationId||uploadState.active) return;
  var composerInput=document.getElementById('composerInput');
  var rawText=composerInput.value;
  var messageText=rawText.trim();
  if(!messageText&&!stagedFile) return;

  if(stagedFile){
    await uploadAndSendFile(stagedFile, messageText);
    return;
  }

  var sendBtn=document.getElementById('sendBtn');
  var previousReplyTarget=replyTarget;
  composerInput.value='';
  autoGrowTextarea(composerInput);
  clearReply();
  sendBtn.disabled=true;

  try{
    var msgPayload = {
      conversationId: activeConversationId,
      userId: currentUser.userId,
      displayName: currentUser.displayName,
      username: currentUser.username,
      initials: currentUser.initials,
      avatarURL: currentUser.avatarFileId || '',
      text: messageText,
      messageType: 'text',
      attachments: [],
      replyToMessageId: previousReplyTarget ? previousReplyTarget.messageId : '',
      replyDisplayName: previousReplyTarget ? (previousReplyTarget.displayName || '') : '',
      replyPreview: previousReplyTarget ? truncateString(previousReplyTarget.text || '',140) : '',
      forwardedFromMessageId: '',
      forwardedFromTitle: '',
      createdAt: serverTimestamp(),
      editedAt: null,
      deletedAt: null
    };

    await addDoc(collection(db, CONVERSATION_COLLECTION, activeConversationId, MESSAGE_SUBCOLLECTION), msgPayload);
    await updateConversationLastMessage(activeConversationId, messageText, serverTimestamp());
  }catch(error){
    console.error(error);
    composerInput.value=rawText;
    autoGrowTextarea(composerInput);
    replyTarget=previousReplyTarget;
    syncWindowState();
    renderReplyBanner();
    alert('Send failed.');
  }finally{
    sendBtn.disabled=false;
  }
}

async function uploadAndSendFile(file,messageText){
  var conversationId=activeConversationId;
  var storagePath='uploads/'+conversationId+'/'+Date.now()+'_'+file.name.replace(/[^\w.\-]+/g,'_');
  var storageRef=ref(storage, storagePath);
  uploadState={active:true,file:file,task:null,downloadURL:'',path:storagePath,conversationId:conversationId,progress:0};
  showUploadBanner('Uploading '+file.name,0,true);
  document.getElementById('sendBtn').disabled=true;

  try{
    await new Promise(function(resolve,reject){
      var task=uploadBytesResumable(storageRef,file,{contentType:file.type||'application/octet-stream'});
      uploadState.task=task;
      task.on('state_changed',function(snapshot){
        var pct = Math.floor((snapshot.bytesTransferred / snapshot.totalBytes) * 100);
        uploadState.progress = pct;
        showUploadBanner('Uploading '+file.name+' — '+pct+'%',pct,true);
      },function(error){
        reject(error);
      },function(){
        resolve();
      });
    });

    var downloadURL = await getDownloadURL(storageRef);
    uploadState.downloadURL = downloadURL;

    var attachment = {
      name: file.name,
      mimeType: file.type || 'application/octet-stream',
      size: file.size,
      storagePath: storagePath,
      downloadURL: downloadURL
    };

    await addDoc(collection(db, CONVERSATION_COLLECTION, conversationId, MESSAGE_SUBCOLLECTION),{
      conversationId: conversationId,
      userId: currentUser.userId,
      displayName: currentUser.displayName,
      username: currentUser.username,
      initials: currentUser.initials,
      avatarURL: currentUser.avatarFileId || '',
      text: messageText || '',
      messageType: 'file',
      attachments: [attachment],
      replyToMessageId: replyTarget ? replyTarget.messageId : '',
      replyDisplayName: replyTarget ? (replyTarget.displayName || '') : '',
      replyPreview: replyTarget ? truncateString(replyTarget.text || '',140) : '',
      forwardedFromMessageId: '',
      forwardedFromTitle: '',
      createdAt: serverTimestamp(),
      editedAt: null,
      deletedAt: null
    });

    await updateConversationLastMessage(conversationId, messageText || '[file]', serverTimestamp());

    document.getElementById('composerInput').value='';
    autoGrowTextarea(document.getElementById('composerInput'));
    clearReply();
    clearStagedFile();
    resetUploadState();
  }catch(error){
    console.error(error);
    alert('Upload failed.');
    resetUploadState();
  }
}

function cancelCurrentUpload(){
  if(uploadState.active && uploadState.task){
    try{ uploadState.task.cancel(); }catch(e){}
  }
  resetUploadState();
}

function resetUploadState(alsoHideBanner){
  if(alsoHideBanner!==false) hideUploadBanner();
  uploadState={active:false,file:null,task:null,downloadURL:'',path:'',conversationId:'',progress:0};
  document.getElementById('fileInput').value='';
  document.getElementById('sendBtn').disabled=false;
}

function showUploadBanner(text,percent,showCancelButton){
  document.getElementById('uploadBanner').classList.add('active');
  document.getElementById('uploadLabel').textContent='Upload';
  document.getElementById('uploadText').textContent=text;
  if(typeof percent==='number'){
    document.getElementById('uploadProgressWrap').style.display='';
    document.getElementById('uploadProgress').value=Math.max(0,Math.min(100,percent));
  }else{
    document.getElementById('uploadProgressWrap').style.display='none';
  }
  document.getElementById('uploadCancelBtn').style.display=showCancelButton?'':'none';
}

function hideUploadBanner(){
  document.getElementById('uploadBanner').classList.remove('active');
}

/* ======================== Message Context Menu ======================== */

function openDropdownAt(x,y,messageId){
  var message=getMessageFromActiveConversation(messageId);
  if(!message) return;
  closeDropdown();
  isDropdownOpen=true;
  dropdownMessageId=messageId;
  var menu=document.getElementById('messageDropdown'), backdrop=document.getElementById('dropdownBackdrop'), items=[];
  items.push('<button onclick="replyToMessage(\''+escapeJsString(messageId)+'\')">'+t('reply')+'</button>');
  items.push('<button onclick="copyMessageText(\''+escapeJsString(messageId)+'\')">'+t('copy')+'</button>');
  if(message.messageType!=='group_invite') items.push('<button onclick="forwardMessageUI(\''+escapeJsString(messageId)+'\')">'+t('forward')+'</button>');
  if(message.isMine||isAdminUser()) items.push('<button onclick="editMessageUI(\''+escapeJsString(messageId)+'\')">'+t('edit')+'</button>');
  if(message.isMine||isAdminUser()) items.push('<button class="danger" onclick="deleteMessageUI(\''+escapeJsString(messageId)+'\')">'+t('deleteMsg')+'</button>');

  menu.innerHTML=items.join('');
  menu.classList.add('open');
  backdrop.classList.add('open');
  menu.style.left='0px'; menu.style.top='0px';
  var menuRect=menu.getBoundingClientRect();
  var left=Math.min(x,window.innerWidth-menuRect.width-8), top=Math.min(y,window.innerHeight-menuRect.height-8);
  if(left<8) left=8;
  if(top<8) top=8;
  menu.style.left=left+'px';
  menu.style.top=top+'px';
}

function closeDropdown(){
  isDropdownOpen=false;
  document.getElementById('messageDropdown').classList.remove('open');
  document.getElementById('dropdownBackdrop').classList.remove('open');
}

function replyToMessage(messageId){
  var message=getMessageFromActiveConversation(messageId);
  closeDropdown();
  if(!message) return;
  replyTarget=message;
  syncWindowState();
  renderReplyBanner();
  document.getElementById('composerInput').focus();
}

function copyMessageText(messageId){
  var message=getMessageFromActiveConversation(messageId);
  closeDropdown();
  if(message&&message.text&&navigator.clipboard) navigator.clipboard.writeText(message.text);
}

async function editMessageUI(messageId){
  closeDropdown();
  var localMsg=getMessageFromActiveConversation(messageId);
  var currentText=(localMsg&&localMsg.text)||'';
  showPrompt(t('edit'),'',currentText).then(async function(newText){
    if(newText===null) return;
    var trimmed=String(newText||'').trim();
    if(!trimmed) return;
    try{
      await updateDoc(doc(db, CONVERSATION_COLLECTION, activeConversationId, MESSAGE_SUBCOLLECTION, messageId),{
        text: trimmed,
        editedAt: serverTimestamp()
      });
      await updateConversationLastMessage(activeConversationId, trimmed, serverTimestamp());
    }catch(e){
      console.error(e);
      alert('Edit failed.');
    }
  });
}

async function deleteMessageUI(messageId){
  closeDropdown();
  showConfirm(t('deleteMsg'),t('deleteMsg')+'?',t('delete'),true).then(async function(confirmed){
    if(!confirmed) return;
    try{
      var msg = getMessageFromActiveConversation(messageId);
      if(msg && msg.attachments && msg.attachments.length){
        for(var i=0;i<msg.attachments.length;i++){
          var path = msg.attachments[i].storagePath;
          if(path){
            try{ await deleteObject(ref(storage,path)); }catch(e){}
          }
        }
      }
      await updateDoc(doc(db, CONVERSATION_COLLECTION, activeConversationId, MESSAGE_SUBCOLLECTION, messageId),{
        deletedAt: serverTimestamp(),
        text: '',
        attachments: []
      });
    }catch(e){
      console.error(e);
      alert('Delete failed.');
    }
  });
}

}

async function executeSendGroupInvite(groupConversationId){

      initials: currentUser.initials,
      avatarURL: currentUser.avatarFileId || '',
      text: '',
      messageType: 'group_invite',
      attachments: [],
      replyToMessageId: '',
      replyDisplayName: '',
      replyPreview: '',
      forwardedFromMessageId: '',
      forwardedFromTitle: '',
      createdAt: serverTimestamp(),
      editedAt: null,
      deletedAt: null,
      meta: {
        inviteCode: inviteCode,
        groupConversationId: groupConversationId,

async function joinGroupFromMessage(inviteCode){
  if(!inviteCode||!auth.currentUser) return;
  try{
    var inviteSnap=await getDoc(doc(db, GROUP_INVITES_COLLECTION, inviteCode));
    if(!inviteSnap.exists()){ alert('Invite invalid.'); return; }
    var invite=inviteSnap.data()||{};
    if(!invite.active){ alert('Invite inactive.'); return; }
    var conversationId=invite.groupConversationId;
    var conversationSnap=await getDoc(doc(db, CONVERSATION_COLLECTION, conversationId));
    if(!conversationSnap.exists()){ alert('Group not found.'); return; }
    var group=conversationSnap.data()||{};

    await setDoc(doc(db, CONVERSATION_COLLECTION, conversationId, MEMBER_SUBCOLLECTION, auth.currentUser.uid),{
      uid: auth.currentUser.uid,
      role: 'member',
      joinedAt: serverTimestamp()
    },{merge:true});

    await updateDoc(doc(db, CONVERSATION_COLLECTION, conversationId),{
      memberCount: Number(group.memberCount||0)+1,
      updatedAt: serverTimestamp()
    });

    await addUserToConversationIndexes(auth.currentUser.uid, conversationId, {
      conversationId: conversationId,
      type: group.type || 'group',
      title: group.title || 'Group',
      subtitle: group.subtitle || '',
      initials: group.initials || makeInitials(group.title || 'Group'),
      avatarURL: group.avatarURL || '',
      description: group.description || '',
      memberCount: Number(group.memberCount||0)+1,
      lastMessageText: group.lastMessageText || '',
      lastMessageAt: group.lastMessageAt || null,
      updatedAt: serverTimestamp()
    });

    selectConversation(conversationId);
  }catch(e){
    console.error(e);
    alert('Failed.');
  }
}

function openConversationProfile(){

}

function openConversationProfileById(conversationId){

async function loadConversationProfile(conversationId){
  try{
    var conversationSnap = await getDoc(doc(db, CONVERSATION_COLLECTION, conversationId));
    if(!conversationSnap.exists()) return;
    var profile = conversationSnap.data() || {};
    var memberSnap = await getDocs(collection(db, CONVERSATION_COLLECTION, conversationId, MEMBER_SUBCOLLECTION));
    var members = [];
    for (const memberDoc of memberSnap.docs){
      try{
        var profileSnap = await getDoc(doc(db, PROFILE_COLLECTION, memberDoc.id));
        if(profileSnap.exists()){
          var memberProfile = profileSnap.data() || {};
          members.push({
            userId: memberDoc.id,
            displayName: memberProfile.displayName || 'User',
            username: memberProfile.username || '',
            initials: memberProfile.initials || makeInitials(memberProfile.displayName || 'User'),
            avatarFileId: memberProfile.avatarURL || '',
            isAppAdmin: !!memberProfile.isAdmin,
            isBanned: !!memberProfile.banned,
            isDeleted: !!memberProfile.deleted
          });
        }
      }catch(e){}
    }

    var merged = {
      conversationId: conversationId,
      title: profile.title || 'Group',
      description: profile.description || '',
      initials: profile.initials || makeInitials(profile.title || 'Group'),
      avatarFileId: profile.avatarURL || '',
      memberCount: members.length,
      type: profile.type || 'group',
      isCreator: !!(currentUser && profile.createdBy===currentUser.userId),
      isAdminViewer: !!(currentUser && currentUser.isAdmin),
      members: members
    };

    var html='<div class="p-hdr">'+buildAvatarHTML(merged.initials,merged.avatarFileId,'xl')+'<div class="p-name">'+escapeHtml(merged.title)+'</div>';
    if(merged.description) html+='<div class="p-bio">'+escapeHtml(merged.description)+'</div>';
    html+='<div class="p-un">'+merged.memberCount+' '+t('members')+'</div>';
    if(merged.type==='group'&&(merged.isCreator||merged.isAdminViewer)) html+='<div style="margin-top:6px"><button class="secondary-btn" onclick="closeModal(null);changeAvatarUI(\'group\',\''+escapeJsString(merged.conversationId)+'\')">'+t('changeAvatar')+'</button></div>';
    html+='</div>';
    html+='<div style="padding:0 4px"><div class="sec-title">'+t('members')+'</div>';
    merged.members.forEach(function(member){
      html+='<div class="si" onclick="closeModal(null);openProfile(\''+escapeJsString(member.userId)+'\')">'+buildAvatarHTML(member.initials,member.avatarFileId)+'<div class="si-meta"><div class="si-title">'+escapeHtml(member.displayName)+(member.isAppAdmin?'<span class="badge-admin">admin</span>':'')+'</div><div class="si-sub">@'+escapeHtml(member.username||'')+(member.isBanned?' • banned':'')+'</div></div></div>';
    });
    html+='</div>';

    var buttons=[{text:t('close'),className:'secondary-btn',value:'close'}];
    if(merged.type==='group'){
      buttons.unshift({text:t('inviteLink'),className:'secondary-btn',value:'invite'});
      if(merged.isCreator||merged.isAdminViewer) buttons.unshift({text:t('editGroup'),className:'primary-btn',value:'edit'});
      if(merged.isCreator||merged.isAdminViewer) buttons.push({text:t('deleteGroup'),className:'danger-btn',value:'deleteGroup'});
      buttons.push({text:t('leaveGroup'),className:'secondary-btn',value:'leave'});
    }

    openModal({
      title:merged.type==='channel'?'Channel':t('groupProfile'),
      html:html,
      buttons:buttons,
      onAction:function(value){
        if(value==='invite'){ closeModal(null); showInviteLink(conversationId); }
        else if(value==='edit'){ closeModal(null); editGroupUI(conversationId); }
        else if(value==='leave'){ closeModal(null); doLeaveGroup(conversationId); }
        else if(value==='deleteGroup'){ closeModal(null); doDeleteGroup(conversationId); }
        else closeModal(null);
      }
    });
  }catch(e){
    console.error(e);
  }
}

/* ======================== Avatar Upload ======================== */

function changeAvatarUI(targetType,targetId){
  var fileInput=document.createElement('input');
  fileInput.type='file';
  fileInput.accept='image/*';
  fileInput.onchange=async function(){
    var file=fileInput.files&&fileInput.files[0];
    if(!file||file.size>10*1024*1024) return;

    try{
      var ownerId = targetType==='group' ? targetId : auth.currentUser.uid;
      var path = 'avatars/'+targetType+'/'+ownerId+'/'+Date.now()+'_'+file.name.replace(/[^\w.\-]+/g,'_');
      var storageRef = ref(storage, path);
      await new Promise(function(resolve,reject){
        var task = uploadBytesResumable(storageRef, file, {contentType:file.type||'image/jpeg'});
        task.on('state_changed',null,function(error){ reject(error); },function(){ resolve(); });
      });
      var url = await getDownloadURL(storageRef);
      await saveAvatarFileId(url, path, targetType, targetId);
    }catch(e){
      console.error(e);
      alert('Avatar upload failed.');
    }
  };
  fileInput.click();
}

async function saveAvatarFileId(url,path,targetType,targetId){
  try{
    if(targetType==='group' && targetId){
      await updateDoc(doc(db, CONVERSATION_COLLECTION, targetId),{
        avatarURL: url,
        updatedAt: serverTimestamp()
      });
      var convo = findConversationById(targetId);
      if(convo){
        convo.avatarFileId = url;
        convo.avatarURL = url;
        renderSidebar();
        renderTopbar();
      }
    }else{
      await updateDoc(doc(db, PROFILE_COLLECTION, auth.currentUser.uid),{
        avatarURL: url,
        avatarPath: path,
        updatedAt: serverTimestamp()
      });
    }
  }catch(e){
    console.error(e);
  }
}

    title:t('editGroup'),
    html:html,
    buttons:[{text:t('cancel'),className:'secondary-btn',value:'cancel'},{text:t('save'),className:'primary-btn',value:'save'}],
    onAction:async function(value){
      if(value!=='save'){ closeModal(null); return; }
      var title=document.getElementById('editGroupTitle').value.trim();
      var description=document.getElementById('editGroupDesc').value.trim();
      closeModal(null);
      try{
        await updateDoc(doc(db, CONVERSATION_COLLECTION, conversationId),{
          title: title,
          titleLower: safeLower(title),
          description: description,
          subtitle: description || '',
          initials: makeInitials(title),

        });

function doLeaveGroup(conversationId){

    try{
      await deleteDoc(doc(db, CONVERSATION_COLLECTION, conversationId, MEMBER_SUBCOLLECTION, auth.currentUser.uid));

    }catch(e){
      console.error(e);
    }

function doDeleteGroup(conversationId){
  showConfirm(t('deleteGroup'),t('deleteGroup')+'?',t('delete'),true).then(async function(confirmed){
    if(!confirmed) return;
    try{
      await updateDoc(doc(db, CONVERSATION_COLLECTION, conversationId),{
        isDeleted: true,
        updatedAt: serverTimestamp()
      });
      var members=await getDocs(collection(db, CONVERSATION_COLLECTION, conversationId, MEMBER_SUBCOLLECTION));

      });
      await Promise.all(ops);
      showPlaceholder();
    }catch(e){
      console.error(e);
    }
  });

function openAdminPanel(){
  if(!isAdminUser()) return;
  Promise.all([
    getDocs(collection(db, PROFILE_COLLECTION)),
    getDocs(collection(db, CONVERSATION_COLLECTION)),
    getDocs(collectionGroup(db, MESSAGE_SUBCOLLECTION))
  ]).then(function(results){
    var usersSnap=results[0], convoSnap=results[1], msgSnap=results[2];
    var users=[], groups=[], totalUsers=0, bannedUsers=0, deletedUsers=0, onlineUsers=0;

    usersSnap.forEach(function(u){
      totalUsers++;
      var d=u.data()||{};
      if(d.banned) bannedUsers++;
      if(d.deleted) deletedUsers++;
      if(d.online) onlineUsers++;
      users.push({
        userId: u.id,
        displayName: d.displayName || 'User',
        username: d.username || '',
        initials: d.initials || makeInitials(d.displayName || 'User'),
        avatarFileId: d.avatarURL || '',
        isOnline: !!d.online,
        isBanned: !!d.banned,
        isDeleted: !!d.deleted,
        isAppAdmin: !!d.isAdmin
      });
    });

    convoSnap.forEach(function(c){
      var d=c.data()||{};
      if(d.type==='group'){
        groups.push({
          conversationId: c.id,
          title: d.title || 'Group',
          initials: d.initials || makeInitials(d.title || 'Group'),
          avatarFileId: d.avatarURL || '',
          memberCount: Number(d.memberCount || 0)
        });
      }
    });

    renderAdminPanel({
      totalUsers: totalUsers,
      totalMessages: msgSnap.size,
      totalConversations: convoSnap.size,
      onlineUsers: onlineUsers,
      bannedUsers: bannedUsers,
      deletedUsers: deletedUsers
    }, groups, users);
  }).catch(function(e){
    console.error(e);
  });
}

async function adminToggleGroupMembers(conversationId,dropId){
  var box=document.getElementById(dropId); if(!box) return;

  try{
    var memberSnap = await getDocs(collection(db, CONVERSATION_COLLECTION, conversationId, MEMBER_SUBCOLLECTION));
    var rows = [];
    for (const member of memberSnap.docs){
      var ps = await getDoc(doc(db, PROFILE_COLLECTION, member.id));
      if(ps.exists()){
        var d = ps.data()||{};
        rows.push('<div class="admin-row">'+buildAvatarHTML(d.initials||makeInitials(d.displayName||'User'),d.avatarURL||'','',false,"openProfile('"+escapeJsString(member.id)+"')")+'<div class="admin-row-meta"><div class="admin-row-title">'+escapeHtml(d.displayName||'User')+'</div><div class="admin-row-sub">@'+escapeHtml(d.username||'')+(d.banned?' • banned':'')+(d.deleted?' • deleted':'')+' • '+escapeHtml(member.id)+'</div></div></div>');
      }
    }
    box.innerHTML='<div class="admin-drop open" style="margin-top:10px"><div class="admin-list">'+rows.join('')+'</div></div>';
    box.dataset.loaded='1';

async function adminRunUserSearch(){
  var queryText=(document.getElementById('adminUserSearchInput')||{}).value||'';
  var q=safeLower(queryText);
  try{
    var snap = await getDocs(collection(db, PROFILE_COLLECTION));
    var users=[];
    snap.forEach(function(docSnap){
      var d=docSnap.data()||{};
      if(!q || safeLower(d.username).indexOf(q)!==-1 || safeLower(d.displayName).indexOf(q)!==-1){
        users.push({
          userId: docSnap.id,

function parseUAFriendly_(ua){
  ua=String(ua||''); if(!ua) return 'Unknown device';
  var browser='Browser',os='';
  if(/Edg[e\/]/i.test(ua))browser='Edge';
  else if(/OPR|Opera/i.test(ua))browser='Opera';
  else if(/YaBrowser/i.test(ua))browser='Yandex';
  else if(/SamsungBrowser/i.test(ua))browser='Samsung';
  else if(/Firefox/i.test(ua))browser='Firefox';
  else if(/CriOS/i.test(ua))browser='Chrome iOS';
  else if(/Chrome|Chromium/i.test(ua))browser='Chrome';
  else if(/Safari/i.test(ua)&&!/Chrome/i.test(ua))browser='Safari';
  if(/iPhone/i.test(ua))os='iPhone';
  else if(/iPad/i.test(ua))os='iPad';
  else if(/Android/i.test(ua))os='Android';
  else if(/Mac OS X|Macintosh/i.test(ua))os='macOS';
  else if(/Windows/i.test(ua))os='Windows';
  else if(/Linux/i.test(ua))os='Linux';
  else if(/CrOS/i.test(ua))os='ChromeOS';
  return browser+(os?' on '+os:'');
}

async function performUserSearch(){
  var qText=document.getElementById('searchInput').value.trim();
  if(!qText){ clearSearchResults(); return; }

  try{
    var q = safeLower(qText.replace(/^@+/,''));
    var snap = await getDocs(collection(db, PROFILE_COLLECTION));
    var users=[];
    snap.forEach(function(docSnap){
      var d=docSnap.data()||{};
      if(docSnap.id === auth.currentUser.uid) return;
      if(d.deleted || d.banned) return;
      var uname=safeLower(d.username);
      var dname=safeLower(d.displayName);
      if(uname.indexOf(q)!==-1 || dname.indexOf(q)!==-1){
        users.push({
          userId: docSnap.id,
          displayName: d.displayName || 'User',
          username: d.username || '',
          initials: d.initials || makeInitials(d.displayName || 'User'),
          avatarFileId: d.avatarURL || '',
          isOnline: !!d.online
        });
      }
    });

    var resultsContainer=document.getElementById('searchResults');
    if(!users.length){
      resultsContainer.innerHTML='<div class="si"><div class="si-meta"><div class="si-title">—</div></div></div>';
      resultsContainer.classList.add('open');
      return;
    }
    resultsContainer.innerHTML=users.map(function(user){
      return '<div class="si" onclick="startDirectMessage(\''+escapeJsString(user.userId)+'\')">'+buildAvatarHTML(user.initials,user.avatarFileId,'',user.isOnline,"event.stopPropagation();openProfile('"+escapeJsString(user.userId)+"')")+'<div class="si-meta"><div class="si-title">'+escapeHtml(user.displayName)+'</div><div class="si-sub">@'+escapeHtml(user.username)+'</div></div></div>';
    }).join('');
    resultsContainer.classList.add('open');
  }catch(e){
    console.error(e);
    clearSearchResults();
  }
}

function clearSearchResults(){
  var container=document.getElementById('searchResults');
  container.classList.remove('open');
  container.innerHTML='';
}

async function startDirectMessage(userId){
  clearSearchResults();
  document.getElementById('searchInput').value='';
  try{
    var myUid=auth.currentUser.uid;
    var dmKey=dmKeyFor(myUid,userId);

    var existing = await getDocs(query(collection(db, CONVERSATION_COLLECTION), where('type','==','direct'), where('dmKey','==',dmKey), limit(1)));
    var conversationId='';

    if(!existing.empty){
      conversationId=existing.docs[0].id;
    }else{
      var otherProfileSnap = await getDoc(doc(db, PROFILE_COLLECTION, userId));
      if(!otherProfileSnap.exists()) return;
      var other = otherProfileSnap.data() || {};
      var convoRef = doc(collection(db, CONVERSATION_COLLECTION));
      conversationId = convoRef.id;

      await setDoc(convoRef,{
        conversationId: conversationId,
        type: 'direct',
        dmKey: dmKey,
        title: other.displayName || 'Chat',
        titleLower: safeLower(other.displayName || 'Chat'),
        subtitle: '@'+(other.username||''),
        description: '',
        initials: other.initials || makeInitials(other.displayName || 'User'),
        avatarURL: other.avatarURL || '',
        createdBy: myUid,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp(),
        memberCount: 2,
        lastMessageText: '',
        lastMessageAt: null,
        isDeleted: false,
        otherUserId: userId
      });

      await setDoc(doc(db, CONVERSATION_COLLECTION, conversationId, MEMBER_SUBCOLLECTION, myUid),{
        uid: myUid,
        role: 'member',
        joinedAt: serverTimestamp()
      });
      await setDoc(doc(db, CONVERSATION_COLLECTION, conversationId, MEMBER_SUBCOLLECTION, userId),{
        uid: userId,
        role: 'member',
        joinedAt: serverTimestamp()
      });

      await addUserToConversationIndexes(myUid, conversationId, {
        conversationId: conversationId,
        type: 'direct',
        title: other.displayName || 'Chat',
        subtitle: '@'+(other.username||''),
        initials: other.initials || makeInitials(other.displayName || 'User'),
        avatarURL: other.avatarURL || '',
        description: '',
        memberCount: 2,
        lastMessageText: '',
        lastMessageAt: null,
        updatedAt: serverTimestamp(),
        otherUserId: userId
      });

      if(currentUser){
        await addUserToConversationIndexes(userId, conversationId, {
          conversationId: conversationId,
          type: 'direct',
          title: currentUser.displayName || 'Chat',
          subtitle: '@'+(currentUser.username||''),
          initials: currentUser.initials || makeInitials(currentUser.displayName || 'User'),
          avatarURL: currentUser.avatarFileId || '',
          description: '',
          memberCount: 2,
          lastMessageText: '',
          lastMessageAt: null,
          updatedAt: serverTimestamp(),
          otherUserId: myUid
        });
      }
    }

    await selectConversation(conversationId);
  }catch(e){
    console.error(e);
  }
}

/* ======================== Modal System ======================== */

function openModal(config){
  return new Promise(function(resolve){
    modalResolveFunction=resolve;
    currentModalConfig=config||{};
    document.getElementById('modalTitle').textContent=config.title||'';
    document.getElementById('modalBody').textContent=config.message||'';
    document.getElementById('modalContent').innerHTML=config.html||'';
    document.getElementById('modalBox').className='modal'+(config.wide?' modal-wide':'');
    var actionsContainer=document.getElementById('modalActions');
    actionsContainer.innerHTML='';
    (config.buttons||[]).forEach(function(buttonConfig){
      var button=document.createElement('button');
      button.className=buttonConfig.className||'secondary-btn';
      button.textContent=buttonConfig.text||'OK';
      button.onclick=function(){
        if(typeof config.onAction==='function') config.onAction(buttonConfig.value);
        else closeModal(buttonConfig.value);
      };
      actionsContainer.appendChild(button);
    });
    document.getElementById('modalOverlay').classList.add('open');
  });
}

function closeModal(result){
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('modalContent').innerHTML='';
  document.getElementById('modalActions').innerHTML='';
  document.getElementById('modalBox').className='modal';
  var resolver=modalResolveFunction;
  modalResolveFunction=null;
  currentModalConfig=null;
  if(resolver) resolver(result);
}

function showAlert(title,message){ return openModal({title:title,message:message,buttons:[{text:'OK',className:'primary-btn',value:true}]}); }
function showConfirm(title,message,okText,isDanger){
  return openModal({
    title:title,
    message:message,
    buttons:[
      {text:t('cancel'),className:'secondary-btn',value:false},
      {text:okText||'OK',className:isDanger?'danger-btn':'primary-btn',value:true}
    ]
  });
}
function showPrompt(title,message,defaultValue){
  return openModal({
    title:title,
    message:message,
    html:'<div class="field"><textarea id="promptInput" rows="4">'+escapeHtml(defaultValue||'')+'</textarea></div>',
    buttons:[
      {text:t('cancel'),className:'secondary-btn',value:'cancel'},
      {text:t('save'),className:'primary-btn',value:'save'}
    ],
    onAction:function(value){
      if(value!=='save'){ closeModal(null); return; }
      var input=document.getElementById('promptInput');
      closeModal(input?input.value:null);
    }
  });
}

function autoGrowTextarea(element){

  element.style.height=Math.min(element.scrollHeight,180)+'px';
}
function findMessageCardElement(target){ return target?target.closest('.mc[data-mid]'):null; }
function escapeHtml(value){ return String(value||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function escapeAttr(value){ return escapeHtml(value).replace(/\n/g,'&#10;'); }
function escapeJsString(value){ return String(value||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/</g,'\\x3C'); }
function truncateString(value,maxLength){ var text=String(value||''); return text.length<=maxLength?text:text.slice(0,maxLength-1)+'…'; }
function formatMessageTime(isoString){ var date=new Date(isoString); if(isNaN(date.getTime())) return ''; return date.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }
function formatSidebarTime(isoString){ var date=new Date(isoString); if(isNaN(date.getTime())) return ''; if(date.toDateString()===new Date().toDateString()) return date.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); return date.toLocaleDateString([], {month:'short',day:'numeric'}); }
function formatFileSize(bytes){ var value=Number(bytes); if(!Number.isFinite(value)||value<=0)return'0 B'; var units=['B','KB','MB','GB'], size=value, unitIndex=0; while(size>=1024&&unitIndex<units.length-1){size/=1024;unitIndex++} return (size>=10||unitIndex===0?size.toFixed(0):size.toFixed(1))+' '+units[unitIndex]; }
function detectFileCategory(mimeType){ var type=String(mimeType||'').toLowerCase(); if(type.startsWith('image/'))return'image'; if(type.startsWith('video/'))return'video'; if(type.startsWith('audio/'))return'audio'; return'file'; }
function buildAttachmentMetaText(attachment){ var parts=[], category=detectFileCategory(attachment.mimeType); if(category==='image')parts.push('Photo'); else if(category==='video')parts.push('Video'); else if(category==='audio')parts.push('Audio'); else parts.push('File'); if(attachment.size>0)parts.push(formatFileSize(attachment.size)); return parts.join(' • '); }
function getFileIcon(attachment){ var category=detectFileCategory(attachment&&attachment.mimeType); if(category==='image')return'🖼'; if(category==='video')return'🎬'; if(category==='audio')return'🎵'; var extension=(attachment&&attachment.name||'').split('.').pop().toLowerCase(); if(extension==='pdf')return'📕'; if(['doc','docx','txt','md'].indexOf(extension)!==-1)return'📄'; if(['zip','rar','7z'].indexOf(extension)!==-1)return'🗜'; return'📎'; }

});
messagesContainer.addEventListener('touchstart',function(event){

  longPressFired=false;

  if(!touch) return;
  clearTimeout(longPressTimer);
  longPressTimer=setTimeout(function(){
    longPressFired=true;
    openDropdownAt(touch.clientX,touch.clientY,messageCard.getAttribute('data-mid'));
  },550);
},{passive:true});
messagesContainer.addEventListener('touchend',function(){ clearTimeout(longPressTimer); },{passive:true});
messagesContainer.addEventListener('touchcancel',function(){ clearTimeout(longPressTimer); },{passive:true});
messagesContainer.addEventListener('touchmove',function(){ clearTimeout(longPressTimer); },{passive:true});
messagesContainer.addEventListener('click',function(event){ if(longPressFired){ event.preventDefault(); longPressFired=false; } });

(function savePendingInviteFromUrl(){
  try{
    var urlParams=new URLSearchParams(window.location.search);
    var invite=urlParams.get('invite');
    if(invite){
      localStorage.setItem('heyo_pending_invite',invite);
      window.history.replaceState(null,'',window.location.origin+window.location.pathname);
    }
  }catch(e){}
})();

if(localStorage.getItem('heyo_token')){
  document.getElementById('authScreen').classList.remove('active');
  document.getElementById('appScreen').classList.remove('active');
}else{
  document.getElementById('authScreen').classList.add('active');
}

onAuthStateChanged(auth, async function(user){
  try{
    if(!user){
      localStorage.removeItem('heyo_token');
      forceLogoutToAuth();
      return;
    }

    localStorage.setItem('heyo_token', user.uid);
    var profileSnap = await getDoc(doc(db, PROFILE_COLLECTION, user.uid));
    if(!profileSnap.exists()){
      forceLogoutToAuth();
      return;
    }

    var p = profileSnap.data() || {};
    if(p.banned || p.deleted){
      await signOut(auth);
      forceLogoutToAuth();
      return;
    }

    currentUser = {
      userId: user.uid,
      uid: user.uid,
      email: user.email || p.email || '',
      phone: p.phone || '',
      username: p.username || '',
      displayName: p.displayName || 'User',
      initials: p.initials || makeInitials(p.displayName || 'User'),
      bio: p.bio || '',
      birthday: p.birthday || '',
      theme: p.theme || 'light',
      accentColor: p.accentColor || 'indigo',
      language: p.language || 'en',
      avatarFileId: p.avatarURL || '',
      avatarURL: p.avatarURL || '',
      isAdmin: !!p.isAdmin,
      banned: !!p.banned,
      deleted: !!p.deleted,
      online: !!p.online
    };

    currentLanguage=currentUser.language||'en';
    localStorage.setItem('heyo_lang',currentLanguage);
    syncWindowState();
    await startApplication();
  }catch(e){
    console.error(e);
    forceLogoutToAuth();
  }
});
